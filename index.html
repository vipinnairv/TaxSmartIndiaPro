<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>TaxSmartIndia Pro by Vipin Nair · FY 2026-27</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.development.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.development.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
:root{
  --blue:#1a56db;--blue-lt:#eff6ff;--blue-md:#bfdbfe;
  --green:#059669;--green-lt:#ecfdf5;--green-md:#a7f3d0;
  --amber:#d97706;--amber-lt:#fffbeb;--amber-md:#fde68a;
  --red:#dc2626;--red-lt:#fef2f2;--red-md:#fecaca;
  --purple:#7c3aed;--purple-lt:#f5f3ff;
  --ink:#0f1729;--ink2:#374151;--ink3:#6b7280;--ink4:#9ca3af;
  --line:#e5e7eb;--line2:#f3f4f6;--bg:#f9fafb;--card:#fff;
  --font:'Sora',sans-serif;--mono:'JetBrains Mono',monospace;
  --r8:8px;--r12:12px;--r16:16px;--r24:24px;
  --sh1:0 1px 3px rgba(0,0,0,.07);--sh2:0 4px 16px rgba(0,0,0,.09);
  --ai:#0ea5e9;--ai-lt:#f0f9ff;--ai-md:#bae6fd;--ai-dk:#0369a1;
  --tr:.15s ease;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:var(--font);background:var(--bg);color:var(--ink);line-height:1.55;-webkit-font-smoothing:antialiased}
::-webkit-scrollbar{width:5px}::-webkit-scrollbar-thumb{background:var(--line);border-radius:3px}

/* NAV */
.nav{background:#fff;border-bottom:1px solid var(--line);padding:0 24px;height:58px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:300;box-shadow:var(--sh1)}
.nav-logo{display:flex;align-items:center;gap:10px;text-decoration:none;cursor:pointer}
.nav-icon{width:34px;height:34px;background:linear-gradient(135deg,#1a56db,#3b82f6);border-radius:8px;display:flex;align-items:center;justify-content:center;color:#fff;font-size:16px;font-weight:800;flex-shrink:0}
.nav-title{font-size:15px;font-weight:800;color:var(--ink);letter-spacing:-.3px;line-height:1.1}
.nav-title em{color:var(--blue);font-style:normal}
.nav-byline{font-size:10px;color:var(--ink4);font-weight:500}
.nav-right{display:flex;align-items:center;gap:8px}

/* PILLS */
.pill{display:inline-flex;align-items:center;padding:3px 10px;border-radius:20px;font-size:11px;font-weight:700;white-space:nowrap}
.p-blue{background:var(--blue-lt);color:var(--blue)}
.p-green{background:var(--green-lt);color:var(--green)}
.p-amber{background:var(--amber-lt);color:var(--amber)}
.p-gray{{background:"var(--line2)"};color:var(--ink3)}
.p-purple{background:var(--purple-lt);color:var(--purple)}

/* STEPPER */
.stepper-bar{background:#fff;border-bottom:1px solid var(--line);padding:10px 28px;display:flex;align-items:center;gap:16px;flex-wrap:wrap}
.stepper{display:flex;align-items:center;gap:0;flex:1;min-width:0}
.st{display:flex;align-items:center;gap:10px;padding:6px 0;flex-shrink:0}
.st-connector{flex:1;min-width:24px;max-width:56px;height:2px;background:var(--line);margin:0 6px;border-radius:2px;transition:background .3s}
.st-connector.done{background:var(--green)}
.st-n{width:30px;height:30px;border-radius:50%;border:2px solid var(--line);display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:800;color:var(--ink4);flex-shrink:0;transition:var(--tr)}
.st-l{font-size:12.5px;font-weight:600;color:var(--ink4);white-space:nowrap;transition:var(--tr)}
.st.cur .st-n{background:var(--blue);border-color:var(--blue);color:#fff;box-shadow:0 0 0 4px var(--blue-lt)}
.st.cur .st-l{color:var(--blue);font-weight:800}
.st.done .st-n{background:var(--green);border-color:var(--green);color:#fff}
.st.done .st-l{color:var(--green);font-weight:700}

/* LAYOUT */
.wrap{max-width:980px;margin:0 auto;padding:32px 20px 60px}

/* CARDS */
.card{background:var(--card);border:1px solid var(--line);border-radius:var(--r16);box-shadow:var(--sh2);overflow:hidden;margin-bottom:18px}
.card-head{padding:22px 28px 16px;border-bottom:1px solid var(--line)}
.card-body{padding:22px 28px}
.card-foot{padding:14px 28px;border-top:1px solid var(--line);{background:"var(--line2)"};display:flex;align-items:center;justify-content:space-between;gap:12px;flex-wrap:wrap}
.card-title{font-size:17px;font-weight:800;letter-spacing:-.3px}
.card-sub{font-size:12.5px;color:var(--ink3);margin-top:3px;line-height:1.5}

/* FORMS */
.fg{display:flex;flex-direction:column;gap:5px}
.fg label{font-size:11px;font-weight:700;color:var(--ink3);text-transform:uppercase;letter-spacing:.6px;display:flex;align-items:center;gap:5px}
.fg input,.fg select{height:42px;padding:0 13px;border:1.5px solid var(--line);border-radius:var(--r8);font-family:var(--font);font-size:13.5px;color:var(--ink);background:#fff;transition:var(--tr);outline:none;width:100%}
.fg input:focus,.fg select:focus{border-color:var(--blue);box-shadow:0 0 0 3px rgba(26,86,219,.1)}
.fg input.err{border-color:var(--red)}
.fg .hint{font-size:11px;color:var(--ink4);line-height:1.4}
.fg .emsg{font-size:11px;color:var(--red);font-weight:600}
.fg .aval{height:42px;padding:0 12px;border:1.5px dashed #93c5fd;border-radius:var(--r8);font-family:var(--mono);font-size:13px;font-weight:700;color:var(--blue);background:var(--blue-lt);display:flex;align-items:center}
.fg .aval.gv{color:var(--green);background:var(--green-lt);border-color:var(--green-md)}
.fg .aval.rv{color:var(--red);background:var(--red-lt);border-color:var(--red-md)}
.grid{display:grid;gap:15px}
.g2{grid-template-columns:1fr 1fr}
.g3{grid-template-columns:1fr 1fr 1fr}
.g4{grid-template-columns:1fr 1fr 1fr 1fr}
.s2{grid-column:span 2}.s3{grid-column:span 3}
@media(max-width:640px){.g2,.g3,.g4{grid-template-columns:1fr}.s2,.s3{grid-column:span 1}}

/* MONEY INPUT */
.mon{position:relative}
.mon-pfx{position:absolute;left:11px;top:50%;transform:translateY(-50%);font-size:13px;font-weight:700;color:var(--ink4);pointer-events:none;font-family:var(--mono);z-index:1}
.mon input{padding-left:26px;font-family:var(--mono)}

/* RADIO */
.rg{display:flex;gap:6px;flex-wrap:wrap}
.rb{display:flex;align-items:center;gap:6px;padding:7px 13px;border:1.5px solid var(--line);border-radius:var(--r8);cursor:pointer;font-size:12.5px;font-weight:500;color:var(--ink3);background:#fff;transition:var(--tr);user-select:none}
.rb:hover{border-color:var(--blue);color:var(--blue)}
.rb.sel{background:var(--blue-lt);border-color:var(--blue);color:var(--blue);font-weight:700}
.rb input{display:none}
.rb-dot{width:12px;height:12px;border-radius:50%;border:2px solid currentColor;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.rb.sel .rb-dot::after{content:'';width:5px;height:5px;background:var(--blue);border-radius:50%}

/* TOGGLE */
.sw-row{display:flex;align-items:center;justify-content:space-between;padding:13px 15px;background:var(--amber-lt);border:1.5px solid var(--amber-md);border-radius:var(--r12);cursor:pointer;margin-top:14px}
.sw-title{font-size:13px;font-weight:700;color:#92400e}
.sw-desc{font-size:11px;color:#b45309;margin-top:1px}
.sw{width:38px;height:21px;background:var(--line);border-radius:11px;position:relative;transition:var(--tr);flex-shrink:0}
.sw.on{background:var(--blue)}
.sw::after{content:'';position:absolute;width:15px;height:15px;background:#fff;border-radius:50%;top:3px;left:3px;transition:var(--tr);box-shadow:0 1px 3px rgba(0,0,0,.2)}
.sw.on::after{left:20px}

/* ALERTS */
.al{display:flex;gap:10px;padding:12px 14px;border-radius:var(--r8);font-size:12.5px;line-height:1.5;margin-bottom:16px}
.al-icon{font-size:15px;flex-shrink:0;margin-top:1px}
.al b{font-weight:700}
.al-blue{background:var(--blue-lt);border-left:3px solid var(--blue);color:#1e40af}
.al-green{background:var(--green-lt);border-left:3px solid var(--green);color:#065f46}
.al-amber{background:var(--amber-lt);border-left:3px solid var(--amber);color:#92400e}
.al-red{background:var(--red-lt);border-left:3px solid var(--red);color:#991b1b}
.al-purple{background:var(--purple-lt);border-left:3px solid var(--purple);color:#5b21b6}

/* BUTTONS */
.btn{display:inline-flex;align-items:center;justify-content:center;gap:7px;padding:0 18px;height:40px;border-radius:var(--r8);font-family:var(--font);font-size:13px;font-weight:700;cursor:pointer;border:none;outline:none;transition:var(--tr);text-decoration:none;white-space:nowrap}
.btn-primary{background:linear-gradient(135deg,#1a56db,#3b82f6);color:#fff;box-shadow:0 2px 8px rgba(26,86,219,.28)}
.btn-primary:hover{transform:translateY(-1px);box-shadow:0 4px 14px rgba(26,86,219,.36)}
.btn-outline{background:#fff;color:var(--blue);border:1.5px solid var(--blue)}
.btn-outline:hover{background:var(--blue-lt)}
.btn-ghost{background:transparent;color:var(--ink3);border:none}
.btn-ghost:hover{{background:"var(--line2)"}}
.btn-green{background:linear-gradient(135deg,#059669,#10b981);color:#fff}
.btn-green:hover{transform:translateY(-1px)}
.btn-purple{background:linear-gradient(135deg,#7c3aed,#8b5cf6);color:#fff}
.btn-purple:hover{transform:translateY(-1px)}
.btn-lg{height:48px;padding:0 26px;font-size:14px;border-radius:var(--r12)}
.btn-sm{height:30px;padding:0 10px;font-size:11.5px}

/* DIVIDER */
.div-row{display:flex;align-items:center;gap:10px;margin:20px 0 14px}
.div-lbl{font-size:10px;font-weight:800;color:var(--ink4);text-transform:uppercase;letter-spacing:1px;white-space:nowrap}
.div-line{flex:1;height:1px;background:var(--line)}

/* REGIME CARDS */
.rc-grid{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-bottom:18px}
.rc{border:2px solid var(--line);border-radius:var(--r16);padding:20px;cursor:pointer;transition:var(--tr);position:relative;background:#fff}
.rc:hover{border-color:var(--blue)}
.rc.sel{border-color:var(--blue);background:var(--blue-lt)}
.rc.rec{border-color:var(--green)}
.rc.rec.sel{background:var(--green-lt);border-color:var(--green)}
.rc-badge{position:absolute;top:-10px;left:18px;background:var(--green);color:#fff;font-size:10px;font-weight:800;padding:2px 9px;border-radius:20px}
.rc-chk{position:absolute;top:14px;right:14px;width:20px;height:20px;border-radius:50%;border:2px solid var(--line);display:flex;align-items:center;justify-content:center;font-size:10px;transition:var(--tr)}
.rc.sel .rc-chk{background:var(--blue);border-color:var(--blue);color:#fff}
.rc.rec.sel .rc-chk{background:var(--green);border-color:var(--green)}
.rc-title{font-size:15px;font-weight:800;margin-bottom:4px}
.rc-sub{font-size:11.5px;color:var(--ink3);margin-bottom:12px;line-height:1.5}
.slab-row{display:flex;justify-content:space-between;font-size:11px;padding:5px 8px;background:rgba(0,0,0,.03);border-radius:5px;margin-bottom:3px}
.sr-range{color:var(--ink3)}
.sr-rate{font-weight:700;font-family:var(--mono)}
.nil{color:var(--green)}.low{color:var(--blue)}.mid{color:var(--amber)}.hi{color:var(--red)}
.rc-tax-box{margin-top:12px;padding:8px 11px;background:rgba(0,0,0,.05);border-radius:var(--r8);font-family:var(--mono);font-size:12.5px;font-weight:700}

/* SUMMARY PANEL */
.sum-panel{background:linear-gradient(135deg,#0f1729,#1e3a5f);border-radius:var(--r16);padding:20px 24px;color:#fff;margin-bottom:18px}
.sum-title{font-size:11px;font-weight:700;color:rgba(255,255,255,.4);text-transform:uppercase;letter-spacing:1px;margin-bottom:14px;display:flex;justify-content:space-between;align-items:center}
.sum-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:14px}
.sum-label{font-size:10.5px;color:rgba(255,255,255,.4);font-weight:600;margin-bottom:3px}
.sum-val{font-size:17px;font-weight:800;font-family:var(--mono);letter-spacing:-.4px}
.sv-blue{color:#93c5fd}.sv-amber{color:#fcd34d}.sv-red{color:#fca5a5}.sv-green{color:#6ee7b7}

/* MODULE TABS */
.mod-tabs{display:flex;border-bottom:2px solid var(--line);overflow-x:auto;background:#fff}
.mod-tab{padding:12px 16px;font-size:12px;font-weight:600;color:var(--ink3);cursor:pointer;border-bottom:2px solid transparent;margin-bottom:-2px;transition:var(--tr);display:flex;align-items:center;gap:6px;white-space:nowrap;user-select:none}
.mod-tab:hover{color:var(--blue);background:var(--blue-lt)}
.mod-tab.act{color:var(--blue);border-bottom-color:var(--blue);font-weight:700}

/* REGIME BANNER */
.r-banner{display:flex;align-items:flex-start;gap:9px;padding:10px 13px;border-radius:var(--r8);font-size:12px;font-weight:600;margin-bottom:14px;line-height:1.5}
.r-new{background:linear-gradient(135deg,#dbeafe,#eff6ff);border:1.5px solid #93c5fd;color:#1e40af}
.r-old{background:linear-gradient(135deg,#fef3c7,#fffbeb);border:1.5px solid #fcd34d;color:#92400e}
.locked-box{{background:"var(--line2)"};border:1.5px dashed var(--line);border-radius:var(--r12);padding:18px;text-align:center;color:var(--ink4);font-size:12.5px;margin:10px 0;line-height:1.7}

/* TABLE */
.tbl-wrap{overflow-x:auto;border:1px solid var(--line);border-radius:var(--r12);margin-bottom:14px}
table{width:100%;border-collapse:collapse;font-size:12px}
thead th{{background:"var(--line2)"};padding:8px 10px;text-align:left;font-size:10.5px;font-weight:700;color:var(--ink3);text-transform:uppercase;letter-spacing:.4px;border-bottom:1px solid var(--line)}
tbody td{padding:8px 10px;border-bottom:1px solid var(--line2);vertical-align:middle}
tbody tr:last-child td{border-bottom:none}
.td-pos{font-family:var(--mono);font-weight:700;color:var(--green)}
.td-neg{font-family:var(--mono);font-weight:700;color:var(--red)}
.td-mono{font-family:var(--mono);font-size:11.5px}
.trade-row td input,.trade-row td select{height:32px;padding:0 7px;border:1.5px solid var(--line);border-radius:5px;font-size:11.5px;font-family:var(--font);width:100%;min-width:70px;outline:none}
.trade-row td input:focus,.trade-row td select:focus{border-color:var(--blue)}
.trade-row .mon-pfx{font-size:10px;left:5px}
.trade-row .mon input{padding-left:17px}

/* UPLOAD */
.upload-zone{border:2px dashed var(--line);border-radius:var(--r12);padding:22px;text-align:center;cursor:pointer;transition:var(--tr);background:#fff;margin-bottom:14px}
.upload-zone:hover{border-color:var(--blue);background:var(--blue-lt)}
input[type=file]{display:none}

/* BREAKDOWN */
.bdt{width:100%;border-collapse:collapse;font-size:12.5px}
.bdt td{padding:8px 4px;border-bottom:1px solid var(--line)}
.bdt tr:last-child td{border-bottom:none}
.bd-lbl{color:var(--ink2)}
.bd-val{text-align:right;font-family:var(--mono);font-weight:600;color:var(--ink)}
.bd-ded{text-align:right;font-family:var(--mono);font-weight:600;color:var(--green)}
.bd-tot{text-align:right;font-family:var(--mono);font-weight:800;color:var(--blue)}

/* FINAL TAX */
.tax-hero{background:linear-gradient(135deg,#0f1729 0%,#1e3a5f 60%,#0f1729 100%);border-radius:var(--r24);padding:28px;color:#fff;margin-bottom:18px}
.tfl-lbl{font-size:11px;font-weight:700;color:rgba(255,255,255,.45);text-transform:uppercase;letter-spacing:1px;margin-bottom:6px}
.tfl-amt{font-size:48px;font-weight:800;font-family:var(--mono);letter-spacing:-2px;line-height:1}
.tfl-sub{font-size:12px;color:rgba(255,255,255,.45);margin-top:5px}
.tfl-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-top:16px}
.tfl-box{background:rgba(255,255,255,.07);border-radius:var(--r12);padding:12px 14px;border:1px solid rgba(255,255,255,.1)}
.tfl-box-lbl{font-size:9.5px;font-weight:700;color:rgba(255,255,255,.38);text-transform:uppercase;letter-spacing:.7px;margin-bottom:4px}
.tfl-box-val{font-size:15px;font-weight:800;font-family:var(--mono);color:#93c5fd}

/* SAVINGS PLAN */
.plan-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:18px}
.plan-card{border:1px solid var(--line);border-radius:var(--r12);padding:14px;background:#fff;position:relative;overflow:hidden}
.plan-card::before{content:'';position:absolute;top:0;left:0;right:0;height:3px}
.plan-urgent::before{background:linear-gradient(90deg,var(--red),#ef4444)}
.plan-high::before{background:linear-gradient(90deg,var(--amber),#f59e0b)}
.plan-normal::before{background:linear-gradient(90deg,var(--blue),#3b82f6)}
.plan-sec{font-size:10px;font-weight:800;color:var(--blue);text-transform:uppercase;letter-spacing:.5px;margin-bottom:3px}
.plan-title{font-size:13px;font-weight:700;margin-bottom:4px;color:var(--ink)}
.plan-desc{font-size:11.5px;color:var(--ink3);line-height:1.5}
.plan-save{font-family:var(--mono);font-size:12px;font-weight:700;color:var(--green);margin-top:6px}
.plan-invest{font-size:11px;font-weight:700;color:var(--purple);margin-top:4px;padding:3px 8px;background:var(--purple-lt);border-radius:4px;display:inline-block}

/* TOOLTIP */
.tip-wrap{position:relative;display:inline-flex;align-items:center;margin-left:3px;vertical-align:middle}
.tip-btn{width:15px;height:15px;border-radius:50%;background:var(--blue-md);display:inline-flex;align-items:center;justify-content:center;font-size:9px;font-weight:900;color:var(--blue);cursor:help;border:1px solid #93c5fd;flex-shrink:0}
.tip-popup{display:none;position:absolute;bottom:calc(100% + 8px);left:50%;transform:translateX(-50%);background:#0f1729;color:#e2e8f0;font-size:11.5px;font-weight:400;padding:10px 14px;border-radius:var(--r8);white-space:normal;max-width:280px;width:250px;z-index:999;box-shadow:0 4px 20px rgba(0,0,0,.35);line-height:1.55;text-transform:none;letter-spacing:0;pointer-events:none;border:1px solid rgba(255,255,255,.1)}
.tip-popup::after{content:'';position:absolute;top:100%;left:50%;transform:translateX(-50%);border:5px solid transparent;border-top-color:#0f1729}
.tip-wrap:hover .tip-popup{display:block}

/* MODAL */
.overlay{position:fixed;inset:0;background:rgba(15,23,41,.65);backdrop-filter:blur(4px);z-index:500;display:flex;align-items:center;justify-content:center;padding:20px}
.modal{background:#fff;border-radius:var(--r24);max-width:520px;width:100%;box-shadow:0 8px 40px rgba(0,0,0,.25);overflow:hidden;animation:mIn .2s ease}
@keyframes mIn{from{opacity:0;transform:translateY(16px) scale(.97)}to{opacity:1;transform:none}}
.modal-head{background:linear-gradient(135deg,#0f1729,#1e3a5f);padding:22px 26px;color:#fff}
.modal-body{padding:22px 26px}
.modal-foot{padding:14px 26px;border-top:1px solid var(--line);{background:"var(--line2)"};display:flex;justify-content:flex-end;gap:10px}

/* VIPIN CARD */
.vipin-card{background:linear-gradient(135deg,#1a56db,#7c3aed);border-radius:var(--r16);padding:20px 22px;color:#fff;margin-top:16px;margin-bottom:4px}
.vc-name{font-size:15px;font-weight:800;margin-bottom:2px}
.vc-role{font-size:11px;color:rgba(255,255,255,.6);margin-bottom:12px}
.vc-btns{display:flex;gap:9px;flex-wrap:wrap}
.vc-btn{display:inline-flex;align-items:center;gap:6px;padding:8px 14px;border-radius:8px;font-size:12px;font-weight:700;cursor:pointer;border:none;transition:var(--tr);text-decoration:none}
.vc-w{background:#fff;color:var(--blue)}.vc-w:hover{background:#eff6ff}
.vc-o{background:rgba(255,255,255,.12);color:#fff;border:1.5px solid rgba(255,255,255,.3)}.vc-o:hover{background:rgba(255,255,255,.22)}

/* HERO */
.hero-wrap{background:linear-gradient(180deg,#eff6ff,#f9fafb);padding:52px 24px 40px;text-align:center}
.hero-eyebrow{display:inline-flex;align-items:center;gap:7px;background:#dbeafe;color:var(--blue);font-size:11px;font-weight:700;padding:5px 13px;border-radius:20px;margin-bottom:16px;border:1px solid #bfdbfe}
.hero-h{font-size:36px;font-weight:800;letter-spacing:-1.2px;line-height:1.15;margin-bottom:10px}
.hero-h em{color:var(--blue);font-style:normal}

<script type="text/babel">
const {useState,useRef,useMemo,useEffect,useCallback} = React;
const EMAIL = 'audit.vipin@gmail.com';
const METRO = ['Delhi','Mumbai','Kolkata','Chennai'];
const METROS_NEW = ['Delhi','Mumbai','Kolkata','Chennai','Bengaluru','Hyderabad','Pune','Ahmedabad'];
const actFor = (fy) => { const y = parseInt((fy||'2026-27').split('-')[0],10); return y>=2026?'new2025':'old1961'; };
const isMetroFor = (city,act) => (act==='new2025'?METROS_NEW:METRO).some(m=>city&&city.toLowerCase().includes(m.toLowerCase()));

/* ── HELPERS ── */
const inr = v => {
  const num = parseFloat(v) || 0;
  const abs = Math.abs(Math.round(num));
  return (num < 0 ? '- ' : '') + '\u20B9' + abs.toLocaleString('en-IN');
};
const n = v => parseFloat(v) || 0;
const pct = (a,b) => b > 0 ? (a/b*100).toFixed(1)+'%' : '0%';

/* ════════════════════════════════════════════════════════
   CLAUDE AI ENGINE
   - callAI: direct Anthropic API call
   - AITablePanel: embedded tab panel (auto-runs, table output)
   - FloatingAI: floating chat button + panel
════════════════════════════════════════════════════════ */

const SYSTEM_PROMPT = `You are an expert Indian Chartered Accountant and Tax Advisor for FY 2026-27. Work like a senior KPMG/PWC tax partner.

RESPONSE FORMAT Return ONLY a JSON object:
{"summary":"2-3 sentence assessment with total potential tax saving","rows":[{"priority":"HIGH|MEDIUM|LOW","section":"80C/80D/NPS etc","opportunity":"Specific action","invest":"Exact Rs amount","taxSaving":"Rs tax saved","deadline":"When to act"}],"topAction":"Single most impactful step right now"}

FY 2026-27 KEY RULES:
NEW REGIME: Exemption Rs 4L, 87A rebate zero tax up to Rs 12L, Std Deduction Rs 75K, Employer NPS 80CCD(2) 14% of Basic. NO other deductions.
OLD REGIME: 80C Rs 1.5L, 80CCD(1B) NPS extra Rs 50K, 80D self Rs 25K/Rs 50K senior, 80D parents Rs 25K/Rs 50K senior, Sec 24b home loan Rs 2L, 80TTA Rs 10K/80TTB Rs 50K, 80G donations, 80E education loan no cap.
CAPITAL GAINS: STCG equity 20%, LTCG equity 12.5% (Rs 1.25L exempt/year), Debt MF slab, FnO speculative slab.
LTCG HARVEST: Book Rs 1.25L LTCG every April — zero tax. Best zero-cost saving.
Return ONLY the JSON. No markdown outside JSON.`;

/* ════════════════════════════════════
   MULTI-PROVIDER AI ENGINE
   Supports: Anthropic, Groq, Gemini, OpenAI
   Key stored in sessionStorage (cleared on tab close)
════════════════════════════════════ */

// Provider configurations
const AI_PROVIDERS = {
  anthropic: {
    name: 'Anthropic Claude',
    models: ['claude-haiku-4-5-20251001', 'claude-sonnet-4-20250514'],
    modelLabels: ['Claude Haiku (Fast, Free Tier)', 'Claude Sonnet (Powerful)'],
    free: false,
    placeholder: 'sk-ant-api03-...',
    docsUrl: 'https://console.anthropic.com/keys',
    color: '#d97706'
  },
  groq: {
    name: 'Groq (Free)',
    models: ['llama-3.3-70b-versatile', 'llama-3.1-8b-instant', 'mixtral-8x7b-32768', 'gemma2-9b-it'],
    modelLabels: ['LLaMA 3.3 70B (Best)', 'LLaMA 3.1 8B (Fastest)', 'Mixtral 8x7B', 'Gemma 2 9B'],
    free: true,
    placeholder: 'gsk_...',
    docsUrl: 'https://console.groq.com/keys',
    color: '#059669'
  },
  gemini: {
    name: 'Google Gemini',
    models: ['gemini-1.5-flash', 'gemini-1.5-pro'],
    modelLabels: ['Gemini 1.5 Flash (Fast, Free)', 'Gemini 1.5 Pro (Powerful)'],
    free: true,
    placeholder: 'AIza...',
    docsUrl: 'https://aistudio.google.com/app/apikey',
    color: '#1a56db'
  },
  openai: {
    name: 'OpenAI ChatGPT',
    models: ['gpt-4o-mini', 'gpt-4o'],
    modelLabels: ['GPT-4o Mini (Fast, Cheap)', 'GPT-4o (Most Powerful)'],
    free: false,
    placeholder: 'sk-...',
    docsUrl: 'https://platform.openai.com/api-keys',
    color: '#059669'
  }
};

// Session storage keys
const STORAGE_KEY = 'taxsmart_ai_config';

const loadAIConfig = () => {
  try { return JSON.parse(sessionStorage.getItem(STORAGE_KEY) || 'null'); } catch(e) { return null; }
};
const saveAIConfig = (cfg) => {
  try { sessionStorage.setItem(STORAGE_KEY, JSON.stringify(cfg)); } catch(e) {}
};
const clearAIConfig = () => { try { sessionStorage.removeItem(STORAGE_KEY); } catch(e) {} };

// Universal AI call — routes to the right provider
const callAI = async (userMessage) => {
  const cfg = loadAIConfig();
  if (!cfg || !cfg.apiKey || !cfg.provider) throw new Error('NO_KEY');

  const { provider, model, apiKey } = cfg;

  if (provider === 'anthropic') {
    const res = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: {'Content-Type':'application/json','x-api-key':apiKey,'anthropic-version':'2023-06-01'},
      body: JSON.stringify({model, max_tokens:1000, system:SYSTEM_PROMPT, messages:[{role:'user',content:userMessage}]})
    });
    if (!res.ok) { const e=await res.json(); throw new Error(e.error?.message||'Anthropic API error '+res.status); }
    const d = await res.json();
    return d.content[0].text;
  }

  if (provider === 'groq') {
    const res = await fetch('https://api.groq.com/openai/v1/chat/completions', {
      method: 'POST',
      headers: {'Content-Type':'application/json','Authorization':'Bearer '+apiKey},
      body: JSON.stringify({model, max_tokens:1000, messages:[{role:'system',content:SYSTEM_PROMPT},{role:'user',content:userMessage}]})
    });
    if (!res.ok) { const e=await res.json(); throw new Error(e.error?.message||'Groq API error '+res.status); }
    const d = await res.json();
    return d.choices[0].message.content;
  }

  if (provider === 'gemini') {
    const url = `https://generativelanguage.googleapis.com/v1beta/models/${model}:generateContent?key=${apiKey}`;
    const res = await fetch(url, {
      method: 'POST',
      headers: {'Content-Type':'application/json'},
      body: JSON.stringify({contents:[{parts:[{text: SYSTEM_PROMPT + '\n\nUser: ' + userMessage}]}], generationConfig:{maxOutputTokens:1000}})
    });
    if (!res.ok) { const e=await res.json(); throw new Error(e.error?.message||'Gemini API error '+res.status); }
    const d = await res.json();
    return d.candidates[0].content.parts[0].text;
  }

  if (provider === 'openai') {
    const res = await fetch('https://api.openai.com/v1/chat/completions', {
      method: 'POST',
      headers: {'Content-Type':'application/json','Authorization':'Bearer '+apiKey},
      body: JSON.stringify({model, max_tokens:1000, messages:[{role:'system',content:SYSTEM_PROMPT},{role:'user',content:userMessage}]})
    });
    if (!res.ok) { const e=await res.json(); throw new Error(e.error?.message||'OpenAI API error '+res.status); }
    const d = await res.json();
    return d.choices[0].message.content;
  }

  throw new Error('Unknown provider: ' + provider);
};

/* ── API KEY SETUP MODAL ── */
const AISetupModal = ({onDone, onClose}) => {
  const existing = loadAIConfig();

const parseAI = raw => {
  try {
    const clean = raw.replace(/```json\n?/g,'').replace(/```/g,'').trim();
    return JSON.parse(clean);
  } catch(e) {
    return {summary: raw, rows: [], topAction: ''};
  }
};

/* ── TAX ENGINE FY 2026-27 ──
   NEW REGIME (Finance Act 2025):
   Basic exemption: Rs 4,00,000
   87A rebate: net income up to Rs 12,00,000 = zero tax
   Std deduction: Rs 75,000 (salaried)
   Employer NPS 80CCD(2): 14% of Basic
   Marginal relief: income Rs 12L-12.75L, tax capped at (income - 12L)
   OLD REGIME: unchanged slabs, all deductions available
*/
const TAX = {
  newRegime: income => {
    if (income <= 1200000) return 0;
    const slabs = [
      [0,400000,0],[400000,800000,.05],[800000,1200000,.10],
      [1200000,1600000,.15],[1600000,2000000,.20],[2000000,2400000,.25],[2400000,Infinity,.30]
    ];
    let tax = 0;
    for (const [f,t,r] of slabs) {
      if (income <= f) break;
      tax += (Math.min(income,t) - f) * r;
    }
    if (income > 1200000 && income <= 1275000) tax = Math.min(tax, income - 1200000);
    const sur = income>50000000?tax*.37:income>20000000?tax*.25:income>10000000?tax*.15:income>5000000?tax*.10:0;
    return Math.round((tax + sur) * 1.04);
  },
  oldRegime: (income, isSenior, isSuperSenior) => {
    const basic = isSuperSenior ? 500000 : isSenior ? 300000 : 250000;
    if (income <= 500000) return 0;
    let tax = 0;
    if (income > basic) tax += (Math.min(income,500000) - basic) * .05;
    if (income > 500000) tax += (Math.min(income,1000000) - 500000) * .20;
    if (income > 1000000) tax += (income - 1000000) * .30;
    const sur = income>50000000?tax*.37:income>20000000?tax*.25:income>10000000?tax*.15:income>5000000?tax*.10:0;
    return Math.round((tax + sur) * 1.04);
  },
  hra: (basic, da, hraRec, rent, metro) => {
    if (!rent || rent <= 0) return 0;
    const sal = basic + da;
    return Math.max(0, Math.min(hraRec, rent - sal*.10, sal*(metro?.50:.40)));
  },
  cgains: (buyDate, sellDate, cost, proceeds, type) => {
    if (!buyDate || !sellDate) return null;
    const days = Math.round((new Date(sellDate) - new Date(buyDate)) / 86400000);
    const gain = n(proceeds) - n(cost);
    let cls, rate;
    if (type === 'Intraday' || type === 'F&O') { cls = 'Speculative'; rate = 0; }
    else if (type === 'Debt MF' || type === 'Bonds') { cls = 'Debt'; rate = .30; }
    else { const lt = days > 365; cls = lt ? 'LTCG' : 'STCG'; rate = lt ? .125 : .20; }
    return {days, gain, cls, rate};
  }
};

/* ── TAX ADVISOR (KPMG-style) ── */
const advisor = (income, regime, used80C, usedNPS, usedHealth, usedLoanInt) => {
  const plans = [];
  const slab = income > 1000000 ? .30 : income > 500000 ? .20 : .05;
  const save = ded => inr(Math.round(ded * slab * 1.04));
  if (regime === 'old') {
    const gap80C = Math.max(0, 150000 - n(used80C));
    if (gap80C > 0) plans.push({p:'urgent',sec:'Section 80C',title:'Maximise 80C: Unused Limit',
      desc:'Invest in ELSS (3yr lock, market returns) or PPF (7.1% tax-free) to utilise full Rs 1.5L limit.',
      invest:inr(gap80C), save:save(gap80C)});
    if (n(usedNPS) < 50000) plans.push({p:'urgent',sec:'80CCD(1B)',title:'Open NPS: Extra Rs 50K Deduction',
      desc:'Completely SEPARATE from 80C limit. Open NPS Tier-1 at your bank. Best deduction after 80C in old regime.',
      invest:inr(50000 - n(usedNPS)), save:save(50000 - n(usedNPS))});
    if (n(usedHealth) < 25000) plans.push({p:'high',sec:'Section 80D',title:'Health Insurance: Deduction Unused',
      desc:'Buy family floater policy. Rs 25,000 premium saves tax AND gives Rs 10L+ medical coverage for your family.',
      invest:inr(25000 - n(usedHealth)), save:save(25000 - n(usedHealth))});
    if (n(usedLoanInt) < 200000 && income > 800000) plans.push({p:'normal',sec:'Sec 24(b)',title:'Home Loan Interest: Rs 2L Deduction',
      desc:'Home loan interest deduction saves significant tax at your slab. Also builds long-term asset.',
      invest:'Home loan EMI interest', save:save(200000 - n(usedLoanInt))});
    if (income > 1500000) plans.push({p:'normal',sec:'Section 80G',title:'Donations: 100% Deduction',
      desc:'Donate to PM CARES, CRY, Helpage India via UPI/cheque. 100% deduction. Rs 50K donation costs only Rs 35K net at 30% slab.',
      invest:'Rs 50,000 suggested', save:save(50000)});
  } else {
    if (income > 1400000) plans.push({p:'urgent',sec:'80CCD(2)',title:'Employer NPS: Only Major Deduction in New Regime',
      desc:'Ask HR to route 14% of Basic as Employer NPS. ONLY significant deduction in New Regime beyond Rs 75K std deduction.',
      invest:'14% of Basic via employer', save:'Up to Rs 84,000+'});
    plans.push({p:'high',sec:'LTCG Harvest',title:'Book Rs 1.25L LTCG Every Year: Free',
      desc:'Every April: book equity profits up to Rs 1.25L (zero tax). Sell and rebuy next day to reset cost. Do this EVERY year.',
      invest:'Review portfolio in April', save:'Rs 15,625/year recurring'});
    if (income > 2400000) plans.push({p:'normal',sec:'Regime Switch',title:'Consider Old Regime at Your Income Level',
      desc:'With full 80C + NPS + Home Loan + Health Insurance deductions, old regime often saves Rs 50K-Rs 2L more above Rs 24L income.',
      invest:'Compute with deductions', save:'Compute to find'});
  }
  return plans;
};

            <label>Estimated Total Annual Income (all sources) <Tip t="Add up salary + freelance + rental + capital gains approximately. Exact module-wise entry in Step 3. This is only for regime comparison."/></label>
            <Mon value={gross} onChange={e => setGross(e.target.value)} placeholder="1500000"/>
            <span className="hint">Approximate is fine — exact inputs in Step 3</span>
          </div>
          <Al type="blue" icon="📌">
            <b>FY 2026-27 Key Changes (Finance Act 2025):</b> New Regime basic exemption raised to Rs 4,00,000. 87A rebate extended — zero tax up to Rs 12,00,000 net income. Standard Deduction Rs 75,000 for salaried. Employer NPS deduction raised to 14% of Basic. New Regime is now the <b>default</b>.
          </Al>
          <div className="rc-grid">
            <div className={'rc' + (regime==='new'?' sel':'') + (rec==='new'&&income>0?' rec':'')} onClick={() => setRegime('new')}>
              {rec==='new'&&income>0&&<div className="rc-badge">Recommended for You</div>}
              <div className="rc-chk">{regime==='new'?'✓':''}</div>
              <div className="rc-title">New Regime (FY 2026-27)</div>
              <div className="rc-sub"><b>Default from FY 2024-25.</b> Lower rates, zero paperwork. Zero tax up to Rs 12L income!</div>
              {[['Up to Rs 4,00,000','NIL','nil'],['Rs 4L to Rs 8L','5%','low'],['Rs 8L to Rs 12L','10%','low'],['Rs 12L to Rs 16L','15%','mid'],['Rs 16L to Rs 20L','20%','mid'],['Rs 20L to Rs 24L','25%','mid'],['Above Rs 24L','30%','hi']].map(([range,rate,cls]) => (
                <div className="slab-row" key={range}><span className="sr-range">{range}</span><span className={'sr-rate ' + cls}>{rate}</span></div>
              ))}
              {income>0&&<div className="rc-tax-box" style={{color:'var(--blue)'}}>{inr(newTax)}{income<=1200000?' · Zero tax via Sec 87A rebate':''}</div>}
              <div style={{marginTop:10,fontSize:11,color:'var(--ink4)',lineHeight:1.7}}>
                ✅ Rs 75,000 Standard Deduction (salaried)<br/>
                ✅ Employer NPS 80CCD(2) · 14% of Basic<br/>
                ✅ 87A Rebate: Zero tax up to Rs 12L income<br/>
                ❌ No 80C, HRA, 80D, Home Loan, LTA
              </div>
            </div>
            <div className={'rc' + (regime==='old'?' sel':'') + (rec==='old'&&income>0?' rec':'')} onClick={() => setRegime('old')}>
              {rec==='old'&&income>0&&<div className="rc-badge">Recommended for You</div>}
              <div className="rc-chk">{regime==='old'?'✓':''}</div>
              <div className="rc-title">Old Regime</div>
              <div className="rc-sub">Higher rates but <b>40+ deductions</b>. Best if you invest in 80C, pay home loan, or get HRA.</div>
              {[
                ['Up to Rs '+(profile.isSuperSenior?'5,00,000':profile.isSenior?'3,00,000':'2,50,000'),'NIL','nil'],
                ['Rs '+(profile.isSuperSenior?'5L':profile.isSenior?'3L':'2.5L')+' to Rs 5L','5%','low'],
                ['Rs 5L to Rs 10L','20%','mid'],
                ['Above Rs 10L','30%','hi']
              ].map(([range,rate,cls]) => (
                <div className="slab-row" key={range}><span className="sr-range">{range}</span><span className={'sr-rate ' + cls}>{rate}</span></div>
              ))}
              {income>0&&<div className="rc-tax-box" style={{color:'var(--ink3)'}}>Before deductions: {inr(oldTax)}</div>}
              <div style={{marginTop:10,fontSize:11,color:'var(--ink4)',lineHeight:1.7}}>
                ✅ 80C: Rs 1.5L (ELSS / PPF / LIC / EPF)<br/>
                ✅ HRA exemption (salary + rent paid)<br/>
                ✅ 80D: Health Insurance Rs 25K-Rs 50K<br/>
                ✅ Home Loan Interest Sec 24(b): Rs 2L<br/>
                ✅ NPS 80CCD(1B): Extra Rs 50K over 80C
              </div>
            </div>
          </div>
          {regime==='new'&&income<=1200000&&income>0&&(
            <Al type="green" icon="🎉">
              <b>Zero Tax!</b> Income of {inr(income)} is within Rs 12,00,000 — you pay ZERO TAX under New Regime via Section 87A rebate. Just file ITR.
            </Al>
          )}
        </div>
        <div className="card-foot">
          <span style={{fontSize:11.5,color:'var(--ink4)'}}>You can switch regime anytime in Step 3.</span>
          <button className="btn btn-primary" onClick={() => { onDone(regime); window.scrollTo(0,0); }}>
            Continue to Income Details →
          </button>
        </div>
      </div>
    </div>
  );
};

/* ── MODULE A: SALARIED ── */
const ModSalary = ({regime, profile, onUpdate}) => {
  const [d,setD] = useState({
    basic:'',da:'',hra_rec:'',lta:'',child_edu:'',hostel:'',food:'',transport:'',uniform:'',other_allow:'',
    bonus:'',commission:'',arrears:'',perq_car:'',perq_accom:'',perq_esop:'',perq_other:'',
    rent_paid:'',landlord_pan:'',
    epf_emp:'',epf_er:'',vpf:'',employer_nps:'',
    life_ins:'',elss:'',ppf:'',nsc:'',taxfd:'',sukanya:'',home_prin:'',tuition:'',
    nps_1b:'',
    health_self:'',health_par:'',par_senior:false,
    loan_int:'',loan_int2:'',edu_loan:'',savings_int:'',donation:'',
    lta_claim:''
  });
  const s = k => e => setD(p => ({...p,[k]:e.target.type==='checkbox'?e.target.checked:e.target.value}));
  const sv = (k,v) => setD(p => ({...p,[k]:v}));

  const act = actFor(profile.fy);
  const isMetro = isMetroFor(profile.city||'', act);
  const basic=n(d.basic), da=n(d.da), hraR=n(d.hra_rec), rent=n(d.rent_paid);
  const hraExempt = regime==='old' ? TAX.hra(basic,da,hraR,rent,isMetro) : 0;
  const stdDed = regime==='new' ? 75000 : 50000;
  const ltaEx = regime==='old' ? Math.min(n(d.lta), n(d.lta_claim)) : 0;

  const grossSalary = basic+da+hraR+n(d.lta)+n(d.child_edu)+n(d.hostel)+n(d.food)+n(d.transport)+n(d.uniform)+n(d.other_allow)+n(d.bonus)+n(d.commission)+n(d.arrears)+n(d.perq_car)+n(d.perq_accom)+n(d.perq_esop)+n(d.perq_other);

  const total80C = n(d.epf_emp)+n(d.vpf)+n(d.life_ins)+n(d.elss)+n(d.ppf)+n(d.nsc)+n(d.taxfd)+n(d.sukanya)+n(d.home_prin)+n(d.tuition);
  const elig80C = regime==='old' ? Math.min(total80C, 150000) : 0;
  const nps1b = regime==='old' ? Math.min(n(d.nps_1b), 50000) : 0;
  const empNPS = regime==='new' ? Math.min(n(d.employer_nps), basic*.14) : Math.min(n(d.employer_nps), basic*.10);
  const hSelf = regime==='old' ? Math.min(n(d.health_self), profile.isSenior?50000:25000) : 0;
  const hPar = regime==='old' ? Math.min(n(d.health_par), d.par_senior?50000:25000) : 0;
  const loanInt = regime==='old' ? Math.min(n(d.loan_int), 200000) : 0;
  const savInt = regime==='old' ? Math.min(n(d.savings_int), profile.isSenior?50000:10000) : 0;
  const totalDed = elig80C + nps1b + empNPS + hSelf + hPar + loanInt + savInt + n(d.donation) + n(d.edu_loan);
  const eduCap = act==='new2025' ? 36000 : 4800;
  const hostelCap = act==='new2025' ? 108000 : 7200;
  const totalExempt = regime==='old' ? hraExempt + ltaEx + Math.min(n(d.child_edu),eduCap) + Math.min(n(d.hostel),hostelCap) : 0;
  const netTaxable = Math.max(0, grossSalary - stdDed - totalExempt - totalDed);

  // Report to parent - use useRef to avoid stale closure
  const prevNet = useRef(null);
  if (prevNet.current !== netTaxable) {
    prevNet.current = netTaxable;
    setTimeout(() => onUpdate && onUpdate({netTaxable,hraExempt,elig80C:total80C,npsOwn:n(d.nps_1b),healthSelf:hSelf,healthPar:hPar,homeLoanInt:loanInt}), 0);
  }

  return (
    <div>
      <RegimeBanner regime={regime}/>
      <Al type="blue" icon="📋">
        <b>How to fill:</b> Use salary slip (monthly × 12) and Form 16 Part B. Every field has a <b>?</b> tooltip — hover for detailed explanation.
      </Al>
      <Div label="Basic Salary Components"/>
      <div className="grid g3" style={{rowGap:14}}>
        <div className="fg"><label>Basic Salary (Annual) <Tip t="Base fixed component. Usually 40-50% of CTC. Find on salary slip (monthly) and multiply x 12. Forms the basis for HRA, PF, Gratuity."/></label><Mon value={d.basic} onChange={s('basic')} placeholder="600000"/></div>
        <div className="fg"><label>Dearness Allowance (DA) <Tip t="Inflation-linked allowance. Paid mainly by government and PSU employers. Private sector employees: enter 0 unless your salary slip shows a separate DA component."/></label><Mon value={d.da} onChange={s('da')} placeholder="0"/></div>
        <div className="fg"><label>HRA Received (Annual) <Tip t="House Rent Allowance your EMPLOYER pays you. Find on salary slip as HRA. Multiply monthly HRA x 12. This is NOT the rent you pay — it is what you receive."/></label><Mon value={d.hra_rec} onChange={s('hra_rec')} placeholder="240000"/></div>
        <div className="fg"><label>LTA (Annual) <Tip t="Leave Travel Allowance. Old Regime: exempt for actual India travel (shortest route, economy class) for 2 journeys in 4-year block. New Regime: fully taxable."/></label><Mon value={d.lta} onChange={s('lta')} placeholder="50000"/></div>
        <div className="fg"><label>Children Education Allowance <Tip t="Old Regime: exempt up to Rs 100 per month per child (max 2 children) = Rs 2,400 per year. Anything above is taxable."/></label><Mon value={d.child_edu} onChange={s('child_edu')} placeholder="4800"/></div>
        <div className="fg"><label>Hostel Allowance <Tip t="Old Regime: exempt up to Rs 300 per month per child (max 2 children) = Rs 7,200 per year. For children staying in hostels for education."/></label><Mon value={d.hostel} onChange={s('hostel')} placeholder="7200"/></div>
        <div className="fg"><label>Food/Meal Card Allowance <Tip t="Old Regime: tax exempt up to Rs 50 per meal x 2 meals x 26 working days x 12 = Rs 31,200 per year. Sodexo, Zomato meal cards qualify."/></label><Mon value={d.food} onChange={s('food')} placeholder="26400"/></div>
        <div className="fg"><label>Transport Allowance <Tip t="Since FY 2018-19, Standard Deduction absorbs this. Fully taxable now except for handicapped employees (Rs 3,200 per month exempt). Enter amount received."/></label><Mon value={d.transport} onChange={s('transport')} placeholder="19200"/></div>
        <div className="fg"><label>Bonus / Variable Pay <Tip t="Annual performance bonus, incentive, or variable pay. Fully taxable in year of receipt. Timing matters: April bonus falls in new FY."/></label><Mon value={d.bonus} onChange={s('bonus')} placeholder="100000"/></div>
        <div className="fg"><label>Commission <Tip t="Commission component based on sales achieved. Fully taxable. Include actual amount received in FY 2026-27."/></label><Mon value={d.commission} onChange={s('commission')} placeholder="0"/></div>
        <div className="fg"><label>Salary Arrears <Tip t="Arrears for previous years received in FY 2026-27. Taxable in year of receipt but claim Sec 89(1) relief — file Form 10E on IT portal BEFORE filing ITR."/></label><Mon value={d.arrears} onChange={s('arrears')} placeholder="0"/></div>
        <div className="fg"><label>Special and Other Allowances <Tip t="Any other component — Special Allowance, City Compensatory Allowance, Skill Allowance etc. Typically fully taxable. Check your salary slip."/></label><Mon value={d.other_allow} onChange={s('other_allow')} placeholder="120000"/></div>
      </div>

      <Div label="Perquisites (Form 12BA)"/>
      <div className="grid g4" style={{rowGap:14}}>
        <div className="fg"><label>Car Perquisite <Tip t="Company car for personal use: Rs 2,400 per month (up to 1600cc) or Rs 3,400 per month (above 1600cc). With chauffeur: add Rs 900 per month. Check Form 12BA."/></label><Mon value={d.perq_car} onChange={s('perq_car')} placeholder="0"/></div>
        <div className="fg"><label>Accommodation <Tip t="Company-provided housing: 15% of salary (govt category cities) or 10% (other cities) minus rent recovered from you. From Form 16 Part B."/></label><Mon value={d.perq_accom} onChange={s('perq_accom')} placeholder="0"/></div>
        <div className="fg"><label>ESOPs or RSUs <Tip t="On exercise or vest: FMV minus exercise price is taxable as salary. Employer withholds TDS. Check Form 12BA for the exact taxable value."/></label><Mon value={d.perq_esop} onChange={s('perq_esop')} placeholder="0"/></div>
        <div className="fg"><label>Other Perquisites <Tip t="Club memberships, gifts above Rs 5,000 from employer, concessional loans, free meals beyond exemption. Refer to Form 12BA for exact amount."/></label><Mon value={d.perq_other} onChange={s('perq_other')} placeholder="0"/></div>
      </div>

      <Div label="HRA and Rent Details"/>
      <div className="grid g3" style={{rowGap:14}}>
        <div className="fg">
          <label>Rent Paid (Annual) <Tip t="Total rent you paid to landlord in FY 2026-27. Annual = monthly rent x 12. Keep rent receipts. Mandatory landlord PAN if annual rent exceeds Rs 1,00,000."/></label>
          <Mon value={d.rent_paid} onChange={s('rent_paid')} placeholder="180000"/>
          {n(d.rent_paid) > 100000 && !d.landlord_pan && <span className="emsg">Landlord PAN mandatory for rent above Rs 1L/year</span>}
        </div>
        <div className="fg">
          <label>Landlord PAN <Tip t="Mandatory if annual rent exceeds Rs 1,00,000. Submit via Form 12BB to employer. Without this, employer cannot give HRA exemption and will deduct full TDS."/></label>
          <input type="text" value={d.landlord_pan} onChange={s('landlord_pan')} placeholder="ABCDE1234F" style={{fontFamily:'var(--mono)',letterSpacing:1.5}}/>
        </div>
        <div className="fg">
          <label>HRA Exemption (Auto-Calculated) <Tip t="Least of 3: (1) HRA received, (2) Rent paid minus 10% of Basic+DA, (3) 50% of Basic+DA for metro cities or 40% for non-metro. Old Regime only."/></label>
          <div className={'aval' + (hraExempt>0?' gv':'')}>{regime==='old' ? inr(Math.round(hraExempt)) : 'HRA fully taxable in New Regime'}</div>
          {regime==='old' && <span className="hint">{profile.city} = {isMetro?'Metro 50%':'Non-Metro 40%'} ({act==='new2025'?'New Act 2025':'IT Act 1961'}) | Exempt: {inr(Math.round(hraExempt))}</span>}
        </div>
        {regime==='old' && (
          <div className="fg s3">
            <label>LTA Actual Travel Amount Claimed <Tip t="Actual travel bills submitted for LTA exemption. Exemption = min(LTA received, actual travel cost). Travel within India by shortest route. Economy air or train only."/></label>
            <Mon value={d.lta_claim} onChange={s('lta_claim')} placeholder="0"/>
          </div>
        )}
      </div>

      <Div label="Provident Fund and Retirement"/>
      <div className="grid g4" style={{rowGap:14}}>
        <div className="fg">
          <label>EPF Employee Contribution <Tip t="12% of Basic+DA deducted from salary. Old Regime: qualifies for 80C. New Regime: 80C not available but EPF grows tax-free. Check salary slip."/></label>
          <Mon value={d.epf_emp} onChange={s('epf_emp')} placeholder={basic?String(Math.round(basic*.12)):'72000'}/>
          {basic>0&&<span className="hint">12% of Basic = {inr(Math.round(basic*.12))}</span>}
        </div>
        <div className="fg">
          <label>EPF Employer Contribution <Tip t="Employer contributes 12% of Basic+DA. Tax-free up to Rs 7.5L per year (aggregate PF+NPS+Superannuation). Excess over Rs 7.5L is taxable perquisite."/></label>
          <Mon value={d.epf_er} onChange={s('epf_er')} placeholder={basic?String(Math.round(basic*.12)):'72000'}/>
          {n(d.epf_er)>750000&&<span className="emsg">Employer PF above Rs 7.5L — excess is taxable</span>}
        </div>
        <div className="fg">
          <label>VPF (Voluntary PF) <Tip t="Additional voluntary contribution beyond mandatory 12%. Same interest rate (8.1%) and tax treatment. Old Regime: qualifies for 80C. Interest tax-free up to Rs 2.5L annual PF contribution."/></label>
          <Mon value={d.vpf} onChange={s('vpf')} placeholder="0"/>
        </div>
        <div className="fg">
          <label>Employer NPS 80CCD(2) <Tip t="If employer routes part of CTC via NPS. Old Regime: up to 10% of Basic deductible. New Regime: up to 14% of Basic deductible. AVAILABLE IN BOTH REGIMES — the only major deduction in New Regime besides Rs 75K standard deduction."/></label>
          <Mon value={d.employer_nps} onChange={s('employer_nps')} placeholder="0"/>
          {basic>0&&<span className="hint">Max: {inr(Math.round(basic*(regime==='new'?.14:.10)))} ({regime==='new'?'14%':'10%'} of Basic in {regime} regime)</span>}
        </div>
      </div>

      {regime === 'old' ? (
        <>
          <Div label="Section 80C Investments · Combined Limit Rs 1,50,000"/>
          <Al type="blue" icon="💡">
            <b>80C Strategy:</b> Total cap Rs 1.5L across ALL items below (including EPF above). Priority: ELSS (highest returns, 3yr lock) then NPS then PPF. Do not over-invest in low-return Tax-Saver FDs.
          </Al>
          <div className="grid g3" style={{rowGap:14}}>
            <div className="fg"><label>Life Insurance Premium <Tip t="LIC or private insurance premium for self, spouse and children. Eligible: premium up to 10% of Sum Assured (post 1-Apr-2012 policies). Term insurance premiums also qualify."/></label><Mon value={d.life_ins} onChange={s('life_ins')} placeholder="50000"/></div>
            <div className="fg"><label>ELSS Mutual Fund <Tip t="Best 80C option. 3-year lock-in. Market-linked returns (historically 12-15% long term). SIP or lump sum. Gains taxed at 12.5% LTCG above Rs 1.25L on maturity."/></label><Mon value={d.elss} onChange={s('elss')} placeholder="50000"/></div>
            <div className="fg"><label>PPF <Tip t="Government-backed, 7.1% p.a. tax-free. 15-year lock-in. EEE status (Exempt-Exempt-Exempt). Best for risk-averse investors. Max Rs 1.5L per year."/></label><Mon value={d.ppf} onChange={s('ppf')} placeholder="0"/></div>
            <div className="fg"><label>NSC <Tip t="Post office scheme, 5-year lock-in, 7.7% p.a. Accrued interest (except last year) is reinvested and also qualifies as fresh 80C investment. Government-backed."/></label><Mon value={d.nsc} onChange={s('nsc')} placeholder="0"/></div>
            <div className="fg"><label>Tax-Saver FD (5-Year) <Tip t="Bank FD with 5-year lock-in. Interest is TAXABLE (unlike PPF). Rates 6.5-7.5%. Least attractive 80C option. Choose only if you cannot invest in ELSS or PPF."/></label><Mon value={d.taxfd} onChange={s('taxfd')} placeholder="0"/></div>
            <div className="fg"><label>Sukanya Samriddhi <Tip t="For girl child below 10 years. 8.2% p.a. — highest government scheme rate. EEE status. Matures when girl turns 21. Max Rs 1.5L per year."/></label><Mon value={d.sukanya} onChange={s('sukanya')} placeholder="0"/></div>
            <div className="fg"><label>Home Loan Principal <Tip t="Annual principal repayment component of home loan EMI. Qualifies for 80C subject to Rs 1.5L total cap. Check bank amortisation schedule."/></label><Mon value={d.home_prin} onChange={s('home_prin')} placeholder="0"/></div>
            <div className="fg"><label>Tuition Fees <Tip t="Full-time education fees for up to 2 own children at any Indian school, college or university. Only tuition fee — NOT development fees, donations, or private coaching fees."/></label><Mon value={d.tuition} onChange={s('tuition')} placeholder="0"/></div>
            <div className="fg">
              <label>80C Total Used</label>
              <div className={'aval' + (total80C>=150000?' gv':'')}>{inr(elig80C)} <span style={{fontSize:10,marginLeft:4,color:'var(--ink4)'}}>of Rs 1,50,000 limit</span></div>
              {total80C > 150000 && <span className="hint" style={{color:'var(--amber)'}}>Invested {inr(total80C)} but only Rs 1.5L is deductible. Extra {inr(total80C-150000)} gives no additional benefit.</span>}
              {total80C < 150000 && total80C > 0 && <span className="hint" style={{color:'var(--blue)'}}>Gap: {inr(150000-total80C)} — invest more to reach full Rs 1.5L limit</span>}
            </div>
          </div>

          <Div label="NPS · Additional Rs 50,000 Deduction (Sec 80CCD 1B)"/>
          <div className="grid g3" style={{rowGap:14}}>
            <div className="fg"><label>Your Own NPS Contribution <Tip t="Voluntary contribution to your own NPS Tier-1 account. Deduction up to Rs 50,000 EXTRA — completely separate from and in addition to Rs 1.5L 80C limit. Open at nps.kfintech.com or your bank."/></label><Mon value={d.nps_1b} onChange={s('nps_1b')} placeholder="50000"/></div>
            <div className="fg"><label>NPS Deduction Eligible</label><div className="aval gv">{inr(nps1b)} / Rs 50,000 max</div></div>
          </div>

          <Div label="Health Insurance · Section 80D"/>
          <div className="grid g3" style={{rowGap:14}}>
            <div className="fg">
              <label>Health Insurance: Self, Spouse, Children <Tip t="Premium for family floater or individual policies for yourself, spouse and dependent children. Max Rs 25,000 if you are below 60. Max Rs 50,000 if you are Senior Citizen (60+). Preventive health check up to Rs 5,000 included within limit."/></label>
              <Mon value={d.health_self} onChange={s('health_self')} placeholder="25000"/>
              <span className="hint">Your limit: {profile.isSenior?'Rs 50,000 (Senior Citizen)':'Rs 25,000'} | Eligible: {inr(hSelf)}</span>
            </div>
            <div className="fg">
              <label>Health Insurance: Parents <Tip t="Additional 80D deduction for parents health insurance — completely separate from self/family limit. Max Rs 25,000 if parents below 60. Max Rs 50,000 if Senior Citizen parents."/></label>
              <Mon value={d.health_par} onChange={s('health_par')} placeholder="25000"/>
              <div style={{marginTop:6}}>
                <RG opts={[{label:'Parents below 60',value:false},{label:'Parents 60+ (Senior)',value:true}]} val={d.par_senior} onChange={v => sv('par_senior', v)}/>
              </div>
              <span className="hint">Parents limit: {d.par_senior?'Rs 50,000 (Senior)':'Rs 25,000'} | Eligible: {inr(hPar)}</span>
            </div>
            <div className="fg"><label>Total 80D</label><div className="aval gv">{inr(hSelf+hPar)}</div></div>
          </div>

          <Div label="Home Loan Interest · Sec 24(b) and Education Loan"/>
          <div className="grid g3" style={{rowGap:14}}>
            <div className="fg"><label>Home Loan Interest: Self-Occupied <Tip t="Annual interest on home loan for the house you live in. Max deduction Rs 2,00,000 per year. Loan must be for purchase or construction (not renovation). Check bank statement for interest vs principal split."/></label><Mon value={d.loan_int} onChange={s('loan_int')} placeholder="180000"/><span className="hint">Eligible: {inr(loanInt)} (capped at Rs 2L for self-occupied)</span></div>
            <div className="fg"><label>Home Loan Interest: Let-Out <Tip t="For rented property: FULL interest deductible (no Rs 2L cap). Net house property loss set off against salary up to Rs 2L per year. Enter here AND in House Property module."/></label><Mon value={d.loan_int2} onChange={s('loan_int2')} placeholder="0"/></div>
            <div className="fg"><label>Education Loan Interest (Sec 80E) <Tip t="Interest on loan for higher education (self, spouse or children). No upper limit. Deductible for 8 consecutive years from year repayment begins. Principal is NOT deductible."/></label><Mon value={d.edu_loan} onChange={s('edu_loan')} placeholder="0"/><span className="hint">No cap — full interest deductible for 8 years</span></div>
          </div>

          <Div label="Other Deductions"/>
          <div className="grid g3" style={{rowGap:14}}>
            <div className="fg"><label>Savings or FD Interest (80TTA / 80TTB) <Tip t="80TTA (below 60): savings account interest exempt up to Rs 10,000. 80TTB (Senior Citizen 60+): ALL interest (savings + FD + RD) exempt up to Rs 50,000. Enter total interest received."/></label><Mon value={d.savings_int} onChange={s('savings_int')} placeholder="5000"/><span className="hint">Your limit: {profile.isSenior?'Rs 50,000 (80TTB — all interest)':'Rs 10,000 (80TTA — savings only)'}</span></div>

/* ── MODULE B: FREELANCER ── */
const ModFreelancer = ({regime, profile, onUpdate}) => {
  const [d,setD] = useState({mode:'44ADA',gross:'',int_exp:'',soft_exp:'',travel_exp:'',office_exp:'',depn_exp:'',staff_exp:'',other_exp:'',gst_reg:false,gstin:'',advance_tax:'',tds:'',nps:'',health_self:'',health_par:'',par_senior:false,donation:''});
  const s = k => e => setD(p => ({...p,[k]:e.target.type==='checkbox'?e.target.checked:e.target.value}));
  const sv = (k,v) => setD(p => ({...p,[k]:v}));

  const gross = n(d.gross);
  const actualExp = n(d.int_exp)+n(d.soft_exp)+n(d.travel_exp)+n(d.office_exp)+n(d.depn_exp)+n(d.staff_exp)+n(d.other_exp);
  const taxableBI = d.mode==='44ADA' ? gross*.50 : Math.max(0, gross-actualExp);
  const npsD = regime==='old' ? Math.min(n(d.nps), 50000) : 0;
  const hS = regime==='old' ? Math.min(n(d.health_self), profile.isSenior?50000:25000) : 0;
  const hP = regime==='old' ? Math.min(n(d.health_par), d.par_senior?50000:25000) : 0;
  const totalDed = npsD + hS + hP + (regime==='old'?n(d.donation):0);
  const netTaxable = Math.max(0, taxableBI - totalDed);

  const prevNet = useRef(null);
  if (prevNet.current !== netTaxable) {
    prevNet.current = netTaxable;
    setTimeout(() => onUpdate && onUpdate({grossReceipts:gross, netTaxable}), 0);
  }

  return (
    <div>
      <RegimeBanner regime={regime}/>
      <Al type="blue" icon="💻">
        <b>Sec 44ADA Presumptive Tax:</b> If professional receipts are up to Rs 75L (digital) or Rs 50L (cash), declare 50% as taxable income — no books needed, no audit. Easiest option for freelancers, consultants, doctors, lawyers, CAs.

      <Div label="Income and Taxation Mode"/>
      <div className="grid g2" style={{rowGap:14,marginBottom:14}}>
        <div className="fg">
          <label>Taxation Mode <Tip t="44ADA Presumptive: Declare 50% of gross receipts as income. Simple, no detailed books needed. Regular Books: Maintain actual income and expense records. Required if profit is below 50% of receipts or turnover exceeds limits."/></label>
          <RG opts={[{label:'Sec 44ADA Presumptive (Recommended)',value:'44ADA'},{label:'Regular (Actual Books)',value:'regular'}]} val={d.mode} onChange={v => sv('mode',v)}/>
        </div>
        <div className="fg">
          <label>Gross Professional Receipts (Annual) <Tip t="Total amount billed and received from all clients in FY 2026-27. Exclude GST collected. Use Form 26AS to verify. Include all bank credits for professional services."/></label>
          <Mon value={d.gross} onChange={s('gross')} placeholder="2000000"/>
          {gross>5000000&&<span className="emsg">Receipts exceed Rs 50L — 44ADA not applicable. Tax Audit u/s 44AB required. Please consult a CA.</span>}
        </div>
      </div>

      {d.mode === 'regular' && (
        <>
          <Div label="Actual Business Expenses"/>
          <div className="grid g3" style={{rowGap:14}}>
            <div className="fg"><label>Internet and Phone (Business Use) <Tip t="Business-use portion only. If you use internet 80% for work, claim 80% of annual bill. Keep bills and maintain a reasonable business vs personal split estimate."/></label><Mon value={d.int_exp} onChange={s('int_exp')} placeholder="24000"/></div>
            <div className="fg"><label>Software and Subscriptions <Tip t="Adobe, Figma, GitHub, AWS, Azure, GCP, Notion, JetBrains, Zoom Pro, accounting software — all deductible as direct business expenses with receipts."/></label><Mon value={d.soft_exp} onChange={s('soft_exp')} placeholder="50000"/></div>
            <div className="fg"><label>Client Travel and Conveyance <Tip t="Cab, train, flight for client meetings and site visits. Keep all receipts. Daily commute between home and own office is NOT deductible."/></label><Mon value={d.travel_exp} onChange={s('travel_exp')} placeholder="30000"/></div>
            <div className="fg"><label>Home Office (Pro-rata Rent or Electricity) <Tip t="Proportional home office expenses. Formula: (Area used for work divided by Total home area) x Rent/Electricity. Example: 10% of home used for work — claim 10% of rent paid."/></label><Mon value={d.office_exp} onChange={s('office_exp')} placeholder="60000"/></div>
            <div className="fg"><label>Depreciation on Business Assets <Tip t="Laptop: 40% WDV depreciation. Camera, projector: 15%. Other equipment: 15%. Year of purchase: 50% of annual depreciation (half-year rule). Calculate asset-wise on Written Down Value."/></label><Mon value={d.depn_exp} onChange={s('depn_exp')} placeholder="40000"/></div>
            <div className="fg"><label>Staff or VA Salary <Tip t="Salaries paid to part-time staff or sub-contractors are deductible. If annual salary per person exceeds Rs 2.4L, you must deduct TDS. Obtain TAN from IT department."/></label><Mon value={d.staff_exp} onChange={s('staff_exp')} placeholder="0"/></div>
            <div className="fg"><label>Other Business Expenses <Tip t="Books, professional courses, co-working space, business insurance, marketing, website maintenance, CA or lawyer fees — all deductible with receipts."/></label><Mon value={d.other_exp} onChange={s('other_exp')} placeholder="30000"/></div>
            <div className="fg">
              <label>Net Profit</label>
              <div className={'aval' + (gross>0&&(gross-actualExp)<gross*.50?' rv':gross>0?' gv':'')}>{inr(Math.max(0,gross-actualExp))}</div>

              {gross>0&&(gross-actualExp)<gross*.50&&<span className="emsg">Profit below 50% — you must use Regular method (44ADA requires declaring at least 50%)</span>}

          <Div label="Deductions Available for Freelancers (Old Regime)"/>
          <Al type="amber" icon="💡">
            <b>No EPF as freelancer?</b> Open your own NPS Tier-1 account for Rs 50,000 extra deduction (80CCD 1B). Also claim 80D health insurance and invest in ELSS or PPF for 80C. These 3 steps alone can save Rs 30,000-Rs 75,000 in tax.
          </Al>
          <div className="grid g3" style={{rowGap:14}}>
            <div className="fg"><label>NPS Own Contribution 80CCD(1B) <Tip t="Open NPS Tier-1 account at nps.kfintech.com or any bank. Rs 50,000 extra deduction beyond 80C limit. Government-backed, market-linked returns. 60% lump sum tax-free at 60."/></label><Mon value={d.nps} onChange={s('nps')} placeholder="50000"/></div>
            <div className="fg"><label>Health Insurance: Self or Family <Tip t="Family floater or individual policy. Max Rs 25,000 if below 60, Rs 50,000 if Senior Citizen. Buy from any IRDAI-regulated insurer."/></label><Mon value={d.health_self} onChange={s('health_self')} placeholder="25000"/></div>
            <div className="fg">
              <label>Health Insurance: Parents <Tip t="Additional 80D deduction for parents health insurance. Independent from self/family limit. Max Rs 25,000 (parents below 60) or Rs 50,000 (senior citizen parents)."/></label>
              <Mon value={d.health_par} onChange={s('health_par')} placeholder="25000"/>
              <div style={{marginTop:6}}><RG opts={[{label:'Parents below 60',value:false},{label:'Parents 60+',value:true}]} val={d.par_senior} onChange={v => sv('par_senior',v)}/></div>
            </div>
          </div>
        </>
      )}

      <Div label="Freelancer: Net Taxable Income"/>
      <div style={{background:'var(--line2)',border:'1px solid var(--line)',borderRadius:12,padding:16}}>
        <table className="bdt"><tbody>
          <tr><td className="bd-lbl">Gross Professional Receipts</td><td className="bd-val">{inr(gross)}</td></tr>
          {d.mode==='44ADA'
            ?<tr><td className="bd-lbl">(-) Deemed Expenses 50% — Sec 44ADA</td><td className="bd-ded">- {inr(gross*.50)}</td></tr>

          {regime==='old'&&totalDed>0&&<tr><td className="bd-lbl">(-) Deductions (NPS + 80D)</td><td className="bd-ded">- {inr(totalDed)}</td></tr>}

        </tbody></table>

      <AITablePanel
        contextData={{
          grossReceipts: gross, taxableBI, netTaxable, mode: d.mode,
          actualExp, npsD, hS, hP, totalDed, regime,
          tdsDeducted: n(d.tds), advanceTax: n(d.advance_tax)
        }}

        profile={profile}
