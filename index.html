};

/* ── MODULE C: STOCK TRADER ── */
const ModTrader = ({onUpdate, profile}) => {
  const [trades,setTrades] = useState([{id:1,type:'Equity',scrip:'',buyDate:'',buyPrice:'',qty:'',sellDate:'',sellPrice:'',charges:''}]);
  const [nxtId,setNxtId] = useState(2);
  const fileRef = useRef();
  const [csvMsg,setCsvMsg] = useState('');

  const addRow = () => { setTrades(t => [...t, {id:nxtId,type:'Equity',scrip:'',buyDate:'',sellDate:'',buyPrice:'',sellPrice:'',qty:'',charges:''}]); setNxtId(x => x+1); };
  const delRow = id => setTrades(t => t.filter(x => x.id !== id));
  const updRow = (id,k,v) => setTrades(t => t.map(x => x.id===id ? {...x,[k]:v} : x));

  const calcRow = t => {
    if (!t.buyDate||!t.sellDate||!t.buyPrice||!t.sellPrice||!t.qty) return null;
    const cost = n(t.buyPrice)*n(t.qty) + n(t.charges);
    const proc = n(t.sellPrice)*n(t.qty);
    return TAX.cgains(t.buyDate, t.sellDate, cost, proc, t.type);
  };

  const handleCSV = e => {
    const file = e.target.files[0]; if (!file) return;
    const reader = new FileReader();
    reader.onload = ev => {
      try {
        const lines = ev.target.result.split('\n').filter(l => l.trim());
        const hdrs = lines[0].split(',').map(h => h.trim().toLowerCase().replace(/\s+/g,'_').replace(/[^a-z0-9_]/g,''));
        const rows = [];
        for (let i=1; i<lines.length; i++) {
          const cols = lines[i].split(',').map(c => c.trim().replace(/^"|"$/g,''));
          if (cols.length < 5) continue;
          const o = {}; hdrs.forEach((h,j) => o[h] = cols[j]||'');
          rows.push({id:nxtId+i, type:o.type||o.instrument||o.segment||'Equity', scrip:o.scrip||o.symbol||o.stock||'', buyDate:o.buy_date||o.purchase_date||'', buyPrice:o.buy_price||o.purchase_price||'', qty:o.qty||o.quantity||'', sellDate:o.sell_date||o.sale_date||'', sellPrice:o.sell_price||o.sale_price||'', charges:o.charges||o.brokerage||'0'});
        }
        if (rows.length > 0) { setTrades(rows); setNxtId(nxtId+rows.length+1); setCsvMsg('Loaded ' + rows.length + ' trades'); }
        else setCsvMsg('No valid trades found. Check CSV format.');
      } catch(err) { setCsvMsg('CSV error: ' + err.message); }
    };
    reader.readAsText(file);
  };

  const agg = trades.reduce((a,t) => {
    const r = calcRow(t); if (!r) return a;
    if (r.cls==='Speculative') a.spec += r.gain;
    else if (r.cls==='LTCG') a.ltcg += r.gain;
    else if (r.cls==='STCG') a.stcg += r.gain;
    else a.debt += r.gain;
    return a;
  }, {stcg:0,ltcg:0,spec:0,debt:0});

  const stcgTax = agg.stcg > 0 ? Math.round(agg.stcg*.20) : 0;
  const ltcgTax = Math.round(Math.max(0, agg.ltcg-125000)*.125);
  const totalCGTax = stcgTax + ltcgTax;

  const prevTax = useRef(null);
  if (prevTax.current !== totalCGTax) {
    prevTax.current = totalCGTax;
    setTimeout(() => onUpdate && onUpdate({...agg, totalCGTax}), 0);
  }

  return (
    <div>
      <Al type="blue" icon="📈">
        <b>FY 2026-27 Capital Gains Rates:</b> STCG Equity/MF (held below 1 year): 20% · LTCG Equity/MF (held above 1 year): 12.5% (free up to Rs 1.25L) · Debt MF or Bonds: slab rate · Intraday or F&amp;O: speculative at slab rate
      </Al>
      <Div label="Upload Trade Data CSV"/>
      <input type="file" accept=".csv,.txt" ref={fileRef} onChange={handleCSV}/>
      <div className="upload-zone" onClick={() => fileRef.current.click()}>
        <div style={{fontSize:28,marginBottom:6}}>📂</div>
        <div style={{fontWeight:700,fontSize:13}}>Upload Broker Trade Export CSV</div>
        <div style={{fontSize:12,color:'var(--ink3)',marginTop:4}}>Zerodha, Groww, AngelOne, HDFC Securities, ICICI Direct</div>
        <div style={{fontSize:11,color:'var(--ink4)',marginTop:4}}>Required columns: Type, Scrip, Buy Date (YYYY-MM-DD), Buy Price, Qty, Sell Date, Sell Price</div>
      </div>
      {csvMsg && <div style={{marginTop:6,fontSize:12,color:'var(--green)',fontWeight:600}}>{csvMsg}</div>}

      <Div label="Manual Trade Entry"/>
      <div className="tbl-wrap">
        <table>
          <thead><tr>
            <th>Type</th><th>Scrip</th><th>Buy Date</th><th>Buy Price</th><th>Qty</th>
            <th>Sell Date</th><th>Sell Price</th><th>Charges</th>
            <th>Gain/Loss</th><th>Category</th><th>Tax</th><th></th>
          </tr></thead>
          <tbody>
            {trades.map(t => {
              const r = calcRow(t);
              return (
                <tr key={t.id} className="trade-row">
                  <td>
                    <select value={t.type} onChange={e => updRow(t.id,'type',e.target.value)} style={{minWidth:85}}>
                      <option>Equity</option><option>Equity MF</option><option>ELSS MF</option>
                      <option>Debt MF</option><option>Intraday</option><option>F&amp;O</option>
                      <option>Bonds</option><option>SGB</option>
                    </select>
                  </td>
                  <td><input type="text" value={t.scrip} onChange={e => updRow(t.id,'scrip',e.target.value)} placeholder="RELIANCE"/></td>
                  <td><input type="date" value={t.buyDate} onChange={e => updRow(t.id,'buyDate',e.target.value)}/></td>
                  <td><div className="mon"><span className="mon-pfx">{'\u20B9'}</span><input type="number" value={t.buyPrice} onChange={e => updRow(t.id,'buyPrice',e.target.value)} placeholder="0" style={{minWidth:70}}/></div></td>
                  <td><input type="number" value={t.qty} onChange={e => updRow(t.id,'qty',e.target.value)} placeholder="1" style={{minWidth:50}}/></td>
                  <td><input type="date" value={t.sellDate} onChange={e => updRow(t.id,'sellDate',e.target.value)}/></td>
                  <td><div className="mon"><span className="mon-pfx">{'\u20B9'}</span><input type="number" value={t.sellPrice} onChange={e => updRow(t.id,'sellPrice',e.target.value)} placeholder="0" style={{minWidth:70}}/></div></td>
                  <td><div className="mon"><span className="mon-pfx">{'\u20B9'}</span><input type="number" value={t.charges} onChange={e => updRow(t.id,'charges',e.target.value)} placeholder="0" style={{minWidth:60}}/></div></td>
                  <td>{r ? <span className={r.gain>=0?'td-pos':'td-neg'}>{r.gain>=0?'+':''}{inr(Math.round(r.gain))}</span> : <span style={{color:'var(--ink4)'}}>—</span>}</td>
                  <td>{r ? <span className={'pill p-' + (r.cls==='LTCG'?'green':r.cls==='Speculative'?'amber':'blue')} style={{fontSize:10}}>{r.cls} {r.days}d</span> : <span style={{color:'var(--ink4)'}}>—</span>}</td>
                  <td>{r&&r.gain>0&&r.cls!=='Speculative' ? <span className="td-mono">{inr(Math.round(r.cls==='LTCG'?Math.max(0,r.gain-125000)*.125:r.gain*.20))}</span> : <span style={{color:'var(--ink4)'}}>—</span>}</td>
                  <td><button className="btn btn-sm" style={{background:'var(--red-lt)',color:'var(--red)',border:'1px solid var(--red-md)'}} onClick={() => delRow(t.id)} disabled={trades.length===1}>✕</button></td>
                </tr>
              );
            })}
          </tbody>
        </table>
      </div>
      <button className="btn btn-outline btn-sm" onClick={addRow} style={{marginBottom:18}}>+ Add Trade Row</button>

      {(Math.abs(agg.stcg)>0||Math.abs(agg.ltcg)>0||Math.abs(agg.spec)>0) && (
        <div style={{background:'linear-gradient(135deg,#f0fdf4,#ecfdf5)',border:'1.5px solid var(--green)',borderRadius:12,padding:18}}>
          <div style={{fontWeight:800,marginBottom:14,color:'#064e3b'}}>Capital Gains Summary</div>
          <div style={{display:'grid',gridTemplateColumns:'repeat(4,1fr)',gap:12}}>
            <div><div style={{fontSize:11,fontWeight:700,color:'var(--ink3)',marginBottom:4}}>STCG 20%</div><div style={{fontSize:16,fontWeight:800,fontFamily:'var(--mono)',color:agg.stcg>=0?'var(--green)':'var(--red)'}}>{inr(Math.round(agg.stcg))}</div><div style={{fontSize:11,color:'var(--ink3)'}}>Tax: {inr(stcgTax)}</div></div>
            <div><div style={{fontSize:11,fontWeight:700,color:'var(--ink3)',marginBottom:4}}>LTCG 12.5% (above Rs 1.25L)</div><div style={{fontSize:16,fontWeight:800,fontFamily:'var(--mono)',color:agg.ltcg>=0?'var(--blue)':'var(--red)'}}>{inr(Math.round(agg.ltcg))}</div><div style={{fontSize:11,color:'var(--ink3)'}}>Tax: {inr(ltcgTax)}</div></div>
            <div><div style={{fontSize:11,fontWeight:700,color:'var(--ink3)',marginBottom:4}}>Speculative or F&amp;O</div><div style={{fontSize:16,fontWeight:800,fontFamily:'var(--mono)',color:agg.spec>=0?'var(--amber)':'var(--red)'}}>{inr(Math.round(agg.spec))}</div><div style={{fontSize:11,color:'var(--ink3)'}}>Slab rate</div></div>
            <div style={{background:'var(--blue-lt)',padding:12,borderRadius:8}}><div style={{fontSize:11,fontWeight:700,color:'var(--ink3)',marginBottom:4}}>Total CG Tax</div><div style={{fontSize:18,fontWeight:800,fontFamily:'var(--mono)',color:'var(--blue)'}}>{inr(totalCGTax)}</div></div>
          </div>
        </div>
      )}
      <AITablePanel
        contextData={{
          stcg: agg.stcg, ltcg: agg.ltcg, speculative: agg.spec,
          stcgTax, ltcgTax, totalCGTax,
          tradeCount: trades.length, regime: 'both'
        }}
        tabName="Capital Gains / Stock Market"
        regime="both"
        profile={profile || {age:30,city:'',cityType:'non-metro',isSenior:false}}
      />
    </div>
  );
};

/* ── MODULE D: HOUSE PROPERTY ── */
const ModProperty = ({regime, onUpdate, profile}) => {
  const [props,setProps] = useState([{id:1,desc:'My Property',type:'let-out',address:'',rent:'',months:'12',muni:'',unrealised:'',loan_int:'',pre_con:'',share:'100'}]);
  const [nxtId,setNxtId] = useState(2);
  const fileRef = useRef();

  const addProp = () => { setProps(p => [...p, {id:nxtId,desc:'Property '+nxtId,type:'let-out',address:'',rent:'',months:'12',muni:'',unrealised:'',loan_int:'',pre_con:'',share:'100'}]); setNxtId(x => x+1); };
  const delProp = id => setProps(p => p.filter(x => x.id !== id));
  const updProp = (id,k,v) => setProps(p => p.map(x => x.id===id ? {...x,[k]:v} : x));

  const calcProp = p => {
    if (p.type === 'self-occupied') {
      const int = regime==='old' ? Math.min(n(p.loan_int)+n(p.pre_con), 200000) : 0;
      return {nav:0, stdD:0, int, income:-int};
    }
    const gAV = n(p.rent) - n(p.unrealised);
    const adjAV = gAV * (n(p.months)/12);
    const nav = Math.max(0, adjAV - n(p.muni));
    const stdD = nav * .30;
    const int = regime==='old' ? n(p.loan_int)+n(p.pre_con) : 0;
    return {nav, stdD, int, income: (nav - stdD - int) * (n(p.share)/100)};
  };

  const totalHP = props.reduce((a,p) => a + calcProp(p).income, 0);

  const prevHP = useRef(null);
  if (prevHP.current !== totalHP) {
    prevHP.current = totalHP;
    setTimeout(() => onUpdate && onUpdate({totalHP}), 0);
  }

  return (
    <div>
      <RegimeBanner regime={regime}/>
      <Al type="blue" icon="🏠">
        <b>How House Property is Taxed:</b> Gross Rent minus Municipal Tax = Net Annual Value. Minus 30% Standard Deduction (auto). Minus Home Loan Interest (in Old Regime). Net loss up to Rs 2L is set off against salary income.
      </Al>
      <input type="file" accept=".csv" ref={fileRef}/>
      {props.map((p,i) => {
        const c = calcProp(p);
        return (
          <div key={p.id} style={{border:'1px solid var(--line)',borderRadius:12,padding:18,marginBottom:16,background:'#fff'}}>
            <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:14}}>
              <div style={{display:'flex',alignItems:'center',gap:8}}>
                <span style={{fontSize:18}}>🏠</span>
                <input type="text" value={p.desc} onChange={e => updProp(p.id,'desc',e.target.value)} style={{border:'none',fontWeight:700,fontSize:14,outline:'none',background:'transparent'}}/>
              </div>
              <div style={{display:'flex',gap:8,alignItems:'center'}}>
                {c.income!==0&&<span className={'pill ' + (c.income>0?'p-amber':'p-green')}>{c.income>0?'Taxable':'Loss: '}{inr(Math.abs(Math.round(c.income)))}</span>}
                {props.length>1&&<button className="btn btn-sm" style={{background:'var(--red-lt)',color:'var(--red)',border:'1px solid var(--red-md)'}} onClick={() => delProp(p.id)}>Remove</button>}
              </div>
            </div>
            <div className="grid g3" style={{rowGap:14}}>
              <div className="fg">
                <label>Property Type <Tip t="Self-Occupied: you live in it (interest deduction capped at Rs 2L). Let-Out: rented to tenant (full interest deductible). Deemed Let-Out: 2nd or 3rd property even if vacant — treated as rented at market rent."/></label>
                <select value={p.type} onChange={e => updProp(p.id,'type',e.target.value)}>
                  <option value="let-out">Let Out (Rented to Tenant)</option>
                  <option value="self-occupied">Self-Occupied (You Live Here)</option>
                  <option value="deemed-let-out">Deemed Let Out (2nd or 3rd Vacant Property)</option>
                </select>
              </div>
              <div className="fg s2">
                <label>Property Address <Tip t="Full address helps identify the property for IT scrutiny or future capital gains calculation."/></label>
                <input type="text" value={p.address} onChange={e => updProp(p.id,'address',e.target.value)} placeholder="Flat 302, XYZ Apartments, Ahmedabad"/>
              </div>
              {p.type !== 'self-occupied' && (
                <>
                  <div className="fg"><label>Annual Rental Income <Tip t="Total rent received from tenant in FY 2026-27. Do NOT include security deposit. Annual = monthly rent x months received."/></label><Mon value={p.rent} onChange={e => updProp(p.id,'rent',e.target.value)} placeholder="240000"/></div>
                  <div className="fg"><label>Months Rented <Tip t="If property was vacant for some months, enter only months it was actually rented. Gross Annual Value is proportionately reduced."/></label><input type="number" value={p.months} onChange={e => updProp(p.id,'months',e.target.value)} min="1" max="12" placeholder="12"/></div>
                  <div className="fg"><label>Municipal Tax Paid <Tip t="Property tax paid to municipal corporation for FY 2026-27. Fully deductible from gross rent before computing Net Annual Value. Keep the payment receipt."/></label><Mon value={p.muni} onChange={e => updProp(p.id,'muni',e.target.value)} placeholder="15000"/></div>
                  <div className="fg"><label>Unrealised Rent <Tip t="Rent due but not collected from tenant despite being legally entitled. Conditions: property let at genuine market rate and tenant has vacated or legal proceedings initiated."/></label><Mon value={p.unrealised} onChange={e => updProp(p.id,'unrealised',e.target.value)} placeholder="0"/></div>
                </>
              )}
              <div className="fg"><label>Home Loan Interest <Tip t="Annual interest on home loan for THIS property. Self-occupied: capped at Rs 2,00,000. Let-out: FULL interest deductible (no cap). Check your bank statement for interest vs principal split."/></label><Mon value={p.loan_int} onChange={e => updProp(p.id,'loan_int',e.target.value)} placeholder="180000"/></div>
              <div className="fg"><label>Pre-Construction Interest (1/5th) <Tip t="Interest paid during construction period before possession. Total pre-construction interest divided by 5 = annual deduction for 5 consecutive years starting from year of possession."/></label><Mon value={p.pre_con} onChange={e => updProp(p.id,'pre_con',e.target.value)} placeholder="0"/></div>
              <div className="fg"><label>Your Ownership Share % <Tip t="If jointly owned (e.g. 50-50 with spouse), enter your percentage. Income or loss is attributed proportionally. For sole owner: 100%."/></label><input type="number" value={p.share} onChange={e => updProp(p.id,'share',e.target.value)} min="1" max="100" placeholder="100"/></div>
            </div>
            <div style={{marginTop:14,background:'var(--line2)',borderRadius:8,padding:14}}>
              <table className="bdt" style={{fontSize:12}}><tbody>
                {p.type!=='self-occupied'&&(
                  <>
                    <tr><td className="bd-lbl">Gross Annual Value</td><td className="bd-val">{inr(Math.round(n(p.rent)-n(p.unrealised)))}</td></tr>
                    <tr><td className="bd-lbl">(-) Municipal Tax</td><td className="bd-ded">- {inr(n(p.muni))}</td></tr>
                    <tr><td className="bd-lbl">Net Annual Value</td><td className="bd-val">{inr(Math.round(c.nav))}</td></tr>
                    <tr><td className="bd-lbl">(-) 30% Standard Deduction (Auto)</td><td className="bd-ded">- {inr(Math.round(c.stdD))}</td></tr>
                  </>
                )}
                {regime==='old'&&c.int>0&&<tr><td className="bd-lbl">(-) Home Loan Interest {p.type==='self-occupied'?'(capped Rs 2L)':'(full deduction)'}</td><td className="bd-ded">- {inr(Math.round(c.int))}</td></tr>}
                <tr><td className="bd-lbl" style={{fontWeight:800}}>Taxable or (Loss) from This Property</td><td className={c.income<0?'bd-ded':'bd-tot'}>{inr(Math.round(c.income))}</td></tr>
              </tbody></table>
              {c.income<0&&regime==='old'&&<div style={{marginTop:8,fontSize:11.5,color:'var(--green)',fontWeight:600}}>This property loss (max Rs 2L) reduces your salary taxable income — saving approx {inr(Math.round(Math.min(200000,Math.abs(c.income))*.30))} in tax at 30% slab.</div>}
            </div>
          </div>
        );
      })}
      <button className="btn btn-outline" onClick={addProp} style={{marginBottom:16}}>+ Add Another Property</button>
      <div style={{background:'var(--line2)',border:'1px solid var(--line)',borderRadius:10,padding:14}}>
        <div style={{fontWeight:800,marginBottom:6}}>Total House Property Income or (Loss)</div>
        <div style={{fontSize:20,fontWeight:800,fontFamily:'var(--mono)',color:totalHP>=0?'var(--amber)':'var(--green)'}}>{inr(Math.round(totalHP))}</div>
        {totalHP<0&&<div style={{fontSize:12,color:'var(--ink3)',marginTop:4}}>Net loss — set off against salary up to Rs 2L. Balance carried forward for 8 years.</div>}
      </div>
      <AITablePanel
        contextData={{
          totalHP: Math.round(totalHP),
          propertyCount: props.length,
          hasLoss: totalHP < 0,
          regime
        }}
        tabName="House Property"
        regime={regime}
        profile={profile || {age:30,city:'',cityType:'non-metro',isSenior:false}}
      />
    </div>
  );
};

/* ════════════════════════════════════════
   ADVANCE TAX CALCULATOR
   Sec 208 / 234B / 234C rules:
   Q1: 15% by Jun 15 | Q2: 45% by Sep 15
   Q3: 75% by Dec 15 | Q4: 100% by Mar 15
   Interest 234B: 1%/month if < 90% paid
   Interest 234C: 1%/month on shortfall
════════════════════════════════════════ */
const AdvanceTax = ({totalTax, regime}) => {
  const today = new Date();
  const FY = 2027; // FY 2026-27 ends Mar 31, 2027
  const [calcDate, setCalcDate] = useState(today.toISOString().split('T')[0]);
  const [paid, setPaid] = useState({q1:'',q2:'',q3:'',q4:''});

  const tax = Math.max(0, totalTax || 0);
  // Below Rs 10,000 — no advance tax needed
  const required = tax >= 10000;

  // Installment schedule
  const SCHEDULE = [
    {key:'q1', due:'2026-06-15', label:'1st Instalment', pct:0.15, qtr:'Q1 (Apr–Jun 2026)'},
    {key:'q2', due:'2026-09-15', label:'2nd Instalment', pct:0.45, qtr:'Q2 (Jul–Sep 2026)'},
    {key:'q3', due:'2026-12-15', label:'3rd Instalment', pct:0.75, qtr:'Q3 (Oct–Dec 2026)'},
    {key:'q4', due:'2027-03-15', label:'4th Instalment', pct:1.00, qtr:'Q4 (Jan–Mar 2027)'},
  ];

  const cDate = new Date(calcDate || today);

  const getStatus = (dueStr) => {
    const due = new Date(dueStr);
    if (cDate > due) return 'overdue';
    const diff = (due - cDate) / 86400000;
    if (diff <= 30) return 'current';
    return 'upcoming';
  };

  // Cumulative amounts required by each quarter
  const cumReq = (pct) => Math.round(tax * pct);
  const cumPaid = (uptoKey) => {
    const keys = ['q1','q2','q3','q4'];
    const upto = keys.indexOf(uptoKey);
    return keys.slice(0, upto+1).reduce((s,k) => s + n(paid[k]), 0);
  };

  // Interest 234C: per quarter shortfall
  const calc234C = () => {
    let totalInt = 0;
    const installments = [
      {key:'q1', reqCum: cumReq(.15), months: 3},
      {key:'q2', reqCum: cumReq(.45), months: 3},
      {key:'q3', reqCum: cumReq(.75), months: 3},
    ];
    installments.forEach(({key, reqCum, months}) => {
      const cp = cumPaid(key);
      const shortfall = Math.max(0, reqCum - cp);
      totalInt += Math.round(shortfall * .01 * months);
    });
    return totalInt;
  };

  // Interest 234B: if total paid < 90% by Mar 31
  const calc234B = () => {
    const totalPaid = Object.values(paid).reduce((s,v) => s+n(v), 0);
    const minRequired = Math.round(tax * .90);
    if (totalPaid >= minRequired) return 0;
    const shortfall = minRequired - totalPaid;
    // Months from Apr 1 to calcDate (assessment year)
    const assessDate = new Date(calcDate);
    const aprFirst = new Date('2027-04-01');
    if (assessDate < aprFirst) return 0;
    const months = Math.ceil((assessDate - aprFirst) / (30*86400000)) + 1;
    return Math.round(shortfall * .01 * months);
  };

  const int234C = calc234C();
  const int234B = calc234B();
  const totalPaidAll = Object.values(paid).reduce((s,v) => s+n(v), 0);
  const bal = Math.max(0, tax - totalPaidAll);

  return (
    <div>
      <Al type="blue" icon="📅">
        <b>Advance Tax (Sec 208):</b> If total tax liability exceeds Rs 10,000, you must pay advance tax in 4 instalments. Failure attracts interest under Sec 234B (1%/month on unpaid amount) and Sec 234C (1%/month per quarter shortfall).
      </Al>

      <div className="grid g2" style={{gap:14, marginBottom:18}}>
        <div className="fg">
          <label>Set Calculation Date <Tip t="Set today's date or a future date to see which instalments are overdue, current, or upcoming. Interest 234B is calculated from April 1, 2027."/></label>
          <input type="date" value={calcDate} onChange={e => setCalcDate(e.target.value)} min="2026-04-01" max="2027-12-31"/>
          <span className="hint">Adjust date to simulate different scenarios</span>
        </div>
        <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:8,alignContent:'start'}}>
          <div className="ov-card blue" style={{padding:12}}>
            <div className="ov-label">Total Tax Liability</div>
            <div className="ov-val" style={{fontSize:18}}>{inr(tax)}</div>
          </div>
          <div className="ov-card amber" style={{padding:12}}>
            <div className="ov-label">Balance Remaining</div>
            <div className="ov-val" style={{fontSize:18,color:bal>0?'var(--red)':'var(--green)'}}>{inr(bal)}</div>
          </div>
        </div>
      </div>

      {!required && tax > 0 && (
        <Al type="green" icon="✅"><b>No advance tax needed.</b> Your tax liability of {inr(tax)} is below Rs 10,000. Pay the full amount when filing your ITR by 31 July 2027.</Al>
      )}

      {required && (
        <>
          <Div label="Advance Tax Instalment Schedule · FY 2026-27"/>
          <div style={{overflowX:'auto',borderRadius:12,marginBottom:14}} style={{overflowX:"auto",borderRadius:12,marginBottom:14}} className="tbl-wrap">
            <table className="adv-table">
              <thead>
                <tr>
                  <th>Quarter</th>
                  <th>Due Date</th>
                  <th>Status</th>
                  <th>Cumulative % Required</th>
                  <th>Amount Required</th>
                  <th>Cumulative Paid</th>
                  <th>Amount You Paid</th>
                  <th>Shortfall</th>
                </tr>
              </thead>
              <tbody>
                {SCHEDULE.map(row => {
                  const status = getStatus(row.due);
                  const reqAmt = cumReq(row.pct);
                  const paidAmt = cumPaid(row.key);
                  const shortfall = Math.max(0, reqAmt - paidAmt);
                  return (
                    <tr key={row.key} className={status}>
                      <td style={{fontWeight:600}}>{row.qtr}</td>
                      <td style={{fontFamily:'var(--mono)',fontSize:12.5}}>{row.due}</td>
                      <td>
                        <span className={'adv-status ' + status}>
                          {status==='overdue'?'⚠️ Overdue':status==='current'?'📌 Due Soon':'✅ Upcoming'}
                        </span>
                      </td>
                      <td style={{fontFamily:'var(--mono)',fontWeight:700}}>{Math.round(row.pct*100)}%</td>
                      <td style={{fontFamily:'var(--mono)',fontWeight:700,color:'var(--blue)'}}>{inr(reqAmt)}</td>
                      <td style={{fontFamily:'var(--mono)',fontWeight:600}}>{inr(paidAmt)}</td>
                      <td>
                        <div className="mon" style={{maxWidth:130}}>
                          <span className="mon-pfx">{'\u20B9'}</span>
                          <input type="number" value={paid[row.key]} onChange={e => setPaid(p=>({...p,[row.key]:e.target.value}))}
                            placeholder="0" style={{height:34,fontSize:12.5,paddingLeft:24}}/>
                        </div>
                      </td>
                      <td style={{fontFamily:'var(--mono)',fontWeight:700,color:shortfall>0?'var(--red)':'var(--green)'}}>
                        {shortfall > 0 ? inr(shortfall) : '✓ Nil'}
                      </td>
                    </tr>
                  );
                })}
              </tbody>
            </table>
          </div>

          {/* Interest Summary */}
          <div style={{background:'var(--line2)',border:'1px solid var(--line)',borderRadius:12,padding:16,marginBottom:14}}>
            <div style={{fontWeight:800,fontSize:13.5,marginBottom:12}}>Interest Liability Estimate</div>
            <div style={{display:'grid',gridTemplateColumns:'1fr 1fr 1fr',gap:12}}>
              <div className="ov-card amber" style={{padding:12}}>
                <div className="ov-label">Interest u/s 234C</div>
                <div className="ov-val" style={{fontSize:18,color:int234C>0?'var(--red)':'var(--green)'}}>{int234C > 0 ? inr(int234C) : '₹0 — Nil'}</div>
                <div className="ov-sub">Quarterly shortfall interest</div>
              </div>
              <div className="ov-card red" style={{padding:12}}>
                <div className="ov-label">Interest u/s 234B</div>
                <div className="ov-val" style={{fontSize:18,color:int234B>0?'var(--red)':'var(--green)'}}>{int234B > 0 ? inr(int234B) : '₹0 — Nil'}</div>
                <div className="ov-sub">From Apr 1, 2027 onwards</div>
              </div>
              <div className="ov-card red" style={{padding:12}}>
                <div className="ov-label">Total Penal Interest</div>
                <div className="ov-val" style={{fontSize:18,color:(int234B+int234C)>0?'var(--red)':'var(--green)'}}>{inr(int234B+int234C)}</div>
                <div className="ov-sub">Avoidable if paid on time</div>
              </div>
            </div>
            {(int234C > 0 || int234B > 0) && (
              <div className="interest-warn">
                <b>⚠️ Interest Alert:</b> You are liable for Rs {Math.round(int234B+int234C).toLocaleString('en-IN')} in penal interest. Pay the overdue instalments immediately to stop further accrual. 234C interest is fixed per quarter — 234B accrues monthly from April 1, 2027.
              </div>
            )}
            {int234C === 0 && int234B === 0 && totalPaidAll > 0 && (
              <div style={{marginTop:10,padding:'10px 14px',background:'var(--green-lt)',borderRadius:8,color:'#065f46',fontSize:12.5,fontWeight:600}}>
                ✅ No penal interest as of {calcDate}. You are compliant with advance tax requirements.
              </div>
            )}
          </div>

          <Al type="amber" icon="💡">
            <b>Key Rules:</b> Senior Citizens (60+) NOT in business are EXEMPT from advance tax. Self-employed / freelancers must pay 100% of advance tax in one instalment by Mar 15 (if opting out of quarterly). Challan 280 online at incometax.gov.in.
          </Al>
        </>
      )}
    </div>
  );
};

    {label:'ITR Filing Deadline', date:new Date('2027-07-31'), done:false},
  ];
  const nextDeadline = Q_DATES.find(q => !q.done);
  const daysLeft = nextDeadline ? Math.ceil((nextDeadline.date - today)/86400000) : 0;

  const aiCfg = loadAIConfig();
  const PROVIDER_UPGRADE = {
    groq: {next:'anthropic', msg:'Upgrade to Anthropic Claude Sonnet for deeper, more precise Indian tax analysis.'},
    gemini: {next:'anthropic', msg:'Upgrade to Anthropic Claude Sonnet for more structured and accurate tax advice.'},
    openai: {next:'openai', msg:'Switch to GPT-4o for significantly better analysis quality.'},
    anthropic: {next:null, msg:'You are using the best available model for Indian tax advice.'},
  };
  const upgradeHint = aiCfg ? PROVIDER_UPGRADE[aiCfg.provider] : null;

  const act = actFor(profile.fy);
  const isNewAct = act === 'new2025';
  const actLabel = isNewAct ? 'Income Tax Act 2025 (Rules 2026)' : 'Income Tax Act 1961';
  const ITR_FORMS_1961 = {
    'ITR-1 (Sahaj)': 'Salary + ONE house property + interest income. Income < Rs 50L.',
    'ITR-2': 'Salary + capital gains + house property + foreign assets. No business income.',
    'ITR-3': 'Business or professional income + all other sources. Freelancers, traders.',
    'ITR-4 (Sugam)': '44AD/44ADA/44AE presumptive income. Turnover within limits.',
    'ITR-5': 'Firms, LLPs, AOPs, BOIs.',
    'ITR-6': 'Companies other than those claiming Sec 11 exemption.',
    'ITR-7': 'Trusts, political parties, institutions claiming exemption.',
  };
  const ITR_FORMS_2025 = {
    'ITR-1 (Sahaj)': 'Salary + UP TO TWO house properties + interest + LTCG ≤ Rs 1.25L u/s 112A. Income < Rs 50L.',
    'ITR-2': 'Salary + capital gains + multiple HP + foreign assets. Updated STCG/LTCG rate schedules.',
    'ITR-3': 'Business / professional income, F&O. Due: 31 Aug (non-audit), 31 Oct (audit) — Rules 2026.',
    'ITR-4 (Sugam)': '44AD/44ADA/44AE presumptive. Updated turnover thresholds. Due: 31 Aug (non-audit).',
    'ITR-5': 'Firms, LLPs, AOPs, BOIs — restructured under new Act schedule references.',
    'ITR-6': 'Companies (non-Sec-11). New schema aligned to Income Tax Rules 2026.',
    'ITR-7': 'Trusts, political parties, exemption-claiming institutions.',
  };
  const ITR_FORMS_2026 = isNewAct ? ITR_FORMS_2025 : ITR_FORMS_1961;

  const income_bars = [
    {label:'Salary Income', val:res.salTax, color:'var(--blue)'},
    {label:'Business / Freelance', val:res.freTax, color:'var(--purple)'},
    {label:'Capital Gains', val:Math.max(0,res.stcg)+Math.max(0,res.ltcg), color:'var(--amber)'},
    {label:'House Property', val:Math.max(0,res.hpInc), color:'var(--green)'},
    {label:'Speculative / F&O', val:Math.max(0,res.specInc), color:'var(--red)'},
  ].filter(b => b.val > 0);
  const totalIncome = income_bars.reduce((s,b) => s+b.val, 0) || 1;

  return (
    <div>
      {/* Top Summary Cards */}
      <div className="overview-grid">
        <div className="ov-card blue">
          <div className="ov-label">Total Taxable Income</div>
          <div className="ov-val" style={{color:'var(--blue)'}}>{inr(res.normalInc)}</div>
          <div className="ov-sub">Normal income (salary + business + HP + speculative)</div>
          <div className="progress-bar"><div className="progress-fill" style={{width:'100%',background:'var(--blue)'}}></div></div>
        </div>
        <div className="ov-card red">
          <div className="ov-label">Total Tax Payable</div>
          <div className="ov-val" style={{color:'var(--red)'}}>{inr(res.totalTax)}</div>
          <div className="ov-sub">Incl. 4% cess + capital gains tax of {inr(res.cgTax)}</div>
          <div style={{marginTop:6,fontSize:12,color:'var(--ink3)'}}>Effective Rate: <strong style={{color:'var(--ink)'}}>{res.eff}%</strong></div>
        </div>
        <div className="ov-card green">
          <div className="ov-label">Regime Saving</div>
          <div className="ov-val" style={{color:'var(--green)'}}>{inr(Math.abs(res.newT-res.oldT))}</div>
          <div className="ov-sub">Saved by choosing {res.newT<=res.oldT?'New':'Old'} Regime over the alternative</div>
          <span className="ov-badge" style={{background:regime==='new'?'var(--blue-lt)':'var(--amber-lt)',color:regime==='new'?'var(--blue)':'var(--amber)'}}>{regime==='new'?'🆕 New Regime Active':'📜 Old Regime Active'}</span>
        </div>
        <div className="ov-card amber">
          <div className="ov-label">Next Tax Deadline</div>
          <div className="ov-val" style={{color:daysLeft<30?'var(--red)':daysLeft<60?'var(--amber)':'var(--ink)',fontSize:18}}>
            {nextDeadline ? nextDeadline.date.toLocaleDateString('en-IN',{day:'2-digit',month:'short',year:'numeric'}) : 'All done!'}
          </div>
          <div className="ov-sub">{nextDeadline ? nextDeadline.label : 'All advance tax deadlines passed'}</div>
          {nextDeadline && <span className="ov-badge" style={{background:daysLeft<30?'var(--red-lt)':'var(--amber-lt)',color:daysLeft<30?'var(--red)':'var(--amber)'}}>{daysLeft} days left</span>}
        </div>
      </div>

      {/* Income Breakdown Bar */}
      {income_bars.length > 0 && (
        <div style={{background:'#fff',border:'1px solid var(--line)',borderRadius:12,padding:16,marginBottom:16}}>
          <div style={{fontWeight:800,fontSize:13.5,marginBottom:12}}>Income Composition</div>
          <div style={{display:'flex',height:12,borderRadius:6,overflow:'hidden',marginBottom:10}}>
            {income_bars.map(b => (
              <div key={b.label} style={{width:pct(b.val,totalIncome),background:b.color,transition:'width .5s ease'}}></div>
            ))}
          </div>
          <div style={{display:'flex',flexWrap:'wrap',gap:10}}>
            {income_bars.map(b => (
              <div key={b.label} style={{display:'flex',alignItems:'center',gap:5,fontSize:12}}>
                <div style={{width:10,height:10,borderRadius:2,background:b.color,flexShrink:0}}></div>
                <span style={{color:'var(--ink3)'}}>{b.label}:</span>
                <strong style={{fontFamily:'var(--mono)'}}>{inr(b.val)}</strong>
              </div>
            ))}
          </div>
        </div>
      )}

      {/* ITR Form */}
      <div style={{background:'#fff',border:'1px solid var(--line)',borderRadius:12,padding:16,marginBottom:16}}>
        <div style={{fontWeight:800,fontSize:13.5,marginBottom:10}}>Applicable ITR Form — {actLabel}</div>
        <div style={{display:'flex',alignItems:'flex-start',gap:12,marginBottom:12}}>
          <div style={{background:'linear-gradient(135deg,#1a56db,#3b82f6)',color:'#fff',borderRadius:10,padding:'10px 16px',fontWeight:800,fontSize:16,fontFamily:'var(--mono)',flexShrink:0}}>{itrForm.f}</div>
          <div>
            <div style={{fontWeight:700,fontSize:13,marginBottom:3}}>File using {itrForm.f}</div>
            <div style={{fontSize:12.5,color:'var(--ink3)',lineHeight:1.5}}>{itrForm.r}</div>
            <div style={{fontSize:11.5,color:'var(--blue)',marginTop:5,fontWeight:600}}>
              {isNewAct && (itrForm.f==='ITR-3'||itrForm.f==='ITR-4 (Sugam)')
                ? 'Due: 31 Aug 2027 (non-audit) · 31 Oct 2027 (audit) — Income Tax Rules 2026'
                : 'Due: 31 July 2027 (non-audit) · 31 Oct 2027 (audit cases)'}
            </div>
          </div>
        </div>
        <div style={{background:'var(--blue-lt)',borderRadius:8,padding:12}}>
          <div style={{fontSize:11,fontWeight:700,color:'var(--blue)',textTransform:'uppercase',letterSpacing:.5,marginBottom:8}}>ITR Form Reference — {actLabel}</div>
          <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:6}}>
            {Object.entries(ITR_FORMS_2026).map(([form,desc]) => (
              <div key={form} style={{display:'flex',gap:7,alignItems:'flex-start',padding:'5px 8px',background:itrForm.f===form?'#fff':'transparent',borderRadius:6,border:itrForm.f===form?'1px solid var(--blue-md)':'1px solid transparent'}}>
                <span style={{fontFamily:'var(--mono)',fontWeight:700,fontSize:11.5,color:'var(--blue)',flexShrink:0,minWidth:60}}>{form.split(' ')[0]}</span>
                <span style={{fontSize:11,color:'var(--ink3)',lineHeight:1.4}}>{desc}</span>
              </div>
            ))}
          </div>
        </div>
      </div>

      {/* Tax Calendar */}
      <div style={{background:'#fff',border:'1px solid var(--line)',borderRadius:12,padding:16,marginBottom:16}}>
        <div style={{fontWeight:800,fontSize:13.5,marginBottom:12}}>FY 2026-27 Tax Compliance Calendar</div>
        <div style={{display:'flex',flexDirection:'column',gap:8}}>
          {Q_DATES.map((q,i) => {
            const days = Math.ceil((q.date - today)/86400000);
            const overdue = days < 0;
            const soon = days >= 0 && days <= 30;
            return (
              <div key={i} style={{display:'flex',alignItems:'center',gap:12,padding:'10px 12px',borderRadius:8,background:overdue?'var(--red-lt)':soon?'var(--amber-lt)':'var(--line2)',border:'1px solid '+(overdue?'var(--red-md)':soon?'var(--amber-md)':'var(--line)')}}>
                <div style={{width:40,height:40,borderRadius:8,background:overdue?'var(--red)':soon?'var(--amber)':'var(--blue)',display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center',color:'#fff',flexShrink:0}}>
                  <div style={{fontSize:9,fontWeight:700}}>{q.date.toLocaleDateString('en-IN',{month:'short'})}</div>
                  <div style={{fontSize:14,fontWeight:800,lineHeight:1}}>{q.date.getDate()}</div>
                </div>
                <div style={{flex:1}}>
                  <div style={{fontWeight:700,fontSize:13}}>{q.label}</div>
                  <div style={{fontSize:11.5,color:'var(--ink3)',marginTop:1}}>{q.date.toLocaleDateString('en-IN',{year:'numeric',month:'long',day:'numeric'})}</div>
                </div>
                <span style={{fontSize:11,fontWeight:700,color:overdue?'var(--red)':soon?'var(--amber)':'var(--ink3)'}}>
                  {overdue ? 'Overdue' : days + ' days'}
                </span>
              </div>
            );
          })}
        </div>
      </div>

      {/* AI Status + Upgrade hint */}
      <div style={{background:aiCfg?'var(--green-lt)':'var(--amber-lt)',border:'1px solid '+(aiCfg?'var(--green-md)':'var(--amber-md)'),borderRadius:12,padding:14,marginBottom:16}}>
        <div style={{fontWeight:700,fontSize:13,marginBottom:6,color:aiCfg?'#065f46':'#92400e'}}>
          {aiCfg ? '🤖 AI Advisor Active — ' + AI_PROVIDERS[aiCfg.provider].name + ' · ' + aiCfg.model : '🔑 AI Advisor Not Connected'}
        </div>
        <div style={{fontSize:12.5,color:aiCfg?'#065f46':'#92400e',lineHeight:1.6}}>
          {aiCfg
            ? 'AI is active across all tabs. Go to any income tab to see personalised tax saving recommendations in table format.'
            : 'Connect a free AI key (Groq recommended) to unlock personalised tax advice with exact investment amounts. Click "Setup AI Key" in any income tab.'}
        </div>
        {aiCfg && upgradeHint && upgradeHint.next && (
          <div className="ai-upgrade-hint" style={{marginTop:10}}>
            <span style={{fontSize:18}}>💡</span>
            <span><strong>AI Improvement Tip:</strong> {upgradeHint.msg} Better models = more precise deduction calculations and regime analysis.</span>
          </div>
        )}
      </div>

      {/* Quick Nav */}
      <div style={{fontWeight:800,fontSize:13.5,marginBottom:10}}>Quick Navigation</div>
      <div style={{display:'grid',gridTemplateColumns:'repeat(4,1fr)',gap:8,marginBottom:16}}>
        {[{id:'salary',i:'💼',t:'Salary'},{id:'freelance',i:'💻',t:'Freelance'},{id:'trading',i:'📈',t:'Capital Gains'},{id:'property',i:'🏠',t:'Property'},{id:'advtax',i:'📅',t:'Advance Tax'},{id:'final',i:'📊',t:'Compute Tax'}].map(item => (
          <button key={item.id} onClick={() => onTabSwitch(item.id)}
            style={{background:'#fff',border:'1px solid var(--line)',borderRadius:10,padding:'12px 8px',cursor:'pointer',textAlign:'center',transition:'var(--tr)',fontFamily:'var(--font)'}}>
            <div style={{fontSize:20,marginBottom:4}}>{item.i}</div>
            <div style={{fontSize:11.5,fontWeight:600,color:'var(--ink2)'}}>{item.t}</div>
          </button>
        ))}
      </div>
    </div>
  );
};

/* ── SCREEN 4: MODULES + FINAL TAX ── */
const Modules = ({profile, regime: initRegime}) => {
  const [tab,setTab] = useState('overview');
  const [regime,setRegime] = useState(initRegime);
  const [salData,setSalData] = useState(null);
  const [freData,setFreData] = useState(null);
  const [tradeData,setTradeData] = useState(null);
  const [propData,setPropData] = useState(null);
  const [showResult,setShowResult] = useState(false);
  const [showModal,setShowModal] = useState(false);
  const [showAISetup,setShowAISetup] = useState(false);
  const [aiConfig,setAIConfig] = useState(loadAIConfig);

  const tabs = [
    {id:'overview',icon:'📊',label:'Overview'},
    {id:'salary',icon:'💼',label:'Salaried Employee'},
    {id:'freelance',icon:'💻',label:'Freelancer or Consultant'},
    {id:'trading',icon:'📈',label:'Stock Market and Capital Gains'},
    {id:'property',icon:'🏠',label:'House Property'},
    {id:'advtax',icon:'📅',label:'Advance Tax'},
  ];

  const res = useMemo(() => {
    const salTax = n(salData && salData.netTaxable);
    const freTax = n(freData && freData.netTaxable);
    const specInc = n(tradeData && tradeData.spec);
    const hpInc = n(propData && propData.totalHP);
    const stcg = n(tradeData && tradeData.stcg);
    const ltcg = n(tradeData && tradeData.ltcg);
    const cgTax = n(tradeData && tradeData.totalCGTax);
    const normalInc = Math.max(0, salTax + freTax + specInc + hpInc);
    const incomeTax = regime==='new' ? TAX.newRegime(normalInc) : TAX.oldRegime(normalInc, profile.isSenior, profile.isSuperSenior);
    const totalTax = incomeTax + cgTax;
    const grossAll = normalInc + Math.max(0,stcg) + Math.max(0,ltcg);
    const eff = grossAll > 0 ? ((totalTax/grossAll)*100).toFixed(1) : '0';
    const plans = advisor(normalInc, regime, salData&&salData.elig80C, salData&&salData.npsOwn, (salData&&salData.healthSelf||0)+(salData&&salData.healthPar||0), salData&&salData.homeLoanInt);
    const newT = TAX.newRegime(normalInc) + cgTax;
    const oldT = TAX.oldRegime(normalInc, profile.isSenior, profile.isSuperSenior) + cgTax;
    return {salTax,freTax,specInc,hpInc,stcg,ltcg,cgTax,normalInc,incomeTax,totalTax,grossAll,eff,plans,newT,oldT};
  }, [salData,freData,tradeData,propData,regime]);

  const itrForm = useMemo(() => {
    const act = actFor(profile.fy);
    const isNew = act === 'new2025';
    const actLabel = isNew ? 'Income Tax Act 2025' : 'Income Tax Act 1961';
    const hasCG = Math.abs(n(tradeData&&tradeData.stcg)) + Math.abs(n(tradeData&&tradeData.ltcg)) + Math.abs(n(tradeData&&tradeData.spec)) > 0;
    const hasBiz = n(freData&&freData.grossReceipts) > 0;
    const hasFnO = Math.abs(n(tradeData&&tradeData.spec)) > 0;
    const grossIncome = res.normalInc + Math.max(0,n(tradeData&&tradeData.stcg)) + Math.max(0,n(tradeData&&tradeData.ltcg));
    const isPresumptive = freData && freData.mode === '44ADA';
    const ltcgOnly = n(tradeData&&tradeData.ltcg) > 0 && n(tradeData&&tradeData.stcg) === 0 && !hasFnO;
    const smallLTCG = ltcgOnly && n(tradeData&&tradeData.ltcg) <= 125000;
    const numProps = n(propData&&propData.propertyCount) || (n(propData&&propData.totalHP)!==0?1:0);
    if (hasFnO && hasBiz) return {f:'ITR-3', r:`F&O trading + professional income. Mandatory books of accounts. (${actLabel})`};
    if (hasFnO) return {f:'ITR-3', r:`F&O / Intraday trading treated as speculative business income. (${actLabel})`};
    if (hasBiz && hasCG) return {f:'ITR-3', r:`Business/professional income with capital gains. Cannot use ITR-4. (${actLabel})`};
    if (hasBiz && isPresumptive && !hasCG && grossIncome <= 5000000) return {f:'ITR-4 (Sugam)', r:`Presumptive income u/s 44ADA. Gross income below Rs 50L. ${isNew?'Due: 31 Aug (non-audit) — Rules 2026':'Simplified filing.'}`};
    if (hasBiz) return {f:'ITR-3', r:`Business or professional income. Actual books of accounts. ${isNew?'Due: 31 Aug (non-audit) — Rules 2026':''} (${actLabel})`};
    if (hasCG && !(isNew && smallLTCG)) return {f:'ITR-2', r:`Capital gains from equity/MF/property. Salary + other sources also reportable. (${actLabel})`};
    if (isNew && numProps <= 2 && smallLTCG) return {f:'ITR-1 (Sahaj)', r:'Salary + up to 2 house properties + LTCG ≤ Rs 1.25L u/s 112A. Income < Rs 50L. (Income Tax Act 2025, Rules 2026)'};
    if (!isNew && n(propData&&propData.totalHP) !== 0) return {f:'ITR-2', r:'Multiple house properties or loss. Salary + property income. (Income Tax Act 1961)'};
    if (isNew && numProps > 2) return {f:'ITR-2', r:'More than 2 house properties — ITR-1 not applicable. (Income Tax Act 2025)'};
    if (grossIncome > 5000000) return {f:'ITR-2', r:`Income exceeds Rs 50L — ITR-1 not applicable. (${actLabel})`};
    return {f:'ITR-1 (Sahaj)', r:isNew?'Salary + up to 2 house properties + interest income. Income < Rs 50L. (Income Tax Act 2025, Rules 2026)':'Salary + one house property + interest income. Income below Rs 50L. (Income Tax Act 1961)'};
  }, [tradeData,freData,propData,res,profile.fy]);

  const handleCompute = () => {
    setShowResult(true);
    if (res.totalTax > 50000) setTimeout(() => setShowModal(true), 1200);
    window.scrollTo(0, document.body.scrollHeight);
  };

  const emailSub = encodeURIComponent('Tax Report FY 2026-27 - ' + profile.name);
  const emailBod = encodeURIComponent('Dear Vipin,\n\nMy tax computation:\nName: ' + profile.name + '\nRegime: ' + regime.toUpperCase() + '\nTotal Tax: ' + inr(res.totalTax) + '\nEffective Rate: ' + res.eff + '%\n\nPlease review and suggest tax optimisation.\n\nThank you.');

  return (
    <div>
      <div className="sum-panel">
        <div className="sum-title">
          <span>Running Tax Summary — {profile.name}</span>
          <select value={regime} onChange={e => setRegime(e.target.value)} style={{height:26,padding:'0 8px',background:'rgba(255,255,255,.12)',border:'1px solid rgba(255,255,255,.2)',borderRadius:5,color:'#fff',fontSize:11,fontFamily:'var(--font)',fontWeight:700,cursor:'pointer'}}>
            <option value="new">New Regime</option>
            <option value="old">Old Regime</option>
          </select>
        </div>
        <div className="sum-grid">
          <div><div className="sum-label">Total Normal Income</div><div className={'sum-val sv-blue'}>{inr(res.normalInc)}</div></div>
          <div><div className="sum-label">Capital Gains Tax</div><div className={'sum-val sv-amber'}>{inr(res.cgTax)}</div></div>
          <div><div className="sum-label">Income Tax (Slabs)</div><div className={'sum-val sv-amber'}>{inr(res.incomeTax)}</div></div>
          <div><div className="sum-label">Total Tax Payable</div><div className={'sum-val sv-red'}>{inr(res.totalTax)}</div></div>
        </div>
      </div>

      <div className="card">
        <div className="card-head">
          <div style={{display:'flex',justifyContent:'space-between',alignItems:'flex-start',flexWrap:'wrap',gap:8}}>
            <div>
              <div className="card-title">{tab==='overview'?'Tax Dashboard Overview':tab==='advtax'?'Advance Tax Calculator':'Income Details — All Sources'}</div>
              <div className="card-sub">{tab==='overview'?'Complete summary of your tax position, deadlines, and AI status.':tab==='advtax'?'Calculate quarterly instalments, interest u/s 234B and 234C.':'Fill each tab relevant to your income. Regime can be switched anytime above.'}</div>
            </div>
            <span className="pill p-blue">Step 3 of 3</span>
          </div>
        </div>
        <div className="mod-tabs">
          {tabs.map(t => (
            <div key={t.id} className={'mod-tab' + (tab===t.id?' act':'')} onClick={() => setTab(t.id)}>
              <span>{t.icon}</span>{t.label}
            </div>
          ))}
        </div>
        <div className="card-body">
          {tab==='overview' && <OverviewTab res={res} regime={regime} profile={profile} itrForm={itrForm} onTabSwitch={t=>setTab(t==='final'?tab:t)}/>}
          {tab==='salary' && <ModSalary regime={regime} profile={profile} onUpdate={setSalData}/>}
          {tab==='freelance' && <ModFreelancer regime={regime} profile={profile} onUpdate={setFreData}/>}
          {tab==='trading' && <ModTrader onUpdate={setTradeData} profile={profile}/>}
          {tab==='property' && <ModProperty regime={regime} onUpdate={setPropData} profile={profile}/>}
          {tab==='advtax' && <AdvanceTax totalTax={res.totalTax} regime={regime}/>}
        </div>
        <div className="card-foot">
          <div>
            <div style={{fontSize:12,color:'var(--ink4)'}}>Fill all relevant tabs before computing. Regime change updates all deductions instantly.</div>
            <div style={{fontSize:11,color:'var(--blue)',fontWeight:600,marginTop:2}}>TaxSmartIndia Pro by Vipin Nair · {EMAIL}</div>
          </div>
          <div style={{display:'flex',gap:8,flexWrap:'wrap'}}>
            <button className="btn btn-outline btn-sm" onClick={() => setShowModal(true)}>💬 Consult Vipin</button>
            <button
              onClick={() => setShowAISetup(true)}
              style={{display:'inline-flex',alignItems:'center',gap:6,padding:'0 14px',height:36,borderRadius:8,border:'2px solid '+(aiConfig?'#0ea5e9':'var(--amber)'),background:aiConfig?'var(--ai-lt)':'var(--amber-lt)',color:aiConfig?'#0369a1':'#92400e',fontWeight:700,fontSize:12,cursor:'pointer',fontFamily:'var(--font)',whiteSpace:'nowrap'}}>
              {aiConfig ? '🤖 AI: ' + AI_PROVIDERS[aiConfig.provider].name : '🔑 Setup AI Key'}
            </button>
            <button className="btn btn-green btn-lg" onClick={handleCompute}>⚡ Compute Final Tax →</button>
          </div>
        </div>
      </div>

      {showResult && (
        <div className="card">
          <div className="card-head">
            <div className="card-title">Final Tax Report — FY 2026-27 (AY 2027-28)</div>
            <div className="card-sub">{profile.name} · {regime==='new'?'New':'Old'} Tax Regime · Generated by TaxSmartIndia Pro by Vipin Nair</div>
          </div>
          <div className="card-body">
            <div className="tax-hero">
              <div style={{display:'flex',justifyContent:'space-between',alignItems:'flex-start',marginBottom:16,flexWrap:'wrap',gap:12}}>
                <div>
                  <div className="tfl-lbl">Total Tax Payable (incl. 4% Education Cess)</div>
                  <div className="tfl-amt">{inr(res.totalTax)}</div>
                  <div className="tfl-sub">Effective Rate: {res.eff}% · AY 2027-28</div>
                </div>
                <div style={{textAlign:'right'}}>
                  <div style={{fontSize:10,color:'rgba(255,255,255,.4)',marginBottom:4}}>REPORT BY</div>
                  <div style={{fontWeight:800,color:'#fff',fontSize:14}}>Vipin Nair</div>
                  <div style={{fontSize:11,color:'rgba(255,255,255,.45)'}}>TaxSmartIndia Pro</div>
                  <div style={{fontSize:11,color:'rgba(255,255,255,.38)',marginTop:3}}>{EMAIL}</div>
                </div>
              </div>
              <div className="tfl-grid">
                <div className="tfl-box"><div className="tfl-box-lbl">Income Tax on Normal Income</div><div className="tfl-box-val">{inr(res.incomeTax)}</div></div>
                <div className="tfl-box"><div className="tfl-box-lbl">Capital Gains Tax (STCG+LTCG)</div><div className="tfl-box-val">{inr(res.cgTax)}</div></div>
                <div className="tfl-box"><div className="tfl-box-lbl">Effective Tax Rate</div><div className="tfl-box-val">{res.eff}%</div></div>
              </div>
            </div>

            <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:14,marginBottom:18}}>
              <div style={{border:'2px solid '+(regime==='new'?'var(--blue)':'var(--line)'),borderRadius:12,padding:16,background:regime==='new'?'var(--blue-lt)':'#fff'}}>
                <div style={{fontWeight:800,marginBottom:6,display:'flex',justifyContent:'space-between'}}>
                  New Regime {regime==='new'&&<span className="pill p-blue">ACTIVE</span>}
                </div>
                <div style={{fontSize:24,fontWeight:800,fontFamily:'var(--mono)',color:'var(--blue)'}}>{inr(res.newT)}</div>
              </div>
              <div style={{border:'2px solid '+(regime==='old'?'var(--blue)':'var(--line)'),borderRadius:12,padding:16,background:regime==='old'?'var(--blue-lt)':'#fff'}}>
                <div style={{fontWeight:800,marginBottom:6,display:'flex',justifyContent:'space-between'}}>
                  Old Regime {regime==='old'&&<span className="pill p-blue">ACTIVE</span>}
                </div>
                <div style={{fontSize:24,fontWeight:800,fontFamily:'var(--mono)',color:'var(--ink)'}}>{inr(res.oldT)}</div>
              </div>
            </div>
            <Al type="green" icon="💡">
              <b>You save {inr(Math.abs(res.newT-res.oldT))} by choosing {res.newT<=res.oldT?'New':'Old'} Regime.</b>{' '}
              {res.newT<=res.oldT?'New Regime gives lower rates. Invest freely without lock-in constraints.':'Old Regime wins because your deductions exceed the benefit of lower New Regime rates.'}
            </Al>

            <Div label="Detailed Income and Tax Breakdown"/>
            <table className="bdt" style={{marginBottom:18}}><tbody>
              <tr><td colSpan={2} style={{background:'var(--line2)',fontWeight:800,padding:'8px 4px',fontSize:12}}>INCOME HEADS</td></tr>
              <tr><td className="bd-lbl">Salaries (after Standard Deduction and all deductions)</td><td className="bd-val">{inr(res.salTax)}</td></tr>
              <tr><td className="bd-lbl">Business or Profession Income</td><td className="bd-val">{inr(res.freTax)}</td></tr>
              <tr><td className="bd-lbl">Speculative Income (Intraday or F&amp;O)</td><td className="bd-val">{inr(res.specInc)}</td></tr>
              <tr><td className="bd-lbl">House Property Income or (Loss)</td><td className={res.hpInc<0?'bd-ded':'bd-val'}>{inr(res.hpInc)}</td></tr>
              <tr><td className="bd-lbl" style={{fontWeight:700}}>Gross Total Normal Income</td><td className="bd-tot">{inr(res.normalInc)}</td></tr>
              <tr><td colSpan={2} style={{background:'var(--line2)',fontWeight:800,padding:'8px 4px',fontSize:12}}>CAPITAL GAINS (Taxed at Special Rates)</td></tr>
              <tr><td className="bd-lbl">STCG on Equity or MF — 20%</td><td className="bd-val">{inr(Math.max(0,res.stcg))}</td></tr>
              <tr><td className="bd-lbl">LTCG on Equity or MF — 12.5% (above Rs 1.25L exempt)</td><td className="bd-val">{inr(Math.max(0,res.ltcg))}</td></tr>
              <tr><td colSpan={2} style={{background:'var(--line2)',fontWeight:800,padding:'8px 4px',fontSize:12}}>TAX COMPUTATION</td></tr>
              <tr><td className="bd-lbl">Income Tax on Normal Income ({regime==='new'?'New':'Old'} Regime slabs, before cess)</td><td className="bd-val">{inr(Math.round(res.incomeTax/1.04))}</td></tr>
              <tr><td className="bd-lbl">Capital Gains Tax (STCG 20% + LTCG 12.5%)</td><td className="bd-val">{inr(res.cgTax)}</td></tr>
              <tr><td className="bd-lbl">Add: 4% Health and Education Cess</td><td className="bd-val">{inr(Math.round(res.totalTax - res.totalTax/1.04))}</td></tr>
              <tr><td className="bd-lbl" style={{fontWeight:800,fontSize:14}}>Total Tax Payable</td><td className="bd-tot" style={{fontSize:15}}>{inr(res.totalTax)}</td></tr>
            </tbody></table>

            <Div label="Recommended ITR Form"/>
            <div style={{background:'var(--line2)',border:'1px solid var(--line)',borderRadius:10,padding:14,marginBottom:18,display:'flex',alignItems:'center',gap:14,flexWrap:'wrap'}}>
              <span className="pill p-blue" style={{fontSize:14,padding:'7px 16px'}}>{itrForm.f}</span>
              <div>
                <div style={{fontWeight:700,fontSize:13}}>File using {itrForm.f}</div>
                <div style={{fontSize:12,color:'var(--ink3)'}}>Reason: {itrForm.r}</div>
                <div style={{fontSize:11,color:'var(--ink4)',marginTop:3}}>Due date: 31 July 2027 (non-audit) · 31 October 2027 (audit cases)</div>
              </div>
            </div>

            {res.plans && res.plans.length > 0 && (
              <>
                <Div label="KPMG-Style Tax Saving Action Plan by Vipin Nair"/>
                <Al type="purple" icon="🏆">
                  <b>Personalised Analysis:</b> Based on your income of {inr(res.normalInc)} and tax of {inr(res.totalTax)}, here are investment steps with exact amounts and tax saved at your slab rate.
                </Al>
                <div className="plan-grid">
                  {res.plans.map((p,i) => (
                    <div key={i} className={'plan-card plan-' + p.p}>
                      <div className="plan-sec">{p.sec}</div>
                      <div className="plan-title">{p.p==='urgent'?'🔴 ':p.p==='high'?'🟡 ':'🟢 '}{p.title}</div>
                      <div className="plan-desc">{p.desc}</div>
                      <div className="plan-save">Tax Saved: {p.save}</div>
                      {p.invest && <div className="plan-invest">Invest: {p.invest}</div>}
                    </div>
                  ))}
                </div>
              </>
            )}

            {profile.coupleFiling && profile.spouseName && (
              <>
                <Div label="Couple Tax Optimisation Strategy"/>
                <Al type="amber" icon="💑">
                  <b>For {profile.name.split(' ')[0]} and {profile.spouseName.split(' ')[0]}:</b> Claim 80C investments under the spouse in the higher tax slab. If both are co-borrowers on home loan, claim Rs 2L interest deduction each (double benefit). If one earns below Rs 12L (New Regime), that spouse pays zero tax — allocate all deductions to the higher-earning spouse.
                </Al>
              </>
            )}

            {/* ── AI FINAL TAX ANALYSIS ── */}
            <Div label="🤖 AI Tax Optimisation Report"/>
            <FinalAIAnalysis res={res} regime={regime} profile={profile} itrForm={itrForm}/>

            <div className="vipin-card">
              <div className="vc-name">Not confident? Consult Vipin Nair</div>
              <div className="vc-role">Finance and Accounts Professional · CIIE Initiatives · IIM Ahmedabad · {EMAIL}</div>
              <div className="vc-btns">
                <a href={'mailto:' + EMAIL + '?subject=' + emailSub + '&body=' + emailBod} className="vc-btn vc-w">📧 Email Tax Report</a>
                <a href={'mailto:' + EMAIL + '?subject=Appointment Request - Tax Planning FY 2026-27'} className="vc-btn vc-o">📅 Schedule Appointment</a>
              </div>
            </div>

            <div style={{display:'flex',gap:10,justifyContent:'flex-end',marginTop:12}}>
              <button className="btn btn-outline btn-sm" onClick={() => {
                const t = 'TaxSmartIndia Pro by Vipin Nair\n' + profile.name + ' | FY ' + (profile.fy||'2026-27') + ' | ' + (regime==='new'?'New':'Old') + ' Regime | ' + (actFor(profile.fy)==='new2025'?'Income Tax Act 2025':'Income Tax Act 1961') + '\n\nTotal Tax: ' + inr(res.totalTax) + '\nEffective Rate: ' + res.eff + '%\nITR Form: ' + itrForm.f + '\n\nContact: ' + EMAIL;
                if (navigator.clipboard) navigator.clipboard.writeText(t).then(() => alert('Summary copied!'));
              }}>📋 Copy Summary</button>
              <button className="btn btn-outline btn-sm" onClick={() => window.print()}>🖨️ Print PDF</button>
              <button className="btn btn-purple btn-sm" onClick={() => setShowModal(true)}>💬 Consult Vipin</button>
            </div>
          </div>
        </div>
      )}

      {showModal && <ConsultModal onClose={() => setShowModal(false)}/>}
      {showAISetup && (
        <AISetupModal
          onDone={(cfg) => { setAIConfig(cfg); setShowAISetup(false); }}
          onClose={() => setShowAISetup(false)}
        />
      )}
      <FloatingAI globalCtx={{
        name: profile.name,
        regime,
        normalIncome: res.normalInc,
        totalTax: res.totalTax,
        effectiveRate: res.eff,
        cgTax: res.cgTax,
        isSenior: profile.isSenior,
        city: profile.city,
        cityType: profile.cityType
      }}/>
    </div>
  );
};

/* ── ROOT APP ── */
const STEPS = ['Your Profile','Tax Regime','Income and Compute'];
const App = () => {
  const [screen,setScreen] = useState('hero');
  const [step,setStep] = useState(0);
  const [profile,setProfile] = useState(null);
  const [regime,setRegime] = useState(null);

  const goHome = () => { setScreen('hero'); setStep(0); setProfile(null); setRegime(null); };
  const goProfile = () => { setScreen('profile'); setStep(0); };
  const doProfile = p => { setProfile(p); if (regime) { setStep(2); setScreen('modules'); } else { setStep(1); setScreen('regime'); } };
  const doRegime = r => { setRegime(r); setStep(2); setScreen('modules'); };

  return (
    <div>
      <nav className="nav">
        <div className="nav-logo" onClick={goHome}>
          <div className="nav-icon">{'\u20B9'}</div>
          <div>
            <div className="nav-title">TaxSmart<em>India</em> Pro</div>
            <div className="nav-byline">by Vipin Nair · FY {profile&&profile.fy?profile.fy:'2026-27'}</div>
          </div>
        </div>
        <div className="nav-right">
          <span className="pill p-ai" style={{background:'var(--ai-lt)',color:'var(--ai)'}}>🤖 AI-Powered</span>
          <span className="pill p-green">FY 2026-27</span>
          <span className="pill p-blue">AY 2027-28</span>
          {profile && <span className="pill p-gray">👤 {profile.name.split(' ')[0]}</span>}
          {regime && <span className={'pill ' + (regime==='new'?'p-blue':'p-amber')}>{regime==='new'?'🆕 New':'📜 Old'}</span>}
          <a href={'mailto:' + EMAIL + '?subject=Tax Consultation - TaxSmartIndia Pro'} className="btn btn-purple btn-sm">💬 Consult Vipin</a>
        </div>
      </nav>

      {screen !== 'hero' && (
        <div className="stepper-bar">
          <div className="stepper">
            {STEPS.map((s,i) => (
              <React.Fragment key={i}>
                <div className={'st' + (i===step?' cur':'') + (i<step?' done':'')}>
                  <div className="st-n">{i<step?'✓':i+1}</div>
                  <div className="st-l">{s}</div>
                </div>
                {i < STEPS.length-1 && <div className={'st-connector' + (i<step?' done':'')}/>}
              </React.Fragment>
            ))}
          </div>
          {screen === 'modules' && (
            <button onClick={goProfile} style={{flexShrink:0,background:'var(--blue-lt)',border:'1px solid var(--blue-md)',borderRadius:8,padding:'6px 16px',color:'var(--blue)',fontSize:12,fontWeight:700,cursor:'pointer',fontFamily:'var(--font)',display:'flex',alignItems:'center',gap:6}}>
              ✏️ Edit Profile
            </button>
          )}
        </div>
      )}

      <div className="wrap">
        {screen==='hero' && <Hero onStart={() => setScreen('profile')}/>}
        {screen==='profile' && <Profile onDone={doProfile} initial={profile}/>}
        {screen==='regime' && <RegimeScreen profile={profile} onDone={doRegime}/>}
        {screen==='modules' && <Modules profile={profile} regime={regime}/>}
      </div>

      <footer className="site-footer">
        <div className="ft-inner">
          <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:3,flexWrap:'wrap',gap:8}}>
            <div className="ft-brand">TaxSmart<em>India</em> Pro</div>
            <button onClick={() => { if(window.confirm('Clear all AI settings and local data?')) { clearAIConfig(); window.location.reload(); } }}
              style={{background:'rgba(255,255,255,.08)',border:'1px solid rgba(255,255,255,.15)',borderRadius:7,padding:'5px 12px',color:'rgba(255,255,255,.55)',fontSize:11,fontWeight:600,cursor:'pointer',fontFamily:'var(--font)'}}>
              🗑️ Clear All Data
            </button>
          </div>
          <div className="ft-tagline">India's Most User Friendly Income Tax Planner with AI Advisor</div>
          <div style={{fontSize:11.5,color:'rgba(255,255,255,.35)',marginBottom:16}}>by Vipin Nair · Finance and Accounts Professional · CIIE Initiatives, IIM Ahmedabad · Built in India 🇮🇳</div>
          <div className="ft-grid">
            <div>
              <div className="ft-col-title">Contact Vipin</div>
              <div className="ft-links">
                <a href={'mailto:' + EMAIL}>📧 {EMAIL}</a>
                <a href={'mailto:' + EMAIL + '?subject=Tax Planning Appointment'}>📅 Schedule Appointment</a>
                <a href={'mailto:' + EMAIL + '?subject=Tax Consultation'}>💬 Get Consultation</a>
              </div>
            </div>
            <div>
              <div className="ft-col-title">Tax Resources</div>
              <div className="ft-links">
                <a href="https://incometax.gov.in" target="_blank" rel="noopener">Income Tax Portal</a>
                <a href="https://eportal.incometax.gov.in" target="_blank" rel="noopener">File ITR Online</a>
              </div>
            </div>
            <div>
              <div className="ft-col-title">FY 2026-27 Key Dates</div>
              <div className="ft-links">
                <span>15 Jun 2026 — Q1 Advance Tax</span>
                <span>15 Sep 2026 — Q2 Advance Tax</span>
                <span>15 Dec 2026 — Q3 Advance Tax</span>
                <span>15 Mar 2027 — Q4 Advance Tax</span>
                <span>31 Jul 2027 — ITR Filing Deadline</span>
              </div>
            </div>
          </div>
          <div className="ft-disclaimer">
            <strong>Disclaimer:</strong> This tool was thoughtfully created by Vipin Nair as an educational guide to help you easily estimate your Income Tax for FY 2026-27 (based on the Income Tax Act 2025 and Finance Act 2026).<br/><br/>
            <strong>🔒 Your Data is 100% Private:</strong> We respect your privacy. All calculations happen directly within your browser. Absolutely no personal or financial data is stored, saved, or transmitted to any servers.<br/><br/>
            <strong>💡 A Quick Note on Tax Advice:</strong> While we strive for the highest accuracy, tax laws are complex and personal to your unique situation. TaxSmartIndia Pro is meant for educational and estimation purposes only. It does not replace professional legal or CA services. To ensure your final filings are perfect, we always encourage consulting with a qualified Chartered Accountant or tax professional. The creator assumes no liability for discrepancies in final tax obligations.
          </div>
          <div className="ft-bottom">
            <span>Made for Indian Taxpayers with ❤️ by <strong style={{color:'#93c5fd'}}>Vipin Nair</strong> · {EMAIL}</span>
            <span>TaxSmartIndia Pro · FY 2026-27 · For Resident Indians</span>
          </div>
        </div>
      </footer>
    </div>
  );
};

ReactDOM.render(React.createElement(App), document.getElementById('root'));
</script>
</body>
</html>
