<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>TaxSmartIndia Pro by Vipin Nair FY 2026-27</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.development.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.development.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
:root{
  --blue:#1a56db;--blue-lt:#eff6ff;--blue-md:#bfdbfe;
  --green:#059669;--green-lt:#ecfdf5;--green-md:#a7f3d0;
  --amber:#d97706;--amber-lt:#fffbeb;--amber-md:#fde68a;
  --red:#dc2626;--red-lt:#fef2f2;--red-md:#fecaca;
  --purple:#7c3aed;--purple-lt:#f5f3ff;
  --ink:#0f1729;--ink2:#374151;--ink3:#6b7280;--ink4:#9ca3af;
  --line:#e5e7eb;--line2:#f3f4f6;--bg:#f9fafb;--card:#fff;
  --font:'Sora',sans-serif;--mono:'JetBrains Mono',monospace;
  --r8:8px;--r12:12px;--r16:16px;--r24:24px;
  --sh1:0 1px 3px rgba(0,0,0,.07);--sh2:0 4px 16px rgba(0,0,0,.09);
  --tr:.15s ease;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:var(--font);background:var(--bg);color:var(--ink);line-height:1.55;-webkit-font-smoothing:antialiased}
::-webkit-scrollbar{width:5px}::-webkit-scrollbar-thumb{background:var(--line);border-radius:3px}

/* NAV */
.nav{background:#fff;border-bottom:1px solid var(--line);padding:0 24px;height:58px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:300;box-shadow:var(--sh1)}
.nav-logo{display:flex;align-items:center;gap:10px;text-decoration:none;cursor:pointer}
.nav-icon{width:34px;height:34px;background:linear-gradient(135deg,#1a56db,#3b82f6);border-radius:8px;display:flex;align-items:center;justify-content:center;color:#fff;font-size:16px;font-weight:800;flex-shrink:0}
.nav-title{font-size:15px;font-weight:800;color:var(--ink);letter-spacing:-.3px;line-height:1.1}
.nav-title em{color:var(--blue);font-style:normal}
.nav-byline{font-size:10px;color:var(--ink4);font-weight:500}
.nav-right{display:flex;align-items:center;gap:8px}

/* PILLS */
.pill{display:inline-flex;align-items:center;padding:3px 10px;border-radius:20px;font-size:11px;font-weight:700;white-space:nowrap}
.p-blue{background:var(--blue-lt);color:var(--blue)}
.p-green{background:var(--green-lt);color:var(--green)}
.p-amber{background:var(--amber-lt);color:var(--amber)}
.p-gray{background:var(--line2);color:var(--ink3)}
.p-purple{background:var(--purple-lt);color:var(--purple)}

/* STEPPER */
.stepper-bar{background:#fff;border-bottom:1px solid var(--line);padding:0 24px}
.stepper{max-width:820px;margin:0 auto;display:flex;align-items:center}
.st{flex:1;display:flex;align-items:center;gap:8px;padding:12px 0;position:relative}
.st:not(:last-child)::after{content:'›';position:absolute;right:-8px;top:50%;transform:translateY(-50%);color:var(--ink4);font-size:14px}
.st-n{width:24px;height:24px;border-radius:50%;border:2px solid var(--line);display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;color:var(--ink4);flex-shrink:0;transition:var(--tr)}
.st-l{font-size:11px;font-weight:600;color:var(--ink4);white-space:nowrap;transition:var(--tr)}
.st.cur .st-n{background:var(--blue);border-color:var(--blue);color:#fff}
.st.cur .st-l{color:var(--blue);font-weight:700}
.st.done .st-n{background:var(--green);border-color:var(--green);color:#fff}
.st.done .st-l{color:var(--green)}
.st.done{cursor:pointer}
.st.done:hover .st-l{text-decoration:underline}

/* LAYOUT */
.wrap{max-width:980px;margin:0 auto;padding:32px 20px 60px}

/* CARDS */
.card{background:var(--card);border:1px solid var(--line);border-radius:var(--r16);box-shadow:var(--sh2);overflow:hidden;margin-bottom:18px}
.card-head{padding:22px 28px 16px;border-bottom:1px solid var(--line)}
.card-body{padding:22px 28px}
.card-foot{padding:14px 28px;border-top:1px solid var(--line);background:var(--line2);display:flex;align-items:center;justify-content:space-between;gap:12px;flex-wrap:wrap}
.card-title{font-size:17px;font-weight:800;letter-spacing:-.3px}
.card-sub{font-size:12.5px;color:var(--ink3);margin-top:3px;line-height:1.5}

/* FORMS */
.fg{display:flex;flex-direction:column;gap:5px}
.fg label{font-size:11px;font-weight:700;color:var(--ink3);text-transform:uppercase;letter-spacing:.6px;display:flex;align-items:center;gap:5px}
.fg input,.fg select{height:42px;padding:0 13px;border:1.5px solid var(--line);border-radius:var(--r8);font-family:var(--font);font-size:13.5px;color:var(--ink);background:#fff;transition:var(--tr);outline:none;width:100%}
.fg input:focus,.fg select:focus{border-color:var(--blue);box-shadow:0 0 0 3px rgba(26,86,219,.1)}
.fg input.err{border-color:var(--red)}
.fg .hint{font-size:11px;color:var(--ink4);line-height:1.4}
.fg .emsg{font-size:11px;color:var(--red);font-weight:600}
.fg .aval{height:42px;padding:0 12px;border:1.5px dashed #93c5fd;border-radius:var(--r8);font-family:var(--mono);font-size:13px;font-weight:700;color:var(--blue);background:var(--blue-lt);display:flex;align-items:center}
.fg .aval.gv{color:var(--green);background:var(--green-lt);border-color:var(--green-md)}
.fg .aval.rv{color:var(--red);background:var(--red-lt);border-color:var(--red-md)}
.grid{display:grid;gap:15px}
.g2{grid-template-columns:1fr 1fr}
.g3{grid-template-columns:1fr 1fr 1fr}
.g4{grid-template-columns:1fr 1fr 1fr 1fr}
.s2{grid-column:span 2}.s3{grid-column:span 3}
@media(max-width:640px){.g2,.g3,.g4{grid-template-columns:1fr}.s2,.s3{grid-column:span 1}}

/* MONEY INPUT */
.mon{position:relative}
.mon-pfx{position:absolute;left:11px;top:50%;transform:translateY(-50%);font-size:13px;font-weight:700;color:var(--ink4);pointer-events:none;font-family:var(--mono);z-index:1}
.mon input{padding-left:26px;font-family:var(--mono)}

/* RADIO */
.rg{display:flex;gap:6px;flex-wrap:wrap}
.rb{display:flex;align-items:center;gap:6px;padding:7px 13px;border:1.5px solid var(--line);border-radius:var(--r8);cursor:pointer;font-size:12.5px;font-weight:500;color:var(--ink3);background:#fff;transition:var(--tr);user-select:none}
.rb:hover{border-color:var(--blue);color:var(--blue)}
.rb.sel{background:var(--blue-lt);border-color:var(--blue);color:var(--blue);font-weight:700}
.rb input{display:none}
.rb-dot{width:12px;height:12px;border-radius:50%;border:2px solid currentColor;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.rb.sel .rb-dot::after{content:'';width:5px;height:5px;background:var(--blue);border-radius:50%}

/* TOGGLE */
.sw-row{display:flex;align-items:center;justify-content:space-between;padding:13px 15px;background:var(--amber-lt);border:1.5px solid var(--amber-md);border-radius:var(--r12);cursor:pointer;margin-top:14px}
.sw-title{font-size:13px;font-weight:700;color:#92400e}
.sw-desc{font-size:11px;color:#b45309;margin-top:1px}
.sw{width:38px;height:21px;background:var(--line);border-radius:11px;position:relative;transition:var(--tr);flex-shrink:0}
.sw.on{background:var(--blue)}
.sw::after{content:'';position:absolute;width:15px;height:15px;background:#fff;border-radius:50%;top:3px;left:3px;transition:var(--tr);box-shadow:0 1px 3px rgba(0,0,0,.2)}
.sw.on::after{left:20px}

/* ALERTS */
.al{display:flex;gap:10px;padding:12px 14px;border-radius:var(--r8);font-size:12.5px;line-height:1.5;margin-bottom:16px}
.al-icon{font-size:15px;flex-shrink:0;margin-top:1px}
.al b{font-weight:700}
.al-blue{background:var(--blue-lt);border-left:3px solid var(--blue);color:#1e40af}
.al-green{background:var(--green-lt);border-left:3px solid var(--green);color:#065f46}
.al-amber{background:var(--amber-lt);border-left:3px solid var(--amber);color:#92400e}
.al-red{background:var(--red-lt);border-left:3px solid var(--red);color:#991b1b}
.al-purple{background:var(--purple-lt);border-left:3px solid var(--purple);color:#5b21b6}

/* BUTTONS */
.btn{display:inline-flex;align-items:center;justify-content:center;gap:7px;padding:0 18px;height:40px;border-radius:var(--r8);font-family:var(--font);font-size:13px;font-weight:700;cursor:pointer;border:none;outline:none;transition:var(--tr);text-decoration:none;white-space:nowrap}
.btn-primary{background:linear-gradient(135deg,#1a56db,#3b82f6);color:#fff;box-shadow:0 2px 8px rgba(26,86,219,.28)}
.btn-primary:hover{transform:translateY(-1px);box-shadow:0 4px 14px rgba(26,86,219,.36)}
.btn-outline{background:#fff;color:var(--blue);border:1.5px solid var(--blue)}
.btn-outline:hover{background:var(--blue-lt)}
.btn-ghost{background:transparent;color:var(--ink3);border:none}
.btn-ghost:hover{background:var(--line2)}
.btn-green{background:linear-gradient(135deg,#059669,#10b981);color:#fff}
.btn-green:hover{transform:translateY(-1px)}
.btn-purple{background:linear-gradient(135deg,#7c3aed,#8b5cf6);color:#fff}
.btn-purple:hover{transform:translateY(-1px)}
.btn-lg{height:48px;padding:0 26px;font-size:14px;border-radius:var(--r12)}
.btn-sm{height:30px;padding:0 10px;font-size:11.5px}

/* DIVIDER */
.div-row{display:flex;align-items:center;gap:10px;margin:20px 0 14px}
.div-lbl{font-size:10px;font-weight:800;color:var(--ink4);text-transform:uppercase;letter-spacing:1px;white-space:nowrap}
.div-line{flex:1;height:1px;background:var(--line)}

/* REGIME CARDS */
.rc-grid{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-bottom:18px}
.rc{border:2px solid var(--line);border-radius:var(--r16);padding:20px;cursor:pointer;transition:var(--tr);position:relative;background:#fff}
.rc:hover{border-color:var(--blue)}
.rc.sel{border-color:var(--blue);background:var(--blue-lt)}
.rc.rec{border-color:var(--green)}
.rc.rec.sel{background:var(--green-lt);border-color:var(--green)}
.rc-badge{position:absolute;top:-10px;left:18px;background:var(--green);color:#fff;font-size:10px;font-weight:800;padding:2px 9px;border-radius:20px}
.rc-chk{position:absolute;top:14px;right:14px;width:20px;height:20px;border-radius:50%;border:2px solid var(--line);display:flex;align-items:center;justify-content:center;font-size:10px;transition:var(--tr)}
.rc.sel .rc-chk{background:var(--blue);border-color:var(--blue);color:#fff}
.rc.rec.sel .rc-chk{background:var(--green);border-color:var(--green)}
.rc-title{font-size:15px;font-weight:800;margin-bottom:4px}
.rc-sub{font-size:11.5px;color:var(--ink3);margin-bottom:12px;line-height:1.5}
.slab-row{display:flex;justify-content:space-between;font-size:11px;padding:5px 8px;background:rgba(0,0,0,.03);border-radius:5px;margin-bottom:3px}
.sr-range{color:var(--ink3)}
.sr-rate{font-weight:700;font-family:var(--mono)}
.nil{color:var(--green)}.low{color:var(--blue)}.mid{color:var(--amber)}.hi{color:var(--red)}
.rc-tax-box{margin-top:12px;padding:8px 11px;background:rgba(0,0,0,.05);border-radius:var(--r8);font-family:var(--mono);font-size:12.5px;font-weight:700}

/* SUMMARY PANEL */
.sum-panel{background:linear-gradient(135deg,#0f1729,#1e3a5f);border-radius:var(--r16);padding:20px 24px;color:#fff;margin-bottom:18px}
.sum-title{font-size:11px;font-weight:700;color:rgba(255,255,255,.4);text-transform:uppercase;letter-spacing:1px;margin-bottom:14px;display:flex;justify-content:space-between;align-items:center}
.sum-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:14px}
.sum-label{font-size:10.5px;color:rgba(255,255,255,.4);font-weight:600;margin-bottom:3px}
.sum-val{font-size:17px;font-weight:800;font-family:var(--mono);letter-spacing:-.4px}
.sv-blue{color:#93c5fd}.sv-amber{color:#fcd34d}.sv-red{color:#fca5a5}.sv-green{color:#6ee7b7}

/* MODULE TABS */
.mod-tabs{display:flex;border-bottom:2px solid var(--line);overflow-x:auto;background:#fff}
.mod-tab{padding:12px 16px;font-size:12px;font-weight:600;color:var(--ink3);cursor:pointer;border-bottom:2px solid transparent;margin-bottom:-2px;transition:var(--tr);display:flex;align-items:center;gap:6px;white-space:nowrap;user-select:none}
.mod-tab:hover{color:var(--blue);background:var(--blue-lt)}
.mod-tab.act{color:var(--blue);border-bottom-color:var(--blue);font-weight:700}

/* REGIME BANNER */
.r-banner{display:flex;align-items:flex-start;gap:9px;padding:10px 13px;border-radius:var(--r8);font-size:12px;font-weight:600;margin-bottom:14px;line-height:1.5}
.r-new{background:linear-gradient(135deg,#dbeafe,#eff6ff);border:1.5px solid #93c5fd;color:#1e40af}
.r-old{background:linear-gradient(135deg,#fef3c7,#fffbeb);border:1.5px solid #fcd34d;color:#92400e}
.locked-box{background:var(--line2);border:1.5px dashed var(--line);border-radius:var(--r12);padding:18px;text-align:center;color:var(--ink4);font-size:12.5px;margin:10px 0;line-height:1.7}

/* TABLE */
.tbl-wrap{overflow-x:auto;border:1px solid var(--line);border-radius:var(--r12);margin-bottom:14px}
table{width:100%;border-collapse:collapse;font-size:12px}
thead th{background:var(--line2);padding:8px 10px;text-align:left;font-size:10.5px;font-weight:700;color:var(--ink3);text-transform:uppercase;letter-spacing:.4px;border-bottom:1px solid var(--line)}
tbody td{padding:8px 10px;border-bottom:1px solid var(--line2);vertical-align:middle}
tbody tr:last-child td{border-bottom:none}
.td-pos{font-family:var(--mono);font-weight:700;color:var(--green)}
.td-neg{font-family:var(--mono);font-weight:700;color:var(--red)}
.td-mono{font-family:var(--mono);font-size:11.5px}
.trade-row td input,.trade-row td select{height:32px;padding:0 7px;border:1.5px solid var(--line);border-radius:5px;font-size:11.5px;font-family:var(--font);width:100%;min-width:70px;outline:none}
.trade-row td input:focus,.trade-row td select:focus{border-color:var(--blue)}
.trade-row .mon-pfx{font-size:10px;left:5px}
.trade-row .mon input{padding-left:17px}

/* UPLOAD */
.upload-zone{border:2px dashed var(--line);border-radius:var(--r12);padding:22px;text-align:center;cursor:pointer;transition:var(--tr);background:#fff;margin-bottom:14px}
.upload-zone:hover{border-color:var(--blue);background:var(--blue-lt)}
input[type=file]{display:none}

/* BREAKDOWN */
.bdt{width:100%;border-collapse:collapse;font-size:12.5px}
.bdt td{padding:8px 4px;border-bottom:1px solid var(--line)}
.bdt tr:last-child td{border-bottom:none}
.bd-lbl{color:var(--ink2)}
.bd-val{text-align:right;font-family:var(--mono);font-weight:600;color:var(--ink)}
.bd-ded{text-align:right;font-family:var(--mono);font-weight:600;color:var(--green)}
.bd-tot{text-align:right;font-family:var(--mono);font-weight:800;color:var(--blue)}

/* FINAL TAX */
.tax-hero{background:linear-gradient(135deg,#0f1729 0%,#1e3a5f 60%,#0f1729 100%);border-radius:var(--r24);padding:28px;color:#fff;margin-bottom:18px}
.tfl-lbl{font-size:11px;font-weight:700;color:rgba(255,255,255,.45);text-transform:uppercase;letter-spacing:1px;margin-bottom:6px}
.tfl-amt{font-size:48px;font-weight:800;font-family:var(--mono);letter-spacing:-2px;line-height:1}
.tfl-sub{font-size:12px;color:rgba(255,255,255,.45);margin-top:5px}
.tfl-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-top:16px}
.tfl-box{background:rgba(255,255,255,.07);border-radius:var(--r12);padding:12px 14px;border:1px solid rgba(255,255,255,.1)}
.tfl-box-lbl{font-size:9.5px;font-weight:700;color:rgba(255,255,255,.38);text-transform:uppercase;letter-spacing:.7px;margin-bottom:4px}
.tfl-box-val{font-size:15px;font-weight:800;font-family:var(--mono);color:#93c5fd}

/* SAVINGS PLAN */
.plan-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:18px}
.plan-card{border:1px solid var(--line);border-radius:var(--r12);padding:14px;background:#fff;position:relative;overflow:hidden}
.plan-card::before{content:'';position:absolute;top:0;left:0;right:0;height:3px}
.plan-urgent::before{background:linear-gradient(90deg,var(--red),#ef4444)}
.plan-high::before{background:linear-gradient(90deg,var(--amber),#f59e0b)}
.plan-normal::before{background:linear-gradient(90deg,var(--blue),#3b82f6)}
.plan-sec{font-size:10px;font-weight:800;color:var(--blue);text-transform:uppercase;letter-spacing:.5px;margin-bottom:3px}
.plan-title{font-size:13px;font-weight:700;margin-bottom:4px;color:var(--ink)}
.plan-desc{font-size:11.5px;color:var(--ink3);line-height:1.5}
.plan-save{font-family:var(--mono);font-size:12px;font-weight:700;color:var(--green);margin-top:6px}
.plan-invest{font-size:11px;font-weight:700;color:var(--purple);margin-top:4px;padding:3px 8px;background:var(--purple-lt);border-radius:4px;display:inline-block}

/* TOOLTIP */
.tip-wrap{position:relative;display:inline-flex;align-items:center;margin-left:3px;vertical-align:middle}
.tip-btn{width:15px;height:15px;border-radius:50%;background:var(--blue-md);display:inline-flex;align-items:center;justify-content:center;font-size:9px;font-weight:900;color:var(--blue);cursor:help;border:1px solid #93c5fd;flex-shrink:0}
.tip-popup{display:none;position:absolute;bottom:calc(100% + 8px);left:50%;transform:translateX(-50%);background:#0f1729;color:#e2e8f0;font-size:11.5px;font-weight:400;padding:10px 14px;border-radius:var(--r8);white-space:normal;max-width:280px;width:250px;z-index:999;box-shadow:0 4px 20px rgba(0,0,0,.35);line-height:1.55;text-transform:none;letter-spacing:0;pointer-events:none;border:1px solid rgba(255,255,255,.1)}
.tip-popup::after{content:'';position:absolute;top:100%;left:50%;transform:translateX(-50%);border:5px solid transparent;border-top-color:#0f1729}
.tip-wrap:hover .tip-popup{display:block}

/* MODAL */
.overlay{position:fixed;inset:0;background:rgba(15,23,41,.65);backdrop-filter:blur(4px);z-index:500;display:flex;align-items:center;justify-content:center;padding:20px}
.modal{background:#fff;border-radius:var(--r24);max-width:520px;width:100%;box-shadow:0 8px 40px rgba(0,0,0,.25);overflow:hidden;animation:mIn .2s ease}
@keyframes mIn{from{opacity:0;transform:translateY(16px) scale(.97)}to{opacity:1;transform:none}}
.modal-head{background:linear-gradient(135deg,#0f1729,#1e3a5f);padding:22px 26px;color:#fff}
.modal-body{padding:22px 26px}
.modal-foot{padding:14px 26px;border-top:1px solid var(--line);background:var(--line2);display:flex;justify-content:flex-end;gap:10px}

/* VIPIN CARD */
.vipin-card{background:linear-gradient(135deg,#1a56db,#7c3aed);border-radius:var(--r16);padding:20px 22px;color:#fff;margin-top:16px;margin-bottom:4px}
.vc-name{font-size:15px;font-weight:800;margin-bottom:2px}
.vc-role{font-size:11px;color:rgba(255,255,255,.6);margin-bottom:12px}
.vc-btns{display:flex;gap:9px;flex-wrap:wrap}
.vc-btn{display:inline-flex;align-items:center;gap:6px;padding:8px 14px;border-radius:8px;font-size:12px;font-weight:700;cursor:pointer;border:none;transition:var(--tr);text-decoration:none}
.vc-w{background:#fff;color:var(--blue)}.vc-w:hover{background:#eff6ff}
.vc-o{background:rgba(255,255,255,.12);color:#fff;border:1.5px solid rgba(255,255,255,.3)}.vc-o:hover{background:rgba(255,255,255,.22)}

/* HERO */
.hero-wrap{background:linear-gradient(180deg,#eff6ff,#f9fafb);padding:52px 24px 40px;text-align:center}
.hero-eyebrow{display:inline-flex;align-items:center;gap:7px;background:#dbeafe;color:var(--blue);font-size:11px;font-weight:700;padding:5px 13px;border-radius:20px;margin-bottom:16px;border:1px solid #bfdbfe}
.hero-h{font-size:36px;font-weight:800;letter-spacing:-1.2px;line-height:1.15;margin-bottom:10px}
.hero-h em{color:var(--blue);font-style:normal}
.hero-sub{font-size:15px;color:var(--ink3);max-width:520px;margin:0 auto 24px;line-height:1.65}
.feat-wrap{display:flex;flex-wrap:wrap;justify-content:center;gap:8px;margin-bottom:28px}

<div id="root"></div>
<script type="text/babel">
const {useState,useRef,useMemo} = React;
const EMAIL = 'audit.vipin@gmail.com';
const GCAL_URL = 'https://calendar.google.com/calendar/u/0/r/eventedit?text=Tax+Planning+Session+with+Vipin+Nair&details=Personalised+tax+strategy,+regime+recommendation,+investment+plan,+ITR+filing+guidance.%0A%0APrice:+Rs+0+(Free+Consultation)%0AContact:+audit.vipin@gmail.com&location=Online+(Google+Meet)&add=audit.vipin@gmail.com';
const CONSULT_PRICE = 'Now';
const CONSULT_PRICE_LABEL = 'Consultation';
const METRO = ['Delhi','Mumbai','Kolkata','Chennai','Bengaluru','Bangalore','Hyderabad','Pune','Ahmedabad'];
const ADV_TAX_DATES = [
  {q:'Q1',date:'2026-06-15',label:'Jun 15, 2026',pct:15},
  {q:'Q2',date:'2026-09-15',label:'Sep 15, 2026',pct:45},
  {q:'Q3',date:'2026-12-15',label:'Dec 15, 2026',pct:75},
  {q:'Q4',date:'2027-03-15',label:'Mar 15, 2027',pct:100},
];
const advTaxCalUrl = (q, amt) => 'https://calendar.google.com/calendar/u/0/r/eventedit?text=Advance+Tax+' + q.q + '+Payment+Due+(' + encodeURIComponent(inr(amt)) + ')&dates=' + q.date.replace(/-/g,'') + 'T043000Z/' + q.date.replace(/-/g,'') + 'T053000Z&details=Pay+advance+tax+of+' + encodeURIComponent(inr(amt)) + '+(' + q.pct + '%25+cumulative)+via+Challan+280+on+incometax.gov.in.+Use+tax+type+100+(Advance+Tax).&location=https://onlineservices.tin.egov-nsdl.com/etaxnew/tdsnontds.jsp';


/* ── LOCAL STORAGE PERSISTENCE ── */
const LS_KEY = 'taxsmartindia_v7_data';
const saveToLS = (key, val) => {
  try {
    const all = JSON.parse(localStorage.getItem(LS_KEY) || '{}');
    all[key] = val;
    localStorage.setItem(LS_KEY, JSON.stringify(all));
  } catch(e) {}
};
const loadFromLS = (key, fallback) => {
  try {
    const all = JSON.parse(localStorage.getItem(LS_KEY) || '{}');
    return all[key] !== undefined ? all[key] : fallback;
  } catch(e) { return fallback; }
};
const clearAllLS = () => {
  try { localStorage.removeItem(LS_KEY); } catch(e) {}
};

/* ── HELPERS ── */
const inr = v => {
  const num = parseFloat(v) || 0;
  const abs = Math.abs(Math.round(num));
  return (num < 0 ? '- ' : '') + '\u20B9' + abs.toLocaleString('en-IN');
};
const n = v => parseFloat(v) || 0;
const pct = (a,b) => b > 0 ? (a/b*100).toFixed(1)+'%' : '0%';

/* ── TAX ENGINE FY 2026-27 ──
   NEW REGIME (Finance Act 2025):
   Basic exemption: Rs 4,00,000
   87A rebate: net income up to Rs 12,00,000 = zero tax
   Std deduction: Rs 75,000 (salaried)
   Employer NPS 80CCD(2): 14% of Basic
   Marginal relief: income Rs 12L-12.75L, tax capped at (income - 12L)
   OLD REGIME: unchanged slabs, all deductions available
*/
const TAX = {
  newRegime: income => {
    if (income <= 1200000) return 0;
    const slabs = [
      [0,400000,0],[400000,800000,.05],[800000,1200000,.10],
      [1200000,1600000,.15],[1600000,2000000,.20],[2000000,2400000,.25],[2400000,Infinity,.30]
    ];
    let tax = 0;
    for (const [f,t,r] of slabs) {
      if (income <= f) break;
      tax += (Math.min(income,t) - f) * r;
    }
    if (income > 1200000 && income <= 1275000) tax = Math.min(tax, income - 1200000);
    /* New regime: surcharge capped at 25% max */
    const sur = income>50000000?tax*.25:income>20000000?tax*.25:income>10000000?tax*.15:income>5000000?tax*.10:0;
    return Math.round((tax + sur) * 1.04);
  },
  oldRegime: (income, isSenior, isSuperSenior) => {
    const basic = isSuperSenior ? 500000 : isSenior ? 300000 : 250000;
    let tax = 0;
    if (income > basic) tax += (Math.min(income,500000) - basic) * .05;
    if (income > 500000) tax += (Math.min(income,1000000) - 500000) * .20;
    if (income > 1000000) tax += (income - 1000000) * .30;
    /* 87A rebate: up to 5L income = rebate max Rs 12,500 */
    if (income <= 500000) { const rebate = Math.min(tax, 12500); tax = Math.max(0, tax - rebate); }
    /* Old regime surcharge: max 37% */
    const sur = income>50000000?tax*.37:income>20000000?tax*.25:income>10000000?tax*.15:income>5000000?tax*.10:0;
    return Math.round((tax + sur) * 1.04);
  },
  hra: (basic, da, hraRec, rent, metro) => {
    if (!rent || rent <= 0) return 0;
    const sal = basic + da;
    return Math.max(0, Math.min(hraRec, rent - sal*.10, sal*(metro?.50:.40)));
  },
  cgains: (buyDate, sellDate, cost, proceeds, type) => {
    if (!buyDate || !sellDate) return null;
    const days = Math.round((new Date(sellDate) - new Date(buyDate)) / 86400000);
    const gain = n(proceeds) - n(cost);
    let cls, rate;
    if (type === 'Intraday' || type === 'F&O') { cls = 'Speculative'; rate = 0; }
    else if (type === 'Debt MF' || type === 'Bonds') { cls = 'Debt'; rate = .30; }
    else { const lt = days > 365; cls = lt ? 'LTCG' : 'STCG'; rate = lt ? .125 : .20; }
    return {days, gain, cls, rate};
  }
};

/* ── TAX ADVISOR (Head of Tax Planning — Practical Recommendations Only) ── */
const advisor = (data) => {
  const {income, totalIncome, regime, totalTax, netPayable, profile, sal, os, cg, hp, ded, chVIA} = data;
  const plans = [];
  if (income <= 0 && totalTax <= 0) return plans;
  const gti = income; /* GTI before deductions */
  const slab = totalIncome > 1000000 ? .30 : totalIncome > 500000 ? .20 : .05;
  const save = ded => inr(Math.round(ded * slab * 1.04));
  const isSenior = profile && profile.isSenior;
  const basic = n(sal && sal.basic);

  if (regime === 'old') {
    /* ── 80C Gap ── */
    const used80C = n(ded && ded.total80C);
    const gap80C = Math.max(0, 150000 - used80C);
    if (gap80C > 0) plans.push({p:'urgent',sec:'Section 80C',title:'80C Gap: ' + inr(gap80C) + ' Unused',
      desc:'You have used ' + inr(used80C) + ' of Rs 1.5L limit. To fill the gap: (1) Increase ELSS SIP — 3yr lock, best returns. (2) Increase PPF contribution — 7.1% guaranteed, tax-free maturity. (3) Check if EPF employee share is already counted. (4) Tuition fees for children also qualify. Do NOT invest in Tax-Saver FDs just to fill 80C — low returns with 5yr lock.',
      invest:inr(gap80C), save:save(gap80C)});

    /* ── NPS 80CCD(1B) ── */
    const usedNPS = n(ded && ded.npsOwn);
    if (usedNPS < 50000) plans.push({p:'urgent',sec:'80CCD(1B)',title:'NPS: Extra Rs 50K Deduction Beyond 80C',
      desc:'Separate from 80C. Invest ' + inr(50000 - usedNPS) + ' in NPS Tier-1. Choose aggressive allocation (75% equity) if under 50 years. At your slab this saves ' + save(50000 - usedNPS) + '. Open account at nps.kfintech.com or your bank in 15 minutes.',
      invest:inr(50000 - usedNPS), save:save(50000 - usedNPS)});

    /* ── Employer NPS Restructure ── */
    const empNPS = n(sal && sal.empNPS);
    if (basic > 0 && empNPS < basic * .14) {
      const gap = Math.round(basic * .14 - empNPS);
      if (gap > 10000) plans.push({p:'high',sec:'80CCD(2)',title:'Ask HR: Route Employer NPS ' + inr(gap),
        desc:'Request HR to route 14% of Basic as Employer NPS. This replaces your Special Allowance (which is fully taxable) with a tax-free NPS contribution. No impact on take-home. Available in BOTH regimes. Max: ' + inr(Math.round(basic*.14)) + '.',
        invest:inr(gap) + ' via salary restructure', save:save(gap)});
    }

    /* ── 80D Health Insurance ── */
    const usedHealthSelf = n(ded && ded.healthSelf);
    const usedHealthPar = n(ded && ded.healthPar);
    const maxSelf = isSenior ? 100000 : 25000;
    const maxPar = (ded && ded.parSenior) ? 100000 : 25000;
    if (usedHealthSelf < maxSelf) {
      const gap = maxSelf - usedHealthSelf;
      plans.push({p:'high',sec:'Section 80D',title:'Health Insurance: ' + inr(gap) + ' Deduction Available',
        desc:'Buy or top-up family floater health insurance. Rs ' + inr(maxSelf) + ' limit for self/spouse/children. A Rs 25K premium typically gives Rs 5-10L medical cover AND saves ' + save(gap) + ' in tax. Check if employer group policy premium qualifies.',
        invest:inr(gap), save:save(gap)});
    }
    if (usedHealthPar === 0 && gti > 800000) {
      plans.push({p:'high',sec:'80D Parents',title:'Parents Health Insurance — Additional ' + inr(maxPar),
        desc:'Completely separate limit from self/family. Buy a policy for parents: Rs ' + inr(maxPar) + ' deduction. Even if parents are not dependent on you financially, YOU can pay and claim deduction. Saves ' + save(maxPar) + '.',
        invest:inr(maxPar), save:save(maxPar)});
    }

    /* ── HRA Optimisation ── */
    const hraRec = n(sal && sal.hraRec);
    const rent = n(sal && sal.rent);
    if (hraRec > 0 && rent === 0) {
      plans.push({p:'high',sec:'HRA Exemption',title:'HRA Received but No Rent Claimed',
        desc:'You receive HRA of ' + inr(hraRec) + '/yr but have not entered rent paid. If you do pay rent, enter the amount — HRA exemption can be substantial. Rent paid to parents is also valid (they must show rental income in their ITR). Collect rent receipts monthly, landlord PAN is mandatory if rent exceeds Rs 1L/year.',
        invest:'Enter rent paid amount', save:'Up to ' + save(Math.round(Math.min(hraRec, basic*0.4)))});
    }

    /* ── Home Loan Interest (only if already paying) ── */
    const usedLoanInt = n(ded && ded.loanInt);
    if (usedLoanInt > 0 && usedLoanInt < 200000) {
      plans.push({p:'normal',sec:'Sec 24(b)',title:'Home Loan Interest: ' + inr(200000 - usedLoanInt) + ' Limit Remaining',
        desc:'You are claiming ' + inr(usedLoanInt) + ' of Rs 2L limit. If your actual interest is higher, claim the full amount. Check your bank loan amortisation schedule for exact interest paid. For joint loan, both co-borrowers can claim Rs 2L each.',
        invest:'Verify full interest amount', save:save(200000 - usedLoanInt)});
    }

    /* ── 80G Donations ── */
    if (gti > 1500000 && n(ded && ded.donation) === 0) {
      plans.push({p:'normal',sec:'Section 80G',title:'Claim Donation Deductions',
        desc:'If you have made any donations during the year — PM CARES (100% deduction), approved NGOs, temple trusts — claim them under 80G. A Rs 50K donation at 30% slab costs only Rs 35K net after tax saving of ' + save(50000) + '. Ensure payment was via UPI/cheque/NEFT. Keep the 80G receipt.',
        invest:'Claim existing donations', save:save(50000) + ' (on Rs 50K donation)'});
    }

    /* ── 80TTA/80TTB ── */
    if (n(ded && ded.savInt) === 0 && gti > 500000) {
      plans.push({p:'normal',sec:isSenior?'80TTB':'80TTA',title:'Claim Interest Deduction — ' + inr(isSenior?100000:10000),
        desc:isSenior ? 'Senior Citizens: Rs 1,00,000 deduction on ALL interest (savings + FD + RD). Enter your total interest received.' : 'Rs 10,000 deduction on savings bank interest. Small but free — just enter the amount from your passbook.',
        invest:'Enter interest amount', save:save(isSenior?100000:10000)});
    }

  } else {
    /* ════════════ NEW REGIME ════════════ */

    if (basic > 0) {
      const empNPS = n(sal && sal.empNPS);
      const maxEmpNPS = Math.round(basic * .14);
      if (empNPS < maxEmpNPS) {
        const gap = maxEmpNPS - empNPS;
        plans.push({p:'urgent',sec:'80CCD(2)',title:'Employer NPS — Only Major Deduction Available',
          desc:'Ask HR to route 14% of Basic (' + inr(maxEmpNPS) + ') as Employer NPS. This is the ONLY significant deduction in new regime beyond standard deduction. Saves ' + save(gap) + '. Replace Special Allowance — zero impact on take-home.',
          invest:inr(gap) + ' via HR restructure', save:save(gap)});
      }
    }

    plans.push({p:'high',sec:'LTCG Harvest',title:'Book Rs 1.25L LTCG Tax-Free Every Year',
      desc:'Every year in April: sell equity holdings with profit up to Rs 1.25L (zero tax on LTCG). Rebuy next day to reset cost base. Saves Rs 15,625/year at 12.5% LTCG rate. Also: sell stocks at loss before March 31 to offset against gains (tax-loss harvesting).',
      invest:'Portfolio review in April', save:'Rs 15,625/year recurring'});

    if (gti > 1800000) {
      const dedNeeded = gti > 2400000 ? '5-6L' : gti > 2000000 ? '4-5L' : '3-4L';
      plans.push({p:'normal',sec:'Regime Check',title:'Compare: Old Regime May Save Tax',
        desc:'At GTI of ' + inr(gti) + ', if your available old regime deductions (80C + NPS + 80D + HRA + home loan interest) total Rs ' + dedNeeded + '+, old regime likely costs less. Switch to Old Regime in the dropdown above and fill the deduction fields to compare.',
        invest:'Fill old regime deduction fields', save:'Check by switching regime above'});
    }

    if (totalTax > 200000) {
      plans.push({p:'normal',sec:'Advance Tax',title:'Pay Advance Tax — Avoid Interest Penalty',
        desc:'Tax liability of ' + inr(totalTax) + ' requires advance tax payment if net tax after TDS exceeds Rs 10,000. Pay by: Jun 15 (15%), Sep 15 (45%), Dec 15 (75%), Mar 15 (100%). Interest u/s 234B/C = 1% per month. Salaried with adequate employer TDS are usually exempt.',
        invest:'Quarterly challans', save:'Avoid 1%/month penalty'});
    }
  }

  /* ════════════ UNIVERSAL (BOTH REGIMES) ════════════ */

  if (gti > 5000000) {
    plans.push({p:'urgent',sec:'Surcharge Alert',title:'Surcharge Bracket: ' + (gti>20000000?'25%':gti>10000000?'15%':'10%'),
      desc:'At ' + inr(gti) + ' GTI, every additional Rs 1 of deduction saves more due to surcharge. Maximise ALL available deductions. Effective marginal rate is approximately ' + ((slab*(1+(gti>20000000?.25:gti>10000000?.15:gti>5000000?.10:0)))*1.04*100).toFixed(1) + '% including cess.',
      invest:'Max out every deduction', save:'Amplified by surcharge'});
  }

  const osTotal = n(os && os.totalOS);
  if (osTotal > 200000) {
    plans.push({p:'normal',sec:'Interest/Dividend',title:'Other Sources Income: ' + inr(osTotal),
      desc:'Consider tax-efficient alternatives for future: (1) Growth MFs instead of dividend MFs — defer tax to redemption. (2) PPF/SSY instead of FDs — interest is tax-free. (3) Tax-free bonds (5.5-6%) vs taxable FDs (7% but ~4.9% post-tax at 30% slab). These shifts reduce next year tax.',
      invest:'Shift to tax-efficient instruments', save:'Future year benefit'});
  }

  const cgTax = n(cg && cg.totalCGTax);
  if (cgTax > 50000) {
    plans.push({p:'high',sec:'Capital Gains',title:'CG Tax: ' + inr(cgTax) + ' — Review Timing',
      desc:'(1) Hold equity beyond 12 months — LTCG 12.5% vs STCG 20%. (2) Use Rs 1.25L LTCG annual exemption. (3) Harvest losses before March 31 to offset gains. (4) STCG losses offset both STCG and LTCG. (5) Carry forward unused CG losses for 8 years (file ITR by due date).',
      invest:'Portfolio timing', save:'Up to ' + inr(Math.round(cgTax * 0.3))});
  }

  if (gti > 500000) {
    plans.push({p:'normal',sec:'Compliance',title:'Year-End Checklist Before March 31',
      desc:'(1) Complete all investments (80C, NPS, health insurance). (2) Submit Form 12BB to employer. (3) If arrears received — file Form 10E for Sec 89(1) relief. (4) Verify AIS and Form 26AS on incometax.gov.in. (5) Pay advance tax if applicable. (6) Claim TDS refund if excess deducted.',
      invest:'No cost', save:'Avoid notices'});
  }

  return plans;
};

/* ── SCREEN 1: HERO ── */
const Hero = ({onStart}) => (
  <div>
    <div className="hero-wrap">

/* ── MODULE A: SALARIED (Enhanced — Multi-employer, PF/NPS Config) ── */
const ModSalary = ({regime, profile, onUpdate}) => {
  const [d,setD] = useState({
    emp_name:'',
    basic:'',da:'',hra_rec:'',lta:'',child_edu:'',hostel:'',food:'',transport:'',uniform:'',other_allow:'',
    bonus:'',commission:'',arrears:'',perq_car:'',perq_accom:'',perq_esop:'',perq_other:'',
    rent_paid:'',landlord_pan:'',
    /* PF Configuration */
    pf_config:'12pct', /* '12pct' | 'custom' | 'none' */
    epf_emp_custom:'',
    vpf:'',
    /* NPS Configuration */
    nps_config:'none', /* '14pct' | '10pct' | 'custom' | 'none' */
    employer_nps_custom:'',
    lta_claim:'',prof_tax:''
  });
  const s = k => e => setD(p => ({...p,[k]:e.target.type==='checkbox'?e.target.checked:e.target.value}));
  const sv = (k,v) => setD(p => ({...p,[k]:v}));

  const isMetro = profile.cityType === 'metro';
  const basic=n(d.basic), da=n(d.da), hraR=n(d.hra_rec), rent=n(d.rent_paid);
  const hraExempt = regime==='old' ? TAX.hra(basic,da,hraR,rent,isMetro) : 0;
  const stdDed = regime==='new' ? 75000 : 50000;
  const ltaEx = regime==='old' ? Math.min(n(d.lta), n(d.lta_claim)) : 0;

  /* PF Config */
  const epfEmp = d.pf_config==='12pct' ? Math.round((basic+da)*.12) : d.pf_config==='custom' ? n(d.epf_emp_custom) : 0;
  /* NPS Config — Employer NPS (80CCD2, both regimes) */
  const empNPSRaw = d.nps_config==='14pct' ? Math.round(basic*.14) : d.nps_config==='10pct' ? Math.round(basic*.10) : d.nps_config==='custom' ? n(d.employer_nps_custom) : 0;
  const empNPS = Math.min(empNPSRaw, Math.round(basic*.14));

  const grossSalary = basic+da+hraR+n(d.lta)+n(d.child_edu)+n(d.hostel)+n(d.food)+n(d.transport)+n(d.uniform)+n(d.other_allow)+n(d.bonus)+n(d.commission)+n(d.arrears)+n(d.perq_car)+n(d.perq_accom)+n(d.perq_esop)+n(d.perq_other);

  const totalExempt = regime==='old' ? hraExempt + ltaEx + Math.min(n(d.child_edu),72000) + Math.min(n(d.hostel),216000) : 0;
  const profTax = Math.min(n(d.prof_tax), 2500);
  const salaryHeadIncome = Math.max(0, grossSalary - stdDed - profTax - totalExempt - empNPS);

  const prevNet = useRef(null);
  if (prevNet.current !== salaryHeadIncome) {
    prevNet.current = salaryHeadIncome;
    setTimeout(() => onUpdate && onUpdate({
      salaryHeadIncome, grossSalary, basic, da, empNPS, epfEmp, vpf:n(d.vpf),
      hraExempt, totalExempt, stdDed, profTax, rent, hraRec:hraR,
      empName:d.emp_name, pfConfig:d.pf_config, npsConfig:d.nps_config
    }), 0);
  }

  return (
    <div>
      <RegimeBanner regime={regime}/>
      <Al type="blue" icon="📋">
        <b>How to fill:</b> Use salary slip (monthly × 12) and Form 16 Part B. Every field has a <b>?</b> tooltip — hover for detailed explanation.
      </Al>
      <Div label="Basic Salary Components"/>
      <div className="grid g3" style={{rowGap:14}}>
        <div className="fg"><label>Basic Salary (Annual) <Tip t="Base fixed component. Usually 40-50% of CTC. Find on salary slip (monthly) and multiply x 12. Forms the basis for HRA, PF, Gratuity."/></label><Mon value={d.basic} onChange={s('basic')} placeholder="600000"/></div>
        <div className="fg"><label>Dearness Allowance (DA) <Tip t="Inflation-linked allowance. Paid mainly by government and PSU employers. Private sector employees: enter 0 unless your salary slip shows a separate DA component."/></label><Mon value={d.da} onChange={s('da')} placeholder="0"/></div>

/* ── MODULE B: BUSINESS / PROFESSION (44AD + 44ADA + Regular) ── */
const ModBusiness = ({regime, profile, onUpdate}) => {
  const [d,setD] = useState({
    biz_type:'profession', /* 'profession' | 'business' | 'both' */
    /* Professional (44ADA) */
    mode_prof:'44ADA', /* '44ADA' | 'regular' */
    gross_prof:'',
    /* Business (44AD) */
    mode_biz:'44AD', /* '44AD' | 'regular' */
    gross_biz:'',digital_pct:'95', /* % of turnover via digital */
    /* Actual expenses (for regular mode) */
    int_exp:'',soft_exp:'',travel_exp:'',office_exp:'',depn_exp:'',staff_exp:'',other_exp:'',
    /* Common */
    gst_reg:false,gstin:''
  });
  const s = k => e => setD(p => ({...p,[k]:e.target.type==='checkbox'?e.target.checked:e.target.value}));
  const sv = (k,v) => setD(p => ({...p,[k]:v}));

  const grossProf = n(d.gross_prof);
  const grossBiz = n(d.gross_biz);
  const actualExp = n(d.int_exp)+n(d.soft_exp)+n(d.travel_exp)+n(d.office_exp)+n(d.depn_exp)+n(d.staff_exp)+n(d.other_exp);
  const digitalPct = Math.min(100, Math.max(0, n(d.digital_pct)));

  /* 44ADA: 50% deemed profit for professionals */
  const profIncome = (d.biz_type==='profession'||d.biz_type==='both')
    ? (d.mode_prof==='44ADA' ? grossProf * 0.50 : Math.max(0, grossProf - actualExp))
    : 0;

  /* 44AD: 6% of digital turnover + 8% of non-digital turnover */
  let bizIncome = 0;
  if (d.biz_type==='business'||d.biz_type==='both') {
    if (d.mode_biz==='44AD') {
      const digitalAmt = grossBiz * (digitalPct/100);
      const cashAmt = grossBiz - digitalAmt;
      bizIncome = digitalAmt * 0.06 + cashAmt * 0.08;
    } else {
      bizIncome = Math.max(0, grossBiz - (d.biz_type==='both' ? 0 : actualExp));
    }
  }

  const taxableBI = Math.round(profIncome + bizIncome);
  const netTaxable = Math.max(0, taxableBI);

  /* Turnover limit checks */
  const profLimitExceeded = grossProf > 7500000;
  const bizLimitExceeded = grossBiz > 30000000; /* Rs 3Cr digital, Rs 2Cr cash — simplified to 3Cr */

  const prevNet = useRef(null);
  if (prevNet.current !== netTaxable) {
    prevNet.current = netTaxable;
    setTimeout(() => onUpdate && onUpdate({grossReceipts:grossProf+grossBiz, netTaxable, profIncome:Math.round(profIncome), bizIncome:Math.round(bizIncome)}), 0);
  }

  return (
    <div>
      <RegimeBanner regime={regime}/>
      <Al type="blue" icon={'\uD83D\uDCBC'}>
        <b>Presumptive Taxation:</b> Sec 44ADA (Professionals) — declare 50% of receipts as income. Sec 44AD (Business) — declare 6% (digital) or 8% (cash) of turnover as income. No books, no audit if within limits. Deductions are in the separate <b>Deductions</b> tab.
      </Al>

      <Div label="Type of Business or Profession"/>
      <div className="grid g2" style={{rowGap:14,marginBottom:14}}>
        <div className="fg">
          <label>What do you do? <Tip t="Professional = freelancer, consultant, doctor, lawyer, CA, architect, engineer etc. (Sec 44ADA). Business = trading, manufacturing, retail, e-commerce, commission agent etc. (Sec 44AD). Select 'Both' if you have both types of income."/></label>
          <RG opts={[{label:'Professional (44ADA)',value:'profession'},{label:'Business (44AD)',value:'business'},{label:'Both',value:'both'}]} val={d.biz_type} onChange={v => sv('biz_type',v)}/>
        </div>
      </div>

      {/* ── PROFESSIONAL SECTION (44ADA) ── */}
      {(d.biz_type==='profession'||d.biz_type==='both') && (
        <>
          <Div label="Professional Income — Sec 44ADA"/>
          <Al type="purple" icon={'\uD83D\uDCBB'}>
            <b>44ADA:</b> For professionals (freelancers, doctors, lawyers, CAs, architects, engineers etc.) with gross receipts up to Rs 75L (digital) or Rs 50L (cash). Declare 50% as taxable income — no books, no audit required.
          </Al>
          <div className="grid g2" style={{rowGap:14,marginBottom:14}}>
            <div className="fg">
              <label>Taxation Mode <Tip t="44ADA: Declare 50% as income. Simple, no books. Regular: Maintain actual P&amp;L. Required if profit is below 50% or turnover exceeds limits."/></label>
              <RG opts={[{label:'44ADA Presumptive (50%)',value:'44ADA'},{label:'Regular — Actual Books',value:'regular'}]} val={d.mode_prof} onChange={v => sv('mode_prof',v)}/>
            </div>
            <div className="fg">
              <label>Gross Professional Receipts (Annual) <Tip t="Total billed and received from all clients. Exclude GST collected. Check Form 26AS for TDS."/></label>
              <Mon value={d.gross_prof} onChange={s('gross_prof')} placeholder="2000000"/>
              {profLimitExceeded&&<span className="emsg">Exceeds Rs 75L — 44ADA may not apply. Audit required.</span>}
              {grossProf>0&&d.mode_prof==='44ADA'&&<span className="hint">Deemed income (50%): {inr(Math.round(grossProf*0.50))}</span>}
            </div>
          </div>
        </>
      )}

      {/* ── BUSINESS SECTION (44AD) ── */}
      {(d.biz_type==='business'||d.biz_type==='both') && (
        <>
          <Div label="Business Income — Sec 44AD"/>
          <Al type="amber" icon={'\uD83C\uDFEA'}>
            <b>44AD:</b> For businesses with turnover up to Rs 3Cr (if 95%+ digital) or Rs 2Cr otherwise. Deemed profit: <b>6% of digital turnover + 8% of cash turnover</b>. No books, no audit if declared at or above these rates.
          </Al>
          <div className="grid g3" style={{rowGap:14,marginBottom:14}}>
            <div className="fg">
              <label>Taxation Mode <Tip t="44AD: Declare 6% (digital) / 8% (cash) as income. Regular: Actual books of accounts."/></label>
              <RG opts={[{label:'44AD Presumptive (6%/8%)',value:'44AD'},{label:'Regular Books',value:'regular'}]} val={d.mode_biz} onChange={v => sv('mode_biz',v)}/>
            </div>
            <div className="fg">
              <label>Gross Business Turnover (Annual) <Tip t="Total sales/receipts from business. For traders: total sales value. For commission agents: commission earned. Exclude GST."/></label>
              <Mon value={d.gross_biz} onChange={s('gross_biz')} placeholder="5000000"/>
              {bizLimitExceeded&&<span className="emsg">Exceeds Rs 3Cr — 44AD may not apply. Tax audit required.</span>}
            </div>
            {d.mode_biz==='44AD'&&(
              <div className="fg">
                <label>% Turnover via Digital Payments <Tip t="Digital = bank transfer, UPI, cards, NEFT, RTGS, cheque. If 95%+ is digital, turnover limit is Rs 3Cr and profit rate is 6%. Cash portion taxed at 8%. Enter percentage of turnover received digitally."/></label>
                <input type="number" value={d.digital_pct} onChange={s('digital_pct')} min="0" max="100" placeholder="95"/>
                {grossBiz>0&&<span className="hint">
                  Digital ({digitalPct}%): {inr(Math.round(grossBiz*digitalPct/100))} at 6% = {inr(Math.round(grossBiz*digitalPct/100*0.06))} |
                  Cash ({100-digitalPct}%): {inr(Math.round(grossBiz*(100-digitalPct)/100))} at 8% = {inr(Math.round(grossBiz*(100-digitalPct)/100*0.08))}
                </span>}
              </div>
            )}
          </div>
        </>
      )}

      {/* ── ACTUAL EXPENSES (for Regular mode) ── */}
      {((d.biz_type==='profession'&&d.mode_prof==='regular')||(d.biz_type==='business'&&d.mode_biz==='regular')||d.biz_type==='both'&&(d.mode_prof==='regular'||d.mode_biz==='regular')) && (
        <>
          <Div label="Actual Business Expenses"/>
          <div className="grid g3" style={{rowGap:14}}>
            <div className="fg"><label>Internet and Phone <Tip t="Business-use portion only."/></label><Mon value={d.int_exp} onChange={s('int_exp')} placeholder="24000"/></div>
            <div className="fg"><label>Software and Subscriptions <Tip t="Adobe, Figma, GitHub, AWS, Zoom, accounting software etc."/></label><Mon value={d.soft_exp} onChange={s('soft_exp')} placeholder="50000"/></div>
            <div className="fg"><label>Travel and Conveyance <Tip t="Client meetings, site visits. Keep receipts."/></label><Mon value={d.travel_exp} onChange={s('travel_exp')} placeholder="30000"/></div>
            <div className="fg"><label>Office Rent or Home Office <Tip t="Pro-rata home office or actual office rent."/></label><Mon value={d.office_exp} onChange={s('office_exp')} placeholder="60000"/></div>
            <div className="fg"><label>Depreciation <Tip t="Laptop 40% WDV, other equipment 15%. Half-year rule in year of purchase."/></label><Mon value={d.depn_exp} onChange={s('depn_exp')} placeholder="40000"/></div>
            <div className="fg"><label>Staff Salary <Tip t="Salaries to staff or sub-contractors. TDS required if above Rs 2.4L/person."/></label><Mon value={d.staff_exp} onChange={s('staff_exp')} placeholder="0"/></div>
            <div className="fg"><label>Other Expenses <Tip t="Books, courses, co-working, insurance, marketing, CA fees etc."/></label><Mon value={d.other_exp} onChange={s('other_exp')} placeholder="30000"/></div>
            <div className="fg">
              <label>Total Expenses</label>
              <div className="aval">{inr(actualExp)}</div>
            </div>
          </div>
        </>
      )}

      <Div label="Business / Profession — Net Taxable Income"/>
      <div style={{background:'var(--line2)',border:'1px solid var(--line)',borderRadius:12,padding:16}}>
        <table className="bdt"><tbody>
          {(d.biz_type==='profession'||d.biz_type==='both')&&(
            <>
              <tr><td className="bd-lbl">Gross Professional Receipts</td><td className="bd-val">{inr(grossProf)}</td></tr>
              {d.mode_prof==='44ADA'
                ?<tr><td className="bd-lbl">(-) Deemed Expenses 50% — Sec 44ADA</td><td className="bd-ded">- {inr(Math.round(grossProf*.50))}</td></tr>
                :<tr><td className="bd-lbl">(-) Actual Expenses</td><td className="bd-ded">- {inr(actualExp)}</td></tr>}
              <tr><td className="bd-lbl">Professional Income</td><td className="bd-val">{inr(Math.round(profIncome))}</td></tr>
            </>
          )}
          {(d.biz_type==='business'||d.biz_type==='both')&&(
            <>
              <tr><td className="bd-lbl">Gross Business Turnover</td><td className="bd-val">{inr(grossBiz)}</td></tr>
              {d.mode_biz==='44AD'
                ?<tr><td className="bd-lbl">(-) Deemed Expenses — Sec 44AD (6%/8%)</td><td className="bd-ded">- {inr(Math.round(grossBiz - bizIncome))}</td></tr>
                :<tr><td className="bd-lbl">(-) Actual Business Expenses</td><td className="bd-ded">- {inr(d.biz_type==='both'?0:actualExp)}</td></tr>}
              <tr><td className="bd-lbl">Business Income</td><td className="bd-val">{inr(Math.round(bizIncome))}</td></tr>
            </>
          )}
          <tr><td className="bd-lbl" style={{fontWeight:800}}>Total Business/Profession Head Income</td><td className="bd-tot">{inr(netTaxable)}</td></tr>
        </tbody></table>
        <div style={{marginTop:8,fontSize:11.5,color:'var(--ink4)'}}>Chapter VI-A deductions are applied separately in the Deductions tab.</div>
      </div>
    </div>
  );
};

/* Date parser: handles DD-MM-YYYY, DD/MM/YYYY, YYYY-MM-DD, MM/DD/YYYY */
const parseDate = (s) => {
  if (!s) return '';
  const str = String(s).trim();
  /* Already YYYY-MM-DD (from date input) */
  if (/^\d{4}-\d{2}-\d{2}$/.test(str)) return str;
  /* DD-MM-YYYY or DD/MM/YYYY */
  const m1 = str.match(/^(\d{1,2})[\-\/](\d{1,2})[\-\/](\d{4})$/);
  if (m1) return m1[3]+'-'+m1[2].padStart(2,'0')+'-'+m1[1].padStart(2,'0');
  /* YYYY/MM/DD */
  const m2 = str.match(/^(\d{4})[\-\/](\d{1,2})[\-\/](\d{1,2})$/);
  if (m2) return m2[1]+'-'+m2[2].padStart(2,'0')+'-'+m2[3].padStart(2,'0');
  return str;
};
const fmtDateDMY = (iso) => {
  if (!iso) return '';
  const p = iso.split('-');
  return p.length===3 ? p[2]+'-'+p[1]+'-'+p[0] : iso;
};

const downloadSampleCSV = () => {
  const blob = new Blob([SAMPLE_CSV], {type:'text/csv'});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url; a.download = 'TaxSmartIndia_Trade_Template.csv'; a.click();

const ModTrader = ({onUpdate}) => {
  const [trades,setTrades] = useState([{id:1,type:'Equity',scrip:'',buyDate:'',buyPrice:'',qty:'',sellDate:'',sellPrice:'',charges:''}]);
  const [nxtId,setNxtId] = useState(2);
  const fileRef = useRef();
  const [csvMsg,setCsvMsg] = useState('');

  const addRow = () => { setTrades(t => [...t, {id:nxtId,type:'Equity',scrip:'',buyDate:'',sellDate:'',buyPrice:'',sellPrice:'',qty:'',charges:''}]); setNxtId(x => x+1); };
  const delRow = id => setTrades(t => t.filter(x => x.id !== id));
  const updRow = (id,k,v) => setTrades(t => t.map(x => x.id===id ? {...x,[k]:v} : x));

  const calcRow = t => {
    const bd = parseDate(t.buyDate), sd = parseDate(t.sellDate);
    if (!bd||!sd||!t.buyPrice||!t.sellPrice||!t.qty) return null;
    const cost = n(t.buyPrice)*n(t.qty) + n(t.charges);
    const proc = n(t.sellPrice)*n(t.qty);
    return TAX.cgains(bd, sd, cost, proc, t.type);
  };

  const handleCSV = e => {
    const file = e.target.files[0]; if (!file) return;
    const reader = new FileReader();
    reader.onload = ev => {
      try {
        const lines = ev.target.result.split('\n').filter(l => l.trim());
        const hdrs = lines[0].split(',').map(h => h.trim().toLowerCase().replace(/\s+/g,'_').replace(/[^a-z0-9_]/g,''));
        const rows = [];
        for (let i=1; i<lines.length; i++) {
          const cols = lines[i].split(',').map(c => c.trim().replace(/^"|"$/g,''));
          if (cols.length < 5) continue;
          const o = {}; hdrs.forEach((h,j) => o[h] = cols[j]||'');
          /* Parse dates from CSV — handles DD-MM-YYYY, DD/MM/YYYY, YYYY-MM-DD */
          const buyD = parseDate(o.buy_date||o.purchase_date||o.buydate||o.buy||'');
          const sellD = parseDate(o.sell_date||o.sale_date||o.selldate||o.sell||'');
          /* Match type from master */
          const rawType = (o.type||o.instrument||o.segment||'Equity').trim();
          const matchedType = SCRIP_TYPES.find(st => st.value.toLowerCase()===rawType.toLowerCase() || st.label.toLowerCase().includes(rawType.toLowerCase()));
          rows.push({
            id:nxtId+i,
            type: matchedType ? matchedType.value : rawType,
            scrip:o.scrip||o.symbol||o.stock||o.name||'',
            buyDate:buyD,
            buyPrice:o.buy_price||o.purchase_price||o.buyprice||'',
            qty:o.qty||o.quantity||o.units||'',
            sellDate:sellD,
            sellPrice:o.sell_price||o.sale_price||o.sellprice||'',
            charges:o.charges||o.brokerage||o.stt||'0'
          });
        }
        if (rows.length > 0) {
          setTrades(rows); setNxtId(nxtId+rows.length+1);
          const validDates = rows.filter(r => r.buyDate && r.sellDate).length;
          setCsvMsg('Loaded ' + rows.length + ' trades (' + validDates + ' with valid dates). Dates parsed as DD-MM-YYYY.');
        }
        else setCsvMsg('No valid trades found. Download the sample template below for correct format.');
      } catch(err) { setCsvMsg('CSV error: ' + err.message); }
    };
    reader.readAsText(file);
  };

  const agg = trades.reduce((a,t) => {
    const r = calcRow(t); if (!r) return a;
    if (r.cls==='Speculative') a.spec += r.gain;
    else if (r.cls==='LTCG') a.ltcg += r.gain;
    else if (r.cls==='STCG') a.stcg += r.gain;
    else a.debt += r.gain;
    return a;
  }, {stcg:0,ltcg:0,spec:0,debt:0});

  const stcgTax = agg.stcg > 0 ? Math.round(agg.stcg*.20) : 0;
  const ltcgTax = Math.round(Math.max(0, agg.ltcg-125000)*.125);
  const totalCGTax = stcgTax + ltcgTax;

  const prevTax = useRef(null);
  if (prevTax.current !== totalCGTax) {
    prevTax.current = totalCGTax;
    setTimeout(() => onUpdate && onUpdate({...agg, totalCGTax}), 0);
  }

  return (
    <div>
      <Al type="blue" icon={'\uD83D\uDCC8'}>
        <b>FY 2026-27 Capital Gains Rates:</b> STCG Equity/MF (below 1yr): 20% · LTCG Equity/MF (above 1yr): 12.5% (Rs 1.25L exempt) · Debt MF/Bonds: slab rate · Intraday/F&amp;O: speculative · Crypto/VDA: 30% flat · Property/Unlisted: LTCG after 2yrs
      </Al>
      <Div label="Upload Trade Data CSV"/>
      <div style={{display:'flex',gap:10,marginBottom:10,flexWrap:'wrap'}}>
        <button className="btn btn-outline btn-sm" onClick={downloadSampleCSV}>{'\uD83D\uDCE5'} Download Sample CSV Template</button>
        <span style={{fontSize:11,color:'var(--ink4)',alignSelf:'center'}}>Use this template format for error-free upload. Dates must be DD-MM-YYYY.</span>
      </div>
      <input type="file" accept=".csv,.txt" ref={fileRef} onChange={handleCSV}/>
      <div className="upload-zone" onClick={() => fileRef.current.click()}>
        <div style={{fontSize:28,marginBottom:6}}>{'\uD83D\uDCC2'}</div>
        <div style={{fontWeight:700,fontSize:13}}>Upload Broker Trade Export CSV</div>
        <div style={{fontSize:12,color:'var(--ink3)',marginTop:4}}>Zerodha, Groww, AngelOne, HDFC Securities, ICICI Direct, Kite, Coin</div>
        <div style={{fontSize:11,color:'var(--ink4)',marginTop:4}}>Columns: Type, Scrip, Buy Date (DD-MM-YYYY), Buy Price, Qty, Sell Date (DD-MM-YYYY), Sell Price, Charges</div>
      </div>
      {csvMsg && <div style={{marginTop:6,fontSize:12,color:csvMsg.includes('error')||csvMsg.includes('No valid')?'var(--red)':'var(--green)',fontWeight:600}}>{csvMsg}</div>}

      <Div label="Manual Trade Entry"/>
      <Al type="amber" icon={'\u26A0\uFE0F'}>
        <b>Date Format:</b> Enter dates as DD-MM-YYYY (e.g. 15-04-2025). The holding period (STCG vs LTCG) is calculated from buy date to sell date. Equity/MF: above 365 days = LTCG. Unlisted shares/Property: above 730 days = LTCG.
      </Al>
      <div className="tbl-wrap">
        <table>
          <thead><tr>
            <th>Type</th><th>Scrip / Name</th><th>Buy Date</th><th>Buy Price</th><th>Qty</th>
            <th>Sell Date</th><th>Sell Price</th><th>Charges</th>
            <th>Gain/Loss</th><th>Category</th><th>Tax</th><th></th>
          </tr></thead>
          <tbody>
            {trades.map(t => {
              const r = calcRow(t);
              return (
                <tr key={t.id} className="trade-row">
                  <td>
                    <select value={t.type} onChange={e => updRow(t.id,'type',e.target.value)} style={{minWidth:100}}>
                      {SCRIP_TYPES.map(st => <option key={st.value} value={st.value}>{st.label}</option>)}
                    </select>
                  </td>
                  <td><input type="text" value={t.scrip} onChange={e => updRow(t.id,'scrip',e.target.value)} placeholder="RELIANCE" style={{minWidth:80}}/></td>
                  <td><input type="text" value={t.buyDate} onChange={e => updRow(t.id,'buyDate',e.target.value)} placeholder="DD-MM-YYYY" style={{minWidth:95,fontFamily:'var(--mono)',fontSize:11}}/></td>
                  <td><div className="mon"><span className="mon-pfx">{'\u20B9'}</span><input type="number" value={t.buyPrice} onChange={e => updRow(t.id,'buyPrice',e.target.value)} placeholder="0" style={{minWidth:70}}/></div></td>
                  <td><input type="number" value={t.qty} onChange={e => updRow(t.id,'qty',e.target.value)} placeholder="1" style={{minWidth:50}}/></td>
                  <td><input type="text" value={t.sellDate} onChange={e => updRow(t.id,'sellDate',e.target.value)} placeholder="DD-MM-YYYY" style={{minWidth:95,fontFamily:'var(--mono)',fontSize:11}}/></td>
                  <td><div className="mon"><span className="mon-pfx">{'\u20B9'}</span><input type="number" value={t.sellPrice} onChange={e => updRow(t.id,'sellPrice',e.target.value)} placeholder="0" style={{minWidth:70}}/></div></td>
                  <td><div className="mon"><span className="mon-pfx">{'\u20B9'}</span><input type="number" value={t.charges} onChange={e => updRow(t.id,'charges',e.target.value)} placeholder="0" style={{minWidth:60}}/></div></td>
                  <td>{r ? <span className={r.gain>=0?'td-pos':'td-neg'}>{r.gain>=0?'+':''}{inr(Math.round(r.gain))}</span> : <span style={{color:'var(--ink4)'}}>{'\u2014'}</span>}</td>
                  <td>{r ? <span className={'pill p-' + (r.cls==='LTCG'?'green':r.cls==='Speculative'?'amber':'blue')} style={{fontSize:10}}>{r.cls} {r.days}d</span> : <span style={{color:'var(--ink4)'}}>{'\u2014'}</span>}</td>
                  <td>{r&&r.gain>0&&r.cls!=='Speculative' ? <span className="td-mono">{inr(Math.round(r.cls==='LTCG'?Math.max(0,r.gain-125000)*.125:r.gain*.20))}</span> : <span style={{color:'var(--ink4)'}}>{'\u2014'}</span>}</td>
                  <td><button className="btn btn-sm" style={{background:'var(--red-lt)',color:'var(--red)',border:'1px solid var(--red-md)'}} onClick={() => delRow(t.id)} disabled={trades.length===1}>{'\u2715'}</button></td>
                </tr>
              );
            })}
          </tbody>
        </table>
      </div>
      <button className="btn btn-outline btn-sm" onClick={addRow} style={{marginBottom:18}}>+ Add Trade Row</button>

      {(Math.abs(agg.stcg)>0||Math.abs(agg.ltcg)>0||Math.abs(agg.spec)>0) && (
        <div style={{background:'linear-gradient(135deg,#f0fdf4,#ecfdf5)',border:'1.5px solid var(--green)',borderRadius:12,padding:18}}>
          <div style={{fontWeight:800,marginBottom:14,color:'#064e3b'}}>Capital Gains Summary</div>
          <div style={{display:'grid',gridTemplateColumns:'repeat(4,1fr)',gap:12}}>
            <div><div style={{fontSize:11,fontWeight:700,color:'var(--ink3)',marginBottom:4}}>STCG 20%</div><div style={{fontSize:16,fontWeight:800,fontFamily:'var(--mono)',color:agg.stcg>=0?'var(--green)':'var(--red)'}}>{inr(Math.round(agg.stcg))}</div><div style={{fontSize:11,color:'var(--ink3)'}}>Tax: {inr(stcgTax)}</div></div>
            <div><div style={{fontSize:11,fontWeight:700,color:'var(--ink3)',marginBottom:4}}>LTCG 12.5% (above Rs 1.25L)</div><div style={{fontSize:16,fontWeight:800,fontFamily:'var(--mono)',color:agg.ltcg>=0?'var(--blue)':'var(--red)'}}>{inr(Math.round(agg.ltcg))}</div><div style={{fontSize:11,color:'var(--ink3)'}}>Tax: {inr(ltcgTax)}</div></div>
            <div><div style={{fontSize:11,fontWeight:700,color:'var(--ink3)',marginBottom:4}}>Speculative or F&amp;O</div><div style={{fontSize:16,fontWeight:800,fontFamily:'var(--mono)',color:agg.spec>=0?'var(--amber)':'var(--red)'}}>{inr(Math.round(agg.spec))}</div><div style={{fontSize:11,color:'var(--ink3)'}}>Slab rate</div></div>
            <div style={{background:'var(--blue-lt)',padding:12,borderRadius:8}}><div style={{fontSize:11,fontWeight:700,color:'var(--ink3)',marginBottom:4}}>Total CG Tax</div><div style={{fontSize:18,fontWeight:800,fontFamily:'var(--mono)',color:'var(--blue)'}}>{inr(totalCGTax)}</div></div>
          </div>
        </div>
      )}
    </div>
  );
};

/* ── MODULE E: OTHER SOURCES ── */
const ModOtherSources = ({regime, profile, onUpdate}) => {
  const [d,setD] = useState({dividend:'',sav_int:'',fd_int:'',po_int:'',it_refund_int:'',family_pension:'',gift_56:'',other_os:''});
  const s = k => e => setD(p => ({...p,[k]:e.target.value}));

  const grossOS = n(d.dividend)+n(d.sav_int)+n(d.fd_int)+n(d.po_int)+n(d.it_refund_int)+n(d.family_pension)+n(d.gift_56)+n(d.other_os);
  /* Family pension deduction: lower of Rs 15,000 or 1/3 of pension */
  const fpDed = n(d.family_pension) > 0 ? Math.min(15000, Math.round(n(d.family_pension)/3)) : 0;
  const netOS = Math.max(0, grossOS - fpDed);

  const prevNet = useRef(null);
  if (prevNet.current !== netOS) {
    prevNet.current = netOS;
    setTimeout(() => onUpdate && onUpdate({totalOS: netOS, grossOS, fpDed}), 0);
  }

  return (
    <div>
      <RegimeBanner regime={regime}/>
      <Al type="blue" icon={'\uD83D\uDCB0'}>
        <b>Income from Other Sources (Sec 56):</b> Includes dividends, interest income, family pension, gifts, and any other income not covered under Salary, Business, Capital Gains, or House Property heads. Taxed at slab rates in both regimes.
      </Al>
      <Div label="Dividend and Interest Income"/>
      <div className="grid g3" style={{rowGap:14}}>
        <div className="fg"><label>Dividend Income <Tip t="Dividend from shares or mutual funds. Taxed at slab rate since FY 2020-21. No separate exempt category. Check Form 26AS for TDS deducted by companies or AMCs u/s 194 or 194K."/></label><Mon value={d.dividend} onChange={s('dividend')} placeholder="50000"/></div>
        <div className="fg"><label>Savings Bank Interest <Tip t="Interest earned on savings accounts across all banks. Old Regime: deduction under 80TTA (up to Rs 10,000 for below 60) or 80TTB (up to Rs 1,00,000 for seniors). Enter gross amount here — deduction computed separately in Salary module."/></label><Mon value={d.sav_int} onChange={s('sav_int')} placeholder="8000"/></div>
        <div className="fg"><label>FD / RD Interest <Tip t="Interest from Fixed Deposits and Recurring Deposits. Fully taxable at slab rate. Bank deducts TDS at 10% if interest exceeds Rs 40,000 (Rs 50,000 for seniors). Check Form 26AS."/></label><Mon value={d.fd_int} onChange={s('fd_int')} placeholder="25000"/></div>
        <div className="fg"><label>Post Office Interest <Tip t="Interest from Post Office schemes — SCSS, MIS, Time Deposits, NSC accrued interest etc. Fully taxable. NSC accrued interest (except last year) also qualifies for 80C reinvestment."/></label><Mon value={d.po_int} onChange={s('po_int')} placeholder="0"/></div>
        <div className="fg"><label>Interest on IT Refund <Tip t="Interest received on income tax refund u/s 244A. Taxable under Other Sources. Shown separately in intimation u/s 143(1)."/></label><Mon value={d.it_refund_int} onChange={s('it_refund_int')} placeholder="0"/></div>
      </div>

      <Div label="Family Pension and Other Income"/>
      <div className="grid g3" style={{rowGap:14}}>
        <div className="fg"><label>Family Pension Received <Tip t="Pension received by family members after death of the employee. Deduction available: lower of Rs 15,000 or 1/3 of pension amount. NOT the same as regular pension from employer (which is under Salary head)."/></label><Mon value={d.family_pension} onChange={s('family_pension')} placeholder="0"/>{n(d.family_pension)>0&&<span className="hint">Deduction: {inr(fpDed)} (lower of Rs 15,000 or 1/3)</span>}</div>
        <div className="fg"><label>Gifts u/s 56(2)(x) <Tip t="Aggregate gifts (money, property) from non-relatives exceeding Rs 50,000 in a year are taxable. Gifts from specified relatives are fully exempt. Wedding gifts are exempt regardless of amount."/></label><Mon value={d.gift_56} onChange={s('gift_56')} placeholder="0"/></div>
        <div className="fg"><label>Any Other Income <Tip t="Any other income not classified above — agricultural equipment rental, royalty not from business, director sitting fees, etc."/></label><Mon value={d.other_os} onChange={s('other_os')} placeholder="0"/></div>
      </div>

      <Div label="Other Sources — Net Taxable"/>
      <div style={{background:'var(--line2)',border:'1px solid var(--line)',borderRadius:12,padding:16}}>
        <table className="bdt"><tbody>
          <tr><td className="bd-lbl">Gross Income from Other Sources</td><td className="bd-val">{inr(grossOS)}</td></tr>
          {fpDed>0&&<tr><td className="bd-lbl">(-) Family Pension Deduction (lower of Rs 15K or 1/3)</td><td className="bd-ded">- {inr(fpDed)}</td></tr>}
          <tr><td className="bd-lbl" style={{fontWeight:800}}>Net Taxable — Other Sources</td><td className="bd-tot">{inr(netOS)}</td></tr>
        </tbody></table>
      </div>
    </div>
  );
};

/* ── MODULE F: TDS AND TAX CREDITS ── */
