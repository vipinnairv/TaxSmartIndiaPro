/* ── MODULE G: DEDUCTIONS (Chapter VI-A — Independent) ── */
const ModDeductions = ({regime, profile, salData, onUpdate}) => {
  const [d,setD] = useState({
    life_ins:'',elss:'',ppf:'',nsc:'',taxfd:'',sukanya:'',home_prin:'',tuition:'',
    nps_1b:'',
    health_self:'',health_par:'',par_senior:false,
    loan_int:'',edu_loan:'',savings_int:'',donation:''
  });
  const s = k => e => setD(p => ({...p,[k]:e.target.type==='checkbox'?e.target.checked:e.target.value}));
  const sv = (k,v) => setD(p => ({...p,[k]:v}));
  const isSenior = profile && profile.isSenior;

  /* Auto-populate EPF from salary config */
  const epfFromSal = n(salData && salData.epfEmp);
  const vpfFromSal = n(salData && salData.vpf);
  const empNPSFromSal = n(salData && salData.empNPS);

  /* 80C computation */
  const total80C = epfFromSal + vpfFromSal + n(d.life_ins)+n(d.elss)+n(d.ppf)+n(d.nsc)+n(d.taxfd)+n(d.sukanya)+n(d.home_prin)+n(d.tuition);
  const elig80C = regime==='old' ? Math.min(total80C, 150000) : 0;
  const nps1b = regime==='old' ? Math.min(n(d.nps_1b), 50000) : 0;
  const hSelf = regime==='old' ? Math.min(n(d.health_self), isSenior?100000:25000) : 0;
  const hPar = regime==='old' ? Math.min(n(d.health_par), d.par_senior?100000:25000) : 0;
  const loanInt = regime==='old' ? Math.min(n(d.loan_int), 200000) : 0;
  const savInt = regime==='old' ? Math.min(n(d.savings_int), isSenior?100000:10000) : 0;
  const disability80U = regime==='old' ? (profile.disability==='80'?125000:profile.disability==='40'?75000:0) : 0;
  const totalChVIA = elig80C + nps1b + empNPSFromSal + hSelf + hPar + loanInt + savInt + n(d.donation) + n(d.edu_loan) + disability80U;

  const prevDed = useRef(null);
  if (prevDed.current !== totalChVIA) {
    prevDed.current = totalChVIA;
    setTimeout(() => onUpdate && onUpdate({totalChVIA, elig80C, total80C, nps1b, empNPS:empNPSFromSal, hSelf, hPar, loanInt, savInt, disability80U, donation:n(d.donation), eduLoan:n(d.edu_loan), npsOwn:n(d.nps_1b), healthSelf:n(d.health_self), healthPar:n(d.health_par), parSenior:d.par_senior}), 0);
  }

  if (regime === 'new') return (
    <div>
      <RegimeBanner regime={regime}/>
      <div className="locked-box">
        <strong>New Tax Regime — Chapter VI-A Deductions Not Available</strong><br/>
        80C, 80D, NPS 80CCD(1B), Home Loan Interest (self-occupied), 80G, 80TTA/TTB — none of these apply in the new regime.<br/><br/>
        <span style={{color:'var(--blue)',fontWeight:600}}>Only Employer NPS 80CCD(2) of {inr(empNPSFromSal)} (configured in Salary tab) is deducted.</span><br/>
        <span style={{color:'var(--ink3)',fontSize:11}}>Standard Deduction of Rs 75,000 is already applied in the Salary head computation.</span>
      </div>
      <div style={{background:'var(--line2)',borderRadius:12,padding:16,marginTop:14}}>
        <table className="bdt"><tbody>
          <tr><td className="bd-lbl">Employer NPS 80CCD(2)</td><td className="bd-val">{inr(empNPSFromSal)}</td></tr>
          <tr><td className="bd-lbl" style={{fontWeight:800}}>Total Deductions (New Regime)</td><td className="bd-tot">{inr(empNPSFromSal)}</td></tr>
        </tbody></table>
        <div style={{marginTop:8,fontSize:11.5,color:'var(--ink4)'}}>Note: Employer NPS is already deducted from salary head income. It is shown here for reference only — not double-counted.</div>
      </div>
    </div>
  );

  return (
    <div>
      <RegimeBanner regime={regime}/>
      <Al type="blue" icon="\uD83D\uDCCB">
        <b>Chapter VI-A Deductions (Old Regime):</b> These deductions are applied against your Gross Total Income from ALL sources (Salary + Business + House Property + Other Sources). EPF and Employer NPS are auto-populated from your Salary tab configuration.
      </Al>

      <Div label="Section 80C Investments — Combined Limit Rs 1,50,000"/>
      <div className="grid g3" style={{rowGap:14}}>
        {epfFromSal>0&&<div className="fg"><label>EPF Employee (from Salary)</label><div className="aval">{inr(epfFromSal)} (auto from PF config)</div></div>}
        {vpfFromSal>0&&<div className="fg"><label>VPF (from Salary)</label><div className="aval">{inr(vpfFromSal)}</div></div>}
        <div className="fg"><label>Life Insurance Premium <Tip t="LIC or private insurance premium. Eligible: premium up to 10% of Sum Assured. Term insurance also qualifies."/></label><Mon value={d.life_ins} onChange={s('life_ins')} placeholder="50000"/></div>
        <div className="fg"><label>ELSS Mutual Fund <Tip t="Best 80C option. 3yr lock, 12-15% CAGR historically. SIP or lumpsum."/></label><Mon value={d.elss} onChange={s('elss')} placeholder="50000"/></div>
        <div className="fg"><label>PPF <Tip t="Government-backed 7.1% p.a. tax-free. 15yr lock. EEE status."/></label><Mon value={d.ppf} onChange={s('ppf')} placeholder="0"/></div>
        <div className="fg"><label>NSC <Tip t="Post office scheme, 5yr lock, 7.7% p.a."/></label><Mon value={d.nsc} onChange={s('nsc')} placeholder="0"/></div>
        <div className="fg"><label>Tax-Saver FD (5yr) <Tip t="Bank FD 5yr lock. Interest is taxable. Least attractive 80C option."/></label><Mon value={d.taxfd} onChange={s('taxfd')} placeholder="0"/></div>
        <div className="fg"><label>Sukanya Samriddhi <Tip t="For girl child below 10. 8.2% p.a. EEE status."/></label><Mon value={d.sukanya} onChange={s('sukanya')} placeholder="0"/></div>
        <div className="fg"><label>Home Loan Principal <Tip t="Annual principal repayment of home loan EMI. Within 80C cap."/></label><Mon value={d.home_prin} onChange={s('home_prin')} placeholder="0"/></div>
        <div className="fg"><label>Tuition Fees <Tip t="Full-time education fees for up to 2 children at Indian institutions."/></label><Mon value={d.tuition} onChange={s('tuition')} placeholder="0"/></div>
        <div className="fg">
          <label>80C Total</label>
          <div className={'aval' + (total80C>=150000?' gv':'')}>{inr(elig80C)} <span style={{fontSize:10,marginLeft:4,color:'var(--ink4)'}}>of Rs 1,50,000</span></div>
          {total80C>150000&&<span className="hint" style={{color:'var(--amber)'}}>Invested {inr(total80C)} but cap is Rs 1.5L</span>}
          {total80C>0&&total80C<150000&&<span className="hint" style={{color:'var(--blue)'}}>Gap: {inr(150000-total80C)}</span>}
        </div>
      </div>

      <Div label="NPS — 80CCD(1B) Rs 50,000 Extra"/>
      <div className="grid g3" style={{rowGap:14}}>
        <div className="fg"><label>Your Own NPS Contribution <Tip t="Separate from 80C. Rs 50K extra deduction. Open NPS Tier-1 at nps.kfintech.com."/></label><Mon value={d.nps_1b} onChange={s('nps_1b')} placeholder="50000"/></div>
        <div className="fg"><label>NPS Eligible</label><div className="aval gv">{inr(nps1b)} / Rs 50,000</div></div>
        {empNPSFromSal>0&&<div className="fg"><label>Employer NPS 80CCD(2) (from Salary)</label><div className="aval gv">{inr(empNPSFromSal)} (both regimes)</div></div>}
      </div>

      <Div label="Health Insurance — Section 80D"/>
      <div className="grid g3" style={{rowGap:14}}>
        <div className="fg">
          <label>Self, Spouse, Children <Tip t="Max Rs 25,000 (below 60) / Rs 1,00,000 (Senior 60+). Preventive checkup Rs 5,000 included."/></label>
          <Mon value={d.health_self} onChange={s('health_self')} placeholder="25000"/>
          <span className="hint">Limit: {isSenior?'Rs 1,00,000 (Senior)':'Rs 25,000'} | Eligible: {inr(hSelf)}</span>
        </div>
        <div className="fg">
          <label>Parents <Tip t="Separate limit. Rs 25,000 (parents below 60) / Rs 1,00,000 (Senior parents)."/></label>
          <Mon value={d.health_par} onChange={s('health_par')} placeholder="25000"/>
          <div style={{marginTop:6}}><RG opts={[{label:'Parents below 60',value:false},{label:'Parents 60+',value:true}]} val={d.par_senior} onChange={v => sv('par_senior',v)}/></div>
          <span className="hint">Limit: {d.par_senior?'Rs 1,00,000':'Rs 25,000'} | Eligible: {inr(hPar)}</span>
        </div>
        <div className="fg"><label>Total 80D</label><div className="aval gv">{inr(hSelf+hPar)}</div></div>
      </div>

      <Div label="Home Loan Interest and Education Loan"/>
      <div className="grid g3" style={{rowGap:14}}>
        <div className="fg"><label>Home Loan Interest — Self-Occupied <Tip t="Max Rs 2,00,000 for self-occupied property."/></label><Mon value={d.loan_int} onChange={s('loan_int')} placeholder="180000"/><span className="hint">Eligible: {inr(loanInt)} (cap Rs 2L)</span></div>
        <div className="fg"><label>Education Loan Interest — 80E <Tip t="No upper limit. Deductible for 8 consecutive years."/></label><Mon value={d.edu_loan} onChange={s('edu_loan')} placeholder="0"/></div>
      </div>

      <Div label="Other Deductions"/>
      <div className="grid g3" style={{rowGap:14}}>
        <div className="fg"><label>Savings/FD Interest — {isSenior?'80TTB':'80TTA'} <Tip t={isSenior?'Senior: Rs 1L on ALL interest':'Rs 10,000 on savings interest only'}/></label><Mon value={d.savings_int} onChange={s('savings_int')} placeholder="5000"/><span className="hint">Limit: {isSenior?'Rs 1,00,000':'Rs 10,000'}</span></div>
        <div className="fg"><label>Donations — 80G <Tip t="100% deduction: PM CARES, CRY. 50%: most NGOs. UPI/cheque only."/></label><Mon value={d.donation} onChange={s('donation')} placeholder="0"/></div>
        {disability80U>0&&<div className="fg"><label>80U Disability (from Profile)</label><div className="aval gv">{inr(disability80U)}</div></div>}
      </div>

      <Div label="Total Chapter VI-A Deductions"/>
      <div style={{background:'linear-gradient(135deg,#ecfdf5,#f0fdf4)',border:'1.5px solid var(--green)',borderRadius:12,padding:18}}>
        <table className="bdt"><tbody>
          <tr><td className="bd-lbl">80C (EPF + investments)</td><td className="bd-val">{inr(elig80C)}</td></tr>
          <tr><td className="bd-lbl">80CCD(1B) NPS Own</td><td className="bd-val">{inr(nps1b)}</td></tr>
          <tr><td className="bd-lbl">80CCD(2) Employer NPS</td><td className="bd-val">{inr(empNPSFromSal)}</td></tr>
          <tr><td className="bd-lbl">80D Health Insurance</td><td className="bd-val">{inr(hSelf+hPar)}</td></tr>
          <tr><td className="bd-lbl">Sec 24(b) Home Loan Interest</td><td className="bd-val">{inr(loanInt)}</td></tr>
          <tr><td className="bd-lbl">80E Education Loan</td><td className="bd-val">{inr(n(d.edu_loan))}</td></tr>
          <tr><td className="bd-lbl">80TTA/80TTB Interest</td><td className="bd-val">{inr(savInt)}</td></tr>
          <tr><td className="bd-lbl">80G Donations</td><td className="bd-val">{inr(n(d.donation))}</td></tr>
          {disability80U>0&&<tr><td className="bd-lbl">80U Disability</td><td className="bd-val">{inr(disability80U)}</td></tr>}
          <tr><td className="bd-lbl" style={{fontWeight:800,fontSize:14}}>Total Chapter VI-A</td><td className="bd-tot" style={{fontSize:15}}>{inr(totalChVIA)}</td></tr>
        </tbody></table>
        <div style={{marginTop:8,fontSize:11.5,color:'var(--green)',fontWeight:600}}>This amount will be deducted from your Gross Total Income in the final tax computation.</div>
      </div>
    </div>
  );
};

/* ── MODULE H: TAX SAVINGS PLAN ── */
const ModTaxPlan = ({regime, profile, res, salData, dedData}) => {
  const isSenior = profile && profile.isSenior;
  const gti = n(res && res.gti);
  const slab = gti > 1000000 ? .30 : gti > 500000 ? .20 : .05;
  const save = ded => inr(Math.round(ded * slab * 1.04));
  const netPay = n(res && res.netPayable);

  return (
    <div>
      {/* ── Regime Comparison ── */}
      <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:14,marginBottom:18}}>
        <div style={{border:'2px solid '+(regime==='new'?'var(--blue)':'var(--line)'),borderRadius:12,padding:16,background:regime==='new'?'var(--blue-lt)':'#fff'}}>
          <div style={{fontWeight:800,marginBottom:6,display:'flex',justifyContent:'space-between'}}>New Regime {regime==='new'&&<span className="pill p-blue">ACTIVE</span>}</div>
          <div style={{fontSize:24,fontWeight:800,fontFamily:'var(--mono)',color:'var(--blue)'}}>{inr(n(res&&res.newT))}</div>
        </div>
        <div style={{border:'2px solid '+(regime==='old'?'var(--blue)':'var(--line)'),borderRadius:12,padding:16,background:regime==='old'?'var(--blue-lt)':'#fff'}}>
          <div style={{fontWeight:800,marginBottom:6,display:'flex',justifyContent:'space-between'}}>Old Regime {regime==='old'&&<span className="pill p-blue">ACTIVE</span>}</div>
          <div style={{fontSize:24,fontWeight:800,fontFamily:'var(--mono)',color:'var(--ink)'}}>{inr(n(res&&res.oldT))}</div>
        </div>
      </div>
      {n(res&&res.newT)!==n(res&&res.oldT)&&<Al type="green" icon="\uD83D\uDCA1">
        <b>You save {inr(Math.abs(n(res&&res.newT)-n(res&&res.oldT)))} by choosing {n(res&&res.newT)<=n(res&&res.oldT)?'New':'Old'} Regime.</b>
      </Al>}

      {/* ── Advance Tax Alert ── */}
      {netPay > 10000 && (
        <div style={{background:'linear-gradient(135deg,#fef3c7,#fffbeb)',border:'2px solid var(--amber)',borderRadius:16,padding:20,marginBottom:18}}>
          <div style={{fontWeight:800,fontSize:15,color:'#92400e',marginBottom:8}}>\u26A0\uFE0F Advance Tax Liability Triggered — Net Payable {inr(netPay)}</div>
          <div style={{fontSize:12,color:'#92400e',marginBottom:14,lineHeight:1.6}}>Since your net tax payable exceeds Rs 10,000 (after TDS), you are required to pay advance tax in quarterly instalments. Failure attracts interest u/s 234B (1%/month) and 234C (1%/month per quarter shortfall).</div>
          <div className="grid g4" style={{gap:10}}>
            {ADV_TAX_DATES.map(q => {
              const amt = Math.round(netPay * q.pct / 100);
              return (
                <div key={q.q} style={{background:'#fff',border:'1px solid var(--amber-md)',borderRadius:10,padding:12,textAlign:'center'}}>
                  <div style={{fontSize:11,fontWeight:700,color:'var(--amber)'}}>{q.q} — {q.label}</div>
                  <div style={{fontSize:16,fontWeight:800,fontFamily:'var(--mono)',margin:'6px 0'}}>{inr(amt)}</div>
                  <div style={{fontSize:10,color:'var(--ink4)',marginBottom:6}}>{q.pct}% cumulative</div>
                  <a href={advTaxCalUrl(q, amt)} target="_blank" rel="noopener" style={{display:'inline-flex',alignItems:'center',gap:4,background:'var(--amber)',color:'#fff',padding:'5px 10px',borderRadius:6,fontSize:11,fontWeight:700,textDecoration:'none'}}>\uD83D\uDCC5 Set Reminder</a>
                </div>
              );
            })}
          </div>
        </div>
      )}

      {/* ── Tax Saving Recommendations ── */}
      <Div label="Tax Saving Action Plan"/>
      {res && res.plans && res.plans.length > 0 ? (
        <div className="plan-grid">
          {res.plans.map((p,i) => (
            <div key={i} className={'plan-card plan-' + p.p}>
              <div className="plan-sec">{p.sec}</div>
              <div className="plan-title">{p.p==='urgent'?'\uD83D\uDD34 ':p.p==='high'?'\uD83D\uDFE1 ':'\uD83D\uDFE2 '}{p.title}</div>
              <div className="plan-desc">{p.desc}</div>
              <div className="plan-save">Tax Saved: {p.save}</div>
              {p.invest && <div className="plan-invest">Action: {p.invest}</div>}
            </div>
          ))}
        </div>
      ) : (
        <Al type="green" icon="\u2705"><b>All optimised!</b> Fill income details and deductions in other tabs to generate personalised tax saving recommendations.</Al>
      )}
    </div>
  );
};

/* ── MODULE D: HOUSE PROPERTY ── */
const ModProperty = ({regime, onUpdate}) => {
  const [props,setProps] = useState([{id:1,desc:'My Property',type:'let-out',address:'',rent:'',months:'12',muni:'',unrealised:'',loan_int:'',pre_con:'',share:'100'}]);
  const [nxtId,setNxtId] = useState(2);
  const fileRef = useRef();

  const addProp = () => { setProps(p => [...p, {id:nxtId,desc:'Property '+nxtId,type:'let-out',address:'',rent:'',months:'12',muni:'',unrealised:'',loan_int:'',pre_con:'',share:'100'}]); setNxtId(x => x+1); };
  const delProp = id => setProps(p => p.filter(x => x.id !== id));
  const updProp = (id,k,v) => setProps(p => p.map(x => x.id===id ? {...x,[k]:v} : x));

  const calcProp = p => {
    if (p.type === 'self-occupied') {
      /* Self-occupied: interest deduction up to Rs 2L in old regime only */
      const int = regime==='old' ? Math.min(n(p.loan_int)+n(p.pre_con), 200000) : 0;
      return {nav:0, stdD:0, int, income:-int};
    }
    const gAV = n(p.rent) - n(p.unrealised);
    const adjAV = gAV * (n(p.months)/12);
    const nav = Math.max(0, adjAV - n(p.muni));
    const stdD = nav * .30;
    /* Let-out: interest deductible in BOTH regimes (only 80C-type blocked in new) */
    const int = n(p.loan_int)+n(p.pre_con);
    return {nav, stdD, int, income: (nav - stdD - int) * (n(p.share)/100)};
  };

  const totalHP = props.reduce((a,p) => a + calcProp(p).income, 0);

  const prevHP = useRef(null);
  if (prevHP.current !== totalHP) {
    prevHP.current = totalHP;
    setTimeout(() => onUpdate && onUpdate({totalHP}), 0);
  }

  return (
    <div>
      <RegimeBanner regime={regime}/>
      <Al type="blue" icon="🏠">
        <b>How House Property is Taxed:</b> Gross Rent minus Municipal Tax = Net Annual Value. Minus 30% Standard Deduction (auto). Minus Home Loan Interest (in Old Regime). Net loss up to Rs 2L is set off against salary income.
      </Al>
      <input type="file" accept=".csv" ref={fileRef}/>
      {props.map((p,i) => {
        const c = calcProp(p);
        return (
          <div key={p.id} style={{border:'1px solid var(--line)',borderRadius:12,padding:18,marginBottom:16,background:'#fff'}}>
            <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:14}}>
              <div style={{display:'flex',alignItems:'center',gap:8}}>
                <span style={{fontSize:18}}>🏠</span>
                <input type="text" value={p.desc} onChange={e => updProp(p.id,'desc',e.target.value)} style={{border:'none',fontWeight:700,fontSize:14,outline:'none',background:'transparent'}}/>
              </div>
              <div style={{display:'flex',gap:8,alignItems:'center'}}>
                {c.income!==0&&<span className={'pill ' + (c.income>0?'p-amber':'p-green')}>{c.income>0?'Taxable':'Loss: '}{inr(Math.abs(Math.round(c.income)))}</span>}
                {props.length>1&&<button className="btn btn-sm" style={{background:'var(--red-lt)',color:'var(--red)',border:'1px solid var(--red-md)'}} onClick={() => delProp(p.id)}>Remove</button>}
              </div>
            </div>
            <div className="grid g3" style={{rowGap:14}}>
              <div className="fg">
                <label>Property Type <Tip t="Self-Occupied: you live in it (interest deduction capped at Rs 2L). Let-Out: rented to tenant (full interest deductible). Deemed Let-Out: 2nd or 3rd property even if vacant — treated as rented at market rent."/></label>
                <select value={p.type} onChange={e => updProp(p.id,'type',e.target.value)}>
                  <option value="let-out">Let Out (Rented to Tenant)</option>
                  <option value="self-occupied">Self-Occupied (You Live Here)</option>
                  <option value="deemed-let-out">Deemed Let Out (2nd or 3rd Vacant Property)</option>
                </select>
              </div>
              <div className="fg s2">
                <label>Property Address <Tip t="Full address helps identify the property for IT scrutiny or future capital gains calculation."/></label>
                <input type="text" value={p.address} onChange={e => updProp(p.id,'address',e.target.value)} placeholder="Flat 302, XYZ Apartments, Ahmedabad"/>
              </div>
              {p.type !== 'self-occupied' && (
                <>
                  <div className="fg"><label>Annual Rental Income <Tip t="Total rent received from tenant in FY 2026-27. Do NOT include security deposit. Annual = monthly rent x months received."/></label><Mon value={p.rent} onChange={e => updProp(p.id,'rent',e.target.value)} placeholder="240000"/></div>
                  <div className="fg"><label>Months Rented <Tip t="If property was vacant for some months, enter only months it was actually rented. Gross Annual Value is proportionately reduced."/></label><input type="number" value={p.months} onChange={e => updProp(p.id,'months',e.target.value)} min="1" max="12" placeholder="12"/></div>
                  <div className="fg"><label>Municipal Tax Paid <Tip t="Property tax paid to municipal corporation for FY 2026-27. Fully deductible from gross rent before computing Net Annual Value. Keep the payment receipt."/></label><Mon value={p.muni} onChange={e => updProp(p.id,'muni',e.target.value)} placeholder="15000"/></div>
                  <div className="fg"><label>Unrealised Rent <Tip t="Rent due but not collected from tenant despite being legally entitled. Conditions: property let at genuine market rate and tenant has vacated or legal proceedings initiated."/></label><Mon value={p.unrealised} onChange={e => updProp(p.id,'unrealised',e.target.value)} placeholder="0"/></div>
                </>
              )}
              <div className="fg"><label>Home Loan Interest <Tip t="Annual interest on home loan for THIS property. Self-occupied: capped at Rs 2,00,000. Let-out: FULL interest deductible (no cap). Check your bank statement for interest vs principal split."/></label><Mon value={p.loan_int} onChange={e => updProp(p.id,'loan_int',e.target.value)} placeholder="180000"/></div>
              <div className="fg"><label>Pre-Construction Interest (1/5th) <Tip t="Interest paid during construction period before possession. Total pre-construction interest divided by 5 = annual deduction for 5 consecutive years starting from year of possession."/></label><Mon value={p.pre_con} onChange={e => updProp(p.id,'pre_con',e.target.value)} placeholder="0"/></div>
              <div className="fg"><label>Your Ownership Share % <Tip t="If jointly owned (e.g. 50-50 with spouse), enter your percentage. Income or loss is attributed proportionally. For sole owner: 100%."/></label><input type="number" value={p.share} onChange={e => updProp(p.id,'share',e.target.value)} min="1" max="100" placeholder="100"/></div>
            </div>
            <div style={{marginTop:14,background:'var(--line2)',borderRadius:8,padding:14}}>
              <table className="bdt" style={{fontSize:12}}><tbody>
                {p.type!=='self-occupied'&&(
                  <>
                    <tr><td className="bd-lbl">Gross Annual Value</td><td className="bd-val">{inr(Math.round(n(p.rent)-n(p.unrealised)))}</td></tr>
                    <tr><td className="bd-lbl">(-) Municipal Tax</td><td className="bd-ded">- {inr(n(p.muni))}</td></tr>
                    <tr><td className="bd-lbl">Net Annual Value</td><td className="bd-val">{inr(Math.round(c.nav))}</td></tr>
                    <tr><td className="bd-lbl">(-) 30% Standard Deduction (Auto)</td><td className="bd-ded">- {inr(Math.round(c.stdD))}</td></tr>
                  </>
                )}
                {regime==='old'&&c.int>0&&<tr><td className="bd-lbl">(-) Home Loan Interest {p.type==='self-occupied'?'(capped Rs 2L)':'(full deduction)'}</td><td className="bd-ded">- {inr(Math.round(c.int))}</td></tr>}
                <tr><td className="bd-lbl" style={{fontWeight:800}}>Taxable or (Loss) from This Property</td><td className={c.income<0?'bd-ded':'bd-tot'}>{inr(Math.round(c.income))}</td></tr>
              </tbody></table>
              {c.income<0&&regime==='old'&&<div style={{marginTop:8,fontSize:11.5,color:'var(--green)',fontWeight:600}}>This property loss (max Rs 2L) reduces your salary taxable income — saving approx {inr(Math.round(Math.min(200000,Math.abs(c.income))*.30))} in tax at 30% slab.</div>}
            </div>
          </div>
        );
      })}
      <button className="btn btn-outline" onClick={addProp} style={{marginBottom:16}}>+ Add Another Property</button>
      <div style={{background:'var(--line2)',border:'1px solid var(--line)',borderRadius:10,padding:14}}>
        <div style={{fontWeight:800,marginBottom:6}}>Total House Property Income or (Loss)</div>
        <div style={{fontSize:20,fontWeight:800,fontFamily:'var(--mono)',color:totalHP>=0?'var(--amber)':'var(--green)'}}>{inr(Math.round(totalHP))}</div>
        {totalHP<0&&<div style={{fontSize:12,color:'var(--ink3)',marginTop:4}}>Net loss — set off against salary up to Rs 2L. Balance carried forward for 8 years.</div>}
      </div>
    </div>
  );
};

/* ── SCREEN 4: MODULES + FINAL TAX ── */
const Modules = ({profile, regime: initRegime, onBackRegime, onBackProfile}) => {
  const [tab,setTab] = useState('salary');
  const [regime,setRegime] = useState(initRegime);
  const [salData,setSalData] = useState(null);
  const [freData,setFreData] = useState(null);
  const [tradeData,setTradeData] = useState(null);
  const [propData,setPropData] = useState(null);
  const [osData,setOsData] = useState(null);
  const [creditData,setCreditData] = useState(null);
  const [dedData,setDedData] = useState(null);
  const [showResult,setShowResult] = useState(false);
  const [showModal,setShowModal] = useState(false);
  const [dataCleared,setDataCleared] = useState(false);

  /* Persist module output data to localStorage */
  const saveSal = d => { setSalData(d); saveToLS('salData', d); };
  const saveFre = d => { setFreData(d); saveToLS('freData', d); };
  const saveTrade = d => { setTradeData(d); saveToLS('tradeData', d); };
  const saveProp = d => { setPropData(d); saveToLS('propData', d); };
  const saveOS = d => { setOsData(d); saveToLS('osData', d); };
  const saveCredit = d => { setCreditData(d); saveToLS('creditData', d); };
  const saveDed = d => { setDedData(d); saveToLS('dedData', d); };

  /* Clear all data */
  const handleClearAll = () => {
    if (window.confirm('Are you sure you want to delete ALL entered data? This cannot be undone.')) {
      clearAllLS();
      setSalData(null); setFreData(null); setTradeData(null);
      setPropData(null); setOsData(null); setCreditData(null); setDedData(null);
      setShowResult(false);
      setDataCleared(true);
      setTimeout(() => setDataCleared(false), 3000);
    }
  };

  const tabs = [
    {id:'salary',icon:'💼',label:'Salary'},
    {id:'freelance',icon:'💼',label:'Business / Profession'},
    {id:'property',icon:'🏠',label:'House Property'},
    {id:'othersrc',icon:'💰',label:'Other Sources'},
    {id:'trading',icon:'📈',label:'Capital Gains'},
    {id:'deductions',icon:'📋',label:'Deductions'},
    {id:'credits',icon:'✅',label:'TDS / Credits'},
    {id:'taxplan',icon:'🎯',label:'Tax Savings'},
  ];

  const res = useMemo(() => {
    /* ── Step 1: Income under each head ── */
    const salHead = n(salData && salData.salaryHeadIncome);
    const freHead = n(freData && freData.netTaxable);
    const specInc = n(tradeData && tradeData.spec);
    const hpHead = n(propData && propData.totalHP);
    const osHead = n(osData && osData.totalOS);
    const stcg = n(tradeData && tradeData.stcg);
    const ltcg = n(tradeData && tradeData.ltcg);
    const cgTax = n(tradeData && tradeData.totalCGTax);

    /* ── Step 2: Gross Total Income (all heads, before VI-A) ── */
    const gti = Math.max(0, salHead + freHead + specInc + hpHead + osHead);

    /* ── Step 3: Chapter VI-A Deductions (from Deductions tab, applied at GTI level) ── */
    const chVIA = regime==='old' ? Math.min(n(dedData && dedData.totalChVIA), gti) : 0;
    /* Employer NPS already deducted inside salary head */

    /* ── Step 4: Total Income = GTI - Chapter VI-A ── */
    const totalIncome = Math.max(0, gti - chVIA);

    /* ── Step 5: Tax on total income ── */
    const incomeTax = regime==='new' ? TAX.newRegime(totalIncome) : TAX.oldRegime(totalIncome, profile.isSenior, profile.isSuperSenior);
    const totalTax = incomeTax + cgTax;
    const grossAll = gti + Math.max(0,stcg) + Math.max(0,ltcg);
    const eff = grossAll > 0 ? ((totalTax/grossAll)*100).toFixed(1) : '0';

    /* ── Step 6: Tax Credits ── */
    const totalCredits = n(creditData && creditData.totalCredits);
    const netPayable = Math.max(0, totalTax - totalCredits);
    const refund = totalCredits > totalTax ? totalCredits - totalTax : 0;

    /* ── Step 7: Regime Comparison ── */
    const newTI = regime==='new' ? totalIncome : Math.max(0, gti);
    const oldTI = regime==='old' ? totalIncome : Math.max(0, gti - Math.min(n(dedData && dedData.totalChVIA), gti));
    const newT = TAX.newRegime(newTI) + cgTax;
    const oldT = TAX.oldRegime(oldTI, profile.isSenior, profile.isSuperSenior) + cgTax;

    /* ── Step 8: Advisor ── */
    const plans = advisor({income:gti, totalIncome, regime, totalTax, netPayable, profile, sal:salData, os:osData, cg:tradeData, hp:propData, ded:dedData, chVIA});

    return {salHead,freHead,specInc,hpHead,osHead,gti,chVIA,totalIncome,stcg,ltcg,cgTax,incomeTax,totalTax,grossAll,eff,plans,newT,oldT,totalCredits,netPayable,refund};
  }, [salData,freData,tradeData,propData,osData,dedData,creditData,regime]);

  const itrForm = useMemo(() => {
    const hasCG = Math.abs(n(tradeData&&tradeData.stcg)) + Math.abs(n(tradeData&&tradeData.ltcg)) + Math.abs(n(tradeData&&tradeData.spec)) > 0;
    const hasBiz = n(freData&&freData.grossReceipts) > 0;
    const hasMultiHP = (propData && propData.totalHP !== undefined && propData.totalHP !== 0);
    if (hasBiz && hasCG) return {f:'ITR-3', r:'Business income plus capital gains'};
    if (hasBiz) return {f:'ITR-3', r:'Business or professional income present'};
    if (hasCG) return {f:'ITR-2', r:'Capital gains from stocks or mutual funds'};
    if (hasMultiHP) return {f:'ITR-2', r:'House property income or loss'};
    return {f:'ITR-1 (Sahaj)', r:'Salary plus one house property plus interest income'};
  }, [tradeData,freData,propData]);

  const handleCompute = () => {
    setShowResult(true);
    if (res.totalTax > 50000) setTimeout(() => setShowModal(true), 1200);
    window.scrollTo(0, document.body.scrollHeight);
  };

  const emailSub = encodeURIComponent('Tax Report FY 2026-27 - ' + profile.name);
  const emailBod = encodeURIComponent('Dear Vipin,\n\nMy tax computation:\nName: ' + profile.name + '\nRegime: ' + regime.toUpperCase() + '\nGross Tax: ' + inr(res.totalTax) + '\nTDS/Credits: ' + inr(res.totalCredits) + '\n' + (res.refund>0?'Refund: '+inr(res.refund):'Net Payable: '+inr(res.netPayable)) + '\nEffective Rate: ' + res.eff + '%\n\nPlease review and suggest tax optimisation.\n\nThank you.');

  return (
    <div>
      <div className="sum-panel">
        <div className="sum-title">
          <span>Running Tax Summary — {profile.name}</span>
          <select value={regime} onChange={e => setRegime(e.target.value)} style={{height:26,padding:'0 8px',background:'rgba(255,255,255,.12)',border:'1px solid rgba(255,255,255,.2)',borderRadius:5,color:'#fff',fontSize:11,fontFamily:'var(--font)',fontWeight:700,cursor:'pointer'}}>
            <option value="new">New Regime</option>
            <option value="old">Old Regime</option>
          </select>
        </div>
        <div className="sum-grid">
          <div><div className="sum-label">Gross Total Income</div><div className={'sum-val sv-blue'}>{inr(res.gti)}</div></div>
          <div><div className="sum-label">{regime==='old'?'After Ch VI-A Ded':'Total Income'}</div><div className={'sum-val sv-blue'}>{inr(res.totalIncome)}</div></div>
          <div><div className="sum-label">Gross Tax</div><div className={'sum-val sv-amber'}>{inr(res.totalTax)}</div></div>
          <div><div className="sum-label">{res.refund>0?'Refund Due':'Net Payable'}</div><div className={'sum-val ' + (res.refund>0?'sv-green':'sv-red')}>{res.refund>0?inr(res.refund):inr(res.netPayable)}</div></div>
        </div>
      </div>

      <div className="card">
        <div className="card-head">
          <div style={{display:'flex',justifyContent:'space-between',alignItems:'flex-start',flexWrap:'wrap',gap:8}}>
            <div>
              <div className="card-title">Income Details — All Sources</div>
              <div className="card-sub">Fill each tab relevant to your income. Regime can be switched anytime using the dropdown above.</div>
            </div>
            <span className="pill p-blue">Step 3 of 3</span>
          </div>
        </div>
        <div className="mod-tabs">
          {tabs.map(t => (
            <div key={t.id} className={'mod-tab' + (tab===t.id?' act':'')} onClick={() => setTab(t.id)}>
              <span>{t.icon}</span>{t.label}
            </div>
          ))}
        </div>
        <div className="card-body">
          <div style={{display:tab==='salary'?'block':'none'}}><ModSalary regime={regime} profile={profile} onUpdate={saveSal}/></div>
          <div style={{display:tab==='freelance'?'block':'none'}}><ModBusiness regime={regime} profile={profile} onUpdate={saveFre}/></div>
          <div style={{display:tab==='property'?'block':'none'}}><ModProperty regime={regime} onUpdate={saveProp}/></div>
          <div style={{display:tab==='othersrc'?'block':'none'}}><ModOtherSources regime={regime} profile={profile} onUpdate={saveOS}/></div>
          <div style={{display:tab==='trading'?'block':'none'}}><ModTrader onUpdate={saveTrade}/></div>
          <div style={{display:tab==='deductions'?'block':'none'}}><ModDeductions regime={regime} profile={profile} salData={salData} onUpdate={saveDed}/></div>
          <div style={{display:tab==='credits'?'block':'none'}}><ModTaxCredits onUpdate={saveCredit}/></div>
          <div style={{display:tab==='taxplan'?'block':'none'}}><ModTaxPlan regime={regime} profile={profile} res={res} salData={salData} dedData={dedData}/></div>
        </div>
        <div className="card-foot">
          <div style={{display:'flex',alignItems:'center',gap:8,flexWrap:'wrap'}}>
            <button className="btn btn-ghost btn-sm" onClick={onBackProfile}>← Edit Profile</button>
            <button className="btn btn-ghost btn-sm" onClick={onBackRegime}>← Change Regime</button>
            <button className="btn btn-sm" style={{background:'var(--red-lt)',color:'var(--red)',border:'1px solid var(--red-md)'}} onClick={handleClearAll}>🗑️ Delete All Data</button>
            {dataCleared && <span style={{fontSize:11,color:'var(--green)',fontWeight:700}}>✅ All data cleared!</span>}
            <span style={{fontSize:11,color:'var(--ink4)'}}>TaxSmartIndia Pro by Vipin Nair</span>
          </div>
          <div style={{display:'flex',gap:10}}>
            <button className="btn btn-outline" onClick={() => setShowModal(true)}>💬 Consult Vipin</button>
            <button className="btn btn-green btn-lg" onClick={handleCompute}>⚡ Compute Final Tax →</button>
          </div>
        </div>
      </div>

      {showResult && (
        <div className="card">
          <div className="card-head">
            <div className="card-title">Final Tax Report — FY 2026-27 (AY 2027-28)</div>
            <div className="card-sub">{profile.name} · {regime==='new'?'New':'Old'} Tax Regime · Generated by TaxSmartIndia Pro by Vipin Nair</div>
          </div>
          <div className="card-body">
            <div className="tax-hero">
              <div style={{display:'flex',justifyContent:'space-between',alignItems:'flex-start',marginBottom:16,flexWrap:'wrap',gap:12}}>
                <div>
                  <div className="tfl-lbl">Total Tax Payable (incl. 4% Education Cess)</div>
                  <div className="tfl-amt">{inr(res.totalTax)}</div>
                  <div className="tfl-sub">Effective Rate: {res.eff}% · AY 2027-28</div>
                </div>
                <div style={{textAlign:'right'}}>
                  <div style={{fontSize:10,color:'rgba(255,255,255,.4)',marginBottom:4}}>REPORT BY</div>
                  <div style={{fontWeight:800,color:'#fff',fontSize:14}}>Vipin Nair</div>
                  <div style={{fontSize:11,color:'rgba(255,255,255,.45)'}}>TaxSmartIndia Pro</div>
                  <div style={{fontSize:11,color:'rgba(255,255,255,.38)',marginTop:3}}>{EMAIL}</div>
                </div>
              </div>
              <div className="tfl-grid">
                <div className="tfl-box"><div className="tfl-box-lbl">Gross Tax Liability</div><div className="tfl-box-val">{inr(res.totalTax)}</div></div>
                <div className="tfl-box"><div className="tfl-box-lbl">TDS / Tax Credits</div><div className="tfl-box-val" style={{color:'#6ee7b7'}}>{inr(res.totalCredits)}</div></div>
                <div className="tfl-box"><div className="tfl-box-lbl">{res.refund>0?'Refund Due':'Net Payable'}</div><div className="tfl-box-val" style={{color:res.refund>0?'#6ee7b7':'#fca5a5'}}>{res.refund>0?inr(res.refund):inr(res.netPayable)}</div></div>
              </div>
            </div>

            <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:14,marginBottom:18}}>
              <div style={{border:'2px solid '+(regime==='new'?'var(--blue)':'var(--line)'),borderRadius:12,padding:16,background:regime==='new'?'var(--blue-lt)':'#fff'}}>
                <div style={{fontWeight:800,marginBottom:6,display:'flex',justifyContent:'space-between'}}>
                  New Regime {regime==='new'&&<span className="pill p-blue">ACTIVE</span>}
                </div>
                <div style={{fontSize:24,fontWeight:800,fontFamily:'var(--mono)',color:'var(--blue)'}}>{inr(res.newT)}</div>
              </div>
              <div style={{border:'2px solid '+(regime==='old'?'var(--blue)':'var(--line)'),borderRadius:12,padding:16,background:regime==='old'?'var(--blue-lt)':'#fff'}}>
                <div style={{fontWeight:800,marginBottom:6,display:'flex',justifyContent:'space-between'}}>
                  Old Regime {regime==='old'&&<span className="pill p-blue">ACTIVE</span>}
                </div>
                <div style={{fontSize:24,fontWeight:800,fontFamily:'var(--mono)',color:'var(--ink)'}}>{inr(res.oldT)}</div>
              </div>
            </div>
            <Al type="green" icon="💡">
              <b>You save {inr(Math.abs(res.newT-res.oldT))} by choosing {res.newT<=res.oldT?'New':'Old'} Regime.</b>{' '}
              {res.newT<=res.oldT?'New Regime gives lower rates. Invest freely without lock-in constraints.':'Old Regime wins because your deductions exceed the benefit of lower New Regime rates.'}
            </Al>

            <Div label="Detailed Income and Tax Breakdown"/>
            <table className="bdt" style={{marginBottom:18}}><tbody>
              <tr><td colSpan={2} style={{background:'var(--line2)',fontWeight:800,padding:'8px 4px',fontSize:12}}>INCOME HEADS</td></tr>
              <tr><td className="bd-lbl">Income under Head Salaries</td><td className="bd-val">{inr(res.salHead)}</td></tr>
              <tr><td className="bd-lbl">Income from Business or Profession</td><td className="bd-val">{inr(res.freHead)}</td></tr>
              <tr><td className="bd-lbl">Speculative Income (Intraday or F&amp;O)</td><td className="bd-val">{inr(res.specInc)}</td></tr>
              <tr><td className="bd-lbl">Income from House Property</td><td className={res.hpHead<0?'bd-ded':'bd-val'}>{inr(res.hpHead)}</td></tr>
              <tr><td className="bd-lbl">Income from Other Sources</td><td className="bd-val">{inr(res.osHead)}</td></tr>
              <tr><td className="bd-lbl" style={{fontWeight:700}}>Gross Total Income (before deductions)</td><td className="bd-tot">{inr(res.gti)}</td></tr>
              {regime==='old'&&res.chVIA>0&&<>
              <tr><td colSpan={2} style={{background:'var(--green-lt)',fontWeight:800,padding:'8px 4px',fontSize:12,color:'#065f46'}}>CHAPTER VI-A DEDUCTIONS</td></tr>
              <tr><td className="bd-lbl">(-) Total Chapter VI-A (80C + 80D + NPS + 80E + 80G + 80U + 80TTA/TTB)</td><td className="bd-ded">- {inr(res.chVIA)}</td></tr>
              </>}
              <tr><td className="bd-lbl" style={{fontWeight:800}}>Total Income (after deductions)</td><td className="bd-tot">{inr(res.totalIncome)}</td></tr>
              <tr><td colSpan={2} style={{background:'var(--line2)',fontWeight:800,padding:'8px 4px',fontSize:12}}>CAPITAL GAINS (Taxed at Special Rates)</td></tr>
              <tr><td className="bd-lbl">STCG on Equity or MF — 20%</td><td className="bd-val">{inr(Math.max(0,res.stcg))}</td></tr>
              <tr><td className="bd-lbl">LTCG on Equity or MF — 12.5% (above Rs 1.25L exempt)</td><td className="bd-val">{inr(Math.max(0,res.ltcg))}</td></tr>
              <tr><td colSpan={2} style={{background:'var(--line2)',fontWeight:800,padding:'8px 4px',fontSize:12}}>TAX COMPUTATION</td></tr>
              <tr><td className="bd-lbl">Tax on Total Income ({regime==='new'?'New':'Old'} Regime slabs)</td><td className="bd-val">{inr(res.incomeTax)}</td></tr>
              <tr><td className="bd-lbl">Capital Gains Tax (STCG 20% + LTCG 12.5%)</td><td className="bd-val">{inr(res.cgTax)}</td></tr>
              <tr><td className="bd-lbl" style={{fontWeight:800,fontSize:14}}>Gross Tax Liability (incl. surcharge + 4% cess)</td><td className="bd-tot" style={{fontSize:15}}>{inr(res.totalTax)}</td></tr>
              {res.totalCredits>0&&<>
              <tr><td colSpan={2} style={{background:'var(--green-lt)',fontWeight:800,padding:'8px 4px',fontSize:12,color:'#065f46'}}>TAX CREDITS</td></tr>
              <tr><td className="bd-lbl">Total TDS + TCS + Advance Tax + Self Assessment</td><td className="bd-ded">- {inr(res.totalCredits)}</td></tr>
              <tr><td className="bd-lbl" style={{fontWeight:800,fontSize:14,color:res.refund>0?'var(--green)':'var(--red)'}}>{res.refund>0?'REFUND DUE':'NET TAX PAYABLE'}</td><td className={res.refund>0?'bd-ded':'bd-tot'} style={{fontSize:15}}>{res.refund>0?inr(res.refund):inr(res.netPayable)}</td></tr>
              </>}
            </tbody></table>

            <Div label="Recommended ITR Form"/>
            <div style={{background:'var(--line2)',border:'1px solid var(--line)',borderRadius:10,padding:14,marginBottom:18,display:'flex',alignItems:'center',gap:14,flexWrap:'wrap'}}>
              <span className="pill p-blue" style={{fontSize:14,padding:'7px 16px'}}>{itrForm.f}</span>
              <div>
                <div style={{fontWeight:700,fontSize:13}}>File using {itrForm.f}</div>
                <div style={{fontSize:12,color:'var(--ink3)'}}>Reason: {itrForm.r}</div>
                <div style={{fontSize:11,color:'var(--ink4)',marginTop:3}}>Due date: 31 July 2027 (ITR-1/2) · 31 August 2027 (ITR-3/4 non-audit) · 31 October 2027 (audit cases)</div>
              </div>
            </div>

            {profile.coupleFiling && profile.spouseName && (
              <>
                <Div label="Couple Tax Optimisation Strategy"/>
                <Al type="amber" icon="💑">
                  <b>For {profile.name.split(' ')[0]} and {profile.spouseName.split(' ')[0]}:</b> Claim 80C investments under the spouse in the higher tax slab. If both are co-borrowers on home loan, claim Rs 2L interest deduction each (double benefit). If one earns below Rs 12L (New Regime), that spouse pays zero tax — allocate all deductions to the higher-earning spouse.
                </Al>
              </>
            )}

            <div className="vipin-card">
              <div className="vc-name">Not confident? Consult Vipin Nair</div>
              <div className="vc-role">Finance and Accounts Professional · CIIE Initiatives · IIM Ahmedabad · {EMAIL}</div>
              <div className="vc-btns">
                <a href={'mailto:' + EMAIL + '?subject=' + emailSub + '&body=' + emailBod} className="vc-btn vc-w">📧 Email Tax Report</a>
                <a href={GCAL_URL} target="_blank" rel="noopener" className="vc-btn vc-o">📅 Schedule ({CONSULT_PRICE})</a>
              </div>
            </div>

            <div style={{display:'flex',gap:10,justifyContent:'flex-end',marginTop:12}}>
              <button className="btn btn-outline btn-sm" onClick={() => {
                const t = 'TaxSmartIndia Pro by Vipin Nair\n' + profile.name + ' | FY 2026-27 (Tax Year 2026-27) | ' + (regime==='new'?'New':'Old') + ' Regime\n\nGross Tax: ' + inr(res.totalTax) + '\nTDS/Credits: ' + inr(res.totalCredits) + '\n' + (res.refund>0?'Refund: '+inr(res.refund):'Net Payable: '+inr(res.netPayable)) + '\nEffective Rate: ' + res.eff + '%\nITR Form: ' + itrForm.f + '\n\nContact: ' + EMAIL;
                if (navigator.clipboard) navigator.clipboard.writeText(t).then(() => alert('Summary copied!'));
              }}>📋 Copy Summary</button>
              <button className="btn btn-outline btn-sm" onClick={() => window.print()}>🖨️ Print PDF</button>
              <button className="btn btn-purple btn-sm" onClick={() => setShowModal(true)}>💬 Consult Vipin</button>
            </div>
          </div>
        </div>
      )}

      {showModal && <ConsultModal onClose={() => setShowModal(false)}/>}
    </div>
  );
};

const App = () => {

  const doProfile = p => { setProfile(p); setStep(1); setScreen('regime'); };
  const doRegime = r => { setRegime(r); setStep(2); setScreen('modules'); };
  const goBackToProfile = () => { setStep(0); setScreen('profile'); window.scrollTo(0,0); };
  const goBackToRegime = () => { setStep(1); setScreen('regime'); window.scrollTo(0,0); };
  const goToStep = (i) => {
    if (i === 0) { setStep(0); setScreen('profile'); }
    else if (i === 1 && profile) { setStep(1); setScreen('regime'); }
    else if (i === 2 && profile && regime !== null) { setStep(2); setScreen('modules'); }
    window.scrollTo(0,0);
  };

  return (
    <div>
      <nav className="nav">
        <div className="nav-logo" onClick={goHome}>
          <div className="nav-icon">{'\u20B9'}</div>
          <div>
            <div className="nav-title">TaxSmart<em>India</em> Pro</div>
            <div className="nav-byline">by Vipin Nair · FY 2026-27</div>
          </div>
        </div>
        <div className="nav-right">
          <span className="pill p-green">FY 2026-27</span>
          <span className="pill p-blue">AY 2027-28</span>
          {profile && <span className="pill p-gray">👤 {profile.name.split(' ')[0]}</span>}
          {regime && <span className={'pill ' + (regime==='new'?'p-blue':'p-amber')}>{regime==='new'?'🆕 New':'📜 Old'}</span>}
          <a href={'mailto:' + EMAIL + '?subject=Tax Consultation - TaxSmartIndia Pro'} className="btn btn-purple btn-sm">💬 Consult Vipin</a>
        </div>
      </nav>

      {screen !== 'hero' && (
        <div className="stepper-bar">
          <div className="stepper">
            {STEPS.map((s,i) => (
              <div key={i} className={'st' + (i===step?' cur':'') + (i<step?' done':'')} onClick={() => i<step && goToStep(i)} style={{cursor:i<step?'pointer':'default'}}>
                <div className="st-n">{i<step?'✓':i+1}</div>
                <div className="st-l">{s}</div>
              </div>
            ))}
          </div>
        </div>
      )}

      <div className="wrap">
        {screen==='hero' && <Hero onStart={() => setScreen('profile')}/>}
        {screen==='profile' && <Profile onDone={doProfile} onBack={goHome}/>}
        {screen==='regime' && <RegimeScreen profile={profile} onDone={doRegime} onBack={goBackToProfile}/>}
        {screen==='modules' && <Modules profile={profile} regime={regime} onBackRegime={goBackToRegime} onBackProfile={goBackToProfile}/>}
      </div>

      <footer className="site-footer">
        <div className="ft-inner">
          <div className="ft-brand">TaxSmart<em>India</em> Pro</div>
          <div className="ft-tagline">TaxSmartIndia Pro by Vipin Nair</div>
          <div className="ft-grid">
            <div>
              <div className="ft-col-title">Contact Vipin</div>
              <div className="ft-links">
                <a href={'mailto:' + EMAIL}>📧 {EMAIL}</a>
                <a href={GCAL_URL} target="_blank" rel="noopener">📅 Schedule Session ({CONSULT_PRICE})</a>
                <a href={GCAL_URL} target="_blank" rel="noopener">💬 Book Consultation</a>
              </div>
            </div>
            <div>
              <div className="ft-col-title">Tax Resources</div>
              <div className="ft-links">
                <a href="https://incometax.gov.in" target="_blank" rel="noopener">Income Tax Portal</a>
                <a href="https://eportal.incometax.gov.in" target="_blank" rel="noopener">File ITR Online</a>
              </div>
            </div>
            <div>
              <div className="ft-col-title">FY 2026-27 Key Dates</div>
              <div className="ft-links">
                <span>15 Jun 2026 — Q1 Advance Tax</span>
                <span>15 Sep 2026 — Q2 Advance Tax</span>
                <span>15 Dec 2026 — Q3 Advance Tax</span>
                <span>15 Mar 2027 — Q4 Advance Tax</span>
                <span>31 Jul 2027 — ITR Filing Deadline</span>
              </div>
            </div>
          </div>
          <div className="ft-disclaimer">
            <strong>Disclaimer:</strong> 
            This tool was thoughtfully created by Vipin Nair as an educational guide to help you easily estimate your Income Tax for FY 2026-27 (based on the Income Tax Act 2025 and Finance Act 2026).

            🔒 Your Data is 100% Private: We respect your privacy. All calculations happen directly within your browser. Absolutely no personal or financial data is stored, saved, or transmitted to any servers.

            💡 A Quick Note on Tax Advice: While we strive for the highest accuracy in our calculators, tax laws are complex and personal to your unique situation. Therefore, TaxSmartIndia Pro is meant for educational and estimation purposes only. It does not replace professional legal or CA services. To ensure your final filings are perfect, we always encourage consulting with a qualified Chartered Accountant or tax professional. The creator assumes no liability for discrepancies in final tax obligations.
          </div>
          <div className="ft-bottom">
            <span>Made for Indian Taxpayers with love by <strong style={{color:'#93c5fd'}}>Vipin Nair</strong> · {EMAIL}</span>
            <span>TaxSmartIndia Pro · FY 2026-27 · For Resident Indians</span>
            <button onClick={() => { if(window.confirm('Delete ALL saved tax data from this browser?')) { clearAllLS(); window.location.reload(); } }} style={{background:'transparent',border:'1px solid rgba(255,255,255,.2)',color:'rgba(255,255,255,.5)',padding:'4px 10px',borderRadius:5,fontSize:10,cursor:'pointer'}}>🗑️ Delete Saved Data</button>
          </div>
        </div>
      </footer>
    </div>
  );
};

ReactDOM.render(React.createElement(App), document.getElementById('root'));
</script>
</body>
</html>
